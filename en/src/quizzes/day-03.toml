[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is metallurgical-grade silicon (99% pure) completely unsuitable for solar cells?"
prompt.distractors = [
  "The crystal lattice contains too many dislocations from rapid cooling during arc furnace extraction",
  "Residual carbon from the reduction process forms silicon carbide precipitates that block light",
  "Dissolved oxygen creates insulating SiO₂ layers at grain boundaries, preventing current flow"
]
answer.answer = "Metallic impurities like iron create recombination centers where photogenerated carriers are lost as heat"
context = "Even a single iron atom per billion silicon atoms can halve a solar cell's efficiency. At 99% purity, impurity concentrations are millions of times too high for the p-n junction to function properly."
id = "c0debc8c-04b5-4b7a-98e2-f6d9b10e4ac8"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the key insight that makes the Siemens process work?"
prompt.distractors = [
  "Melting silicon at 1,425°C allows impurities to float to the surface where they can be skimmed off",
  "Passing electric current through molten silicon drives impurities toward the anode via electrolysis",
  "Dissolving silicon in hydrofluoric acid selectively precipitates metallic impurities as insoluble fluorides"
]
answer.answer = "Converting silicon into volatile trichlorosilane enables purification by fractional distillation, then redeposition as pure solid"
context = "The Siemens process converts solid silicon into trichlorosilane gas (boiling point 31.8°C), purifies it through fractional distillation exploiting different boiling points, then decomposes it back into ultra-pure solid silicon via CVD."
id = "c1d7e216-16c1-4fc3-bef2-af56f79a8fed"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "Approximately how much electrical energy (in kWh) does the Siemens process require to produce one kilogram of polysilicon?"
answer.answer = "60-80"
answer.alternatives = ["60-80 kWh", "70", "60 to 80", "70 kWh"]
context = "The Siemens process consumes 60-80 kWh per kilogram of polysilicon, making it one of the most energy-intensive industrial purification processes."
id = "3d9bf3c4-8220-441f-b72f-dd885340ae55"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the main advantage of fluidized bed reactors (FBR) over the traditional Siemens process?"
prompt.distractors = [
  "FBR achieves higher purity (11N vs 9N) by using silane gas instead of trichlorosilane",
  "FBR eliminates the need for seed rods by depositing silicon onto recycled polysilicon chunks",
  "FBR operates at higher temperatures (1,200°C) enabling faster deposition rates and higher throughput"
]
answer.answer = "FBR consumes roughly half the energy (25-35 kWh/kg) and runs continuously rather than in batch cycles"
context = "FBR operates at 600-800°C instead of 1,100°C, using silane gas. The lower temperature and continuous operation cut energy consumption to 25-35 kWh/kg. The tradeoff is higher surface contamination on the granular product."
id = "73db8fd6-0240-4440-beb5-94061c524352"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does polysilicon production concentrate in regions like Xinjiang and Inner Mongolia?"
prompt.distractors = [
  "These regions have exceptionally pure quartz deposits with naturally low boron and phosphorus content",
  "The cold, dry climate enables more efficient reactor cooling and reduces contamination risk",
  "Government subsidies cover up to 60% of capital costs for polysilicon facilities in these regions"
]
answer.answer = "Cheap coal-fired electricity at $0.03-0.04/kWh makes the energy-intensive process profitable at current polysilicon prices"
context = "When polysilicon sells for $7-10/kg and requires 60-80 kWh to produce, electricity cost is the dominant variable. At $0.04/kWh, electricity costs ~$2.80/kg; at $0.10/kWh, it's $7.00/kg — the difference between profit and loss."
id = "6048297b-f8f8-48f9-a268-bae802b032d1"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What temperature are the slim rods heated to inside a Siemens reactor?"
answer.answer = "1,050-1,150°C"
answer.alternatives = ["1100°C", "1,100°C", "1050-1150", "1100 degrees"]
context = "The silicon slim rods are resistively heated to 1,050-1,150°C, at which temperature trichlorosilane decomposes and deposits pure silicon onto the rod surface."
id = "4c5eae93-0121-4951-8e4c-3d93a34d4d76"
