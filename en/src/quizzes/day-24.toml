## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 23) What is the typical bifacial energy gain for a utility-scale installation using single-axis trackers over white gravel with an albedo of 0.5?"
prompt.distractors = [
  "5–8% gain, because single-axis trackers primarily improve direct beam capture and contribute minimally to rear-side illumination, which depends almost entirely on diffuse ground reflection patterns.",
  "35–45% gain, because the combination of high-albedo ground cover and continuous tracking creates a resonant reflection cavity between adjacent rows that amplifies rear irradiance beyond simple albedo calculations.",
  "12–15% gain, because while high-albedo surfaces increase ground-reflected light reaching the rear cells, the tracker's east-west rotation reduces the effective view factor of the ground during morning and evening hours."
]
answer.answer = "20–30% gain, because high-albedo ground surfaces significantly increase the diffuse and reflected light reaching the rear side of bifacial modules, and tracking optimizes the front-side capture throughout the day."
context = "Bifacial modules over high-albedo surfaces like white gravel (albedo ~0.5) combined with single-axis tracking typically deliver 20–30% more energy than fixed monofacial systems. The albedo of the ground beneath bifacial panels is a critical design parameter."
id = "9c9a927f-5b7a-46f6-9c29-598be29dbbad"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 22) In a two-terminal (2T) monolithic perovskite-silicon tandem cell, why must the current output of both sub-cells be carefully matched?"
prompt.distractors = [
  "Because mismatched currents cause the lower-current cell to enter reverse bias and develop hotspots that thermally degrade the perovskite layer above 150°C, triggering irreversible halide segregation and phase decomposition.",
  "Because the shared transparent conductive oxide interlayer has a maximum current density threshold of 18 mA/cm², and exceeding it in either sub-cell causes resistive heating that cracks the brittle interlayer.",
  "Because unmatched currents create a voltage differential across the recombination junction that shifts the perovskite cell's bandgap through the Stark effect, permanently altering its absorption spectrum."
]
answer.answer = "Because in a series-connected 2T device, the total current is limited to the lower of the two sub-cells' photocurrents — any excess current generated by the higher-producing cell is wasted as heat in the recombination layer."
context = "Two-terminal tandems wire the sub-cells in series, so the device current equals the minimum of the two sub-cell currents (like a chain limited by its weakest link). Current matching requires careful tuning of the perovskite bandgap and layer thickness."
id = "03c6637f-c910-4b92-9316-354d24df0a04"

## Review Questions — Older Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 9) What is the key structural difference between a PERC cell and a TOPCon cell that gives TOPCon its efficiency advantage?"
prompt.distractors = [
  "TOPCon uses a thicker aluminum back-surface field (Al-BSF) layer of 30–50 µm compared to PERC's 15–20 µm layer, which improves rear-side carrier collection efficiency by extending the depletion region deeper into the bulk.",
  "TOPCon replaces PERC's boron-doped p-type silicon wafer with a gallium-doped p-type wafer, which eliminates light-induced degradation (LID) and maintains a 0.3–0.5% absolute efficiency advantage throughout the module's lifetime.",
  "TOPCon uses a front-side heterojunction of amorphous silicon over crystalline silicon instead of PERC's homojunction, creating a wider bandgap window layer that reduces thermalization losses by approximately 8–12%."
]
answer.answer = "TOPCon adds an ultra-thin (~1.5 nm) tunnel oxide layer topped by a doped polysilicon layer on the rear surface, which passivates dangling bonds far more effectively than PERC's aluminum oxide/silicon nitride rear passivation stack."
context = "TOPCon (Tunnel Oxide Passivated Contact) achieves superior rear-surface passivation through a ~1.5 nm SiO₂ tunnel oxide plus n+ polysilicon layer. This virtually eliminates recombination at the rear contact while still allowing carrier transport via quantum tunneling."
id = "636d2ba8-29d7-485b-9cc8-ae86f42c4cc5"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "🔁 (Day 7) What is the name of the surface texturing pattern created by anisotropic KOH etching of monocrystalline silicon wafers?"
answer.answer = "random pyramids"
answer.alternatives = ["random pyramid texture", "pyramid texture", "pyramids", "random pyramid", "inverted pyramids"]
context = "Anisotropic etching of (100)-oriented monocrystalline silicon in KOH solution preferentially etches along crystal planes, creating a surface covered in random pyramids (typically 1–10 µm tall) that reduce reflectance from ~35% to ~10% by causing light to bounce multiple times between pyramid faces."
id = "f5990310-d272-4e1e-9970-a04317afffa2"
