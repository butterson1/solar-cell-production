prompt.prompt = "Which acronym is commonly used for the software layer that tracks lots, recipes, alarms, routing, and traceability across the factory?"
answer.answer = "MES"
answer.alternatives = ["Manufacturing Execution System", "manufacturing execution system"]
context = "MES stands for Manufacturing Execution System. It is the software backbone that helps automated PV lines manage traceability, routing, and root-cause analysis at scale."
