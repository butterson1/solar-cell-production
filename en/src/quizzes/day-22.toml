type = "MultipleChoice"
prompt.prompt = "🔁 (Day 12) What is the approximate theoretical maximum efficiency for a single-junction solar cell with a bandgap of 1.34 eV under unconcentrated AM1.5G sunlight, according to the Shockley-Queisser detailed balance limit?"
prompt.distractors = [
    "Approximately 29%, limited primarily by Auger recombination in indirect-bandgap materials, which prevents single-junction cells from reaching the full radiative limit regardless of bandgap optimization or material quality.",
    "Approximately 37%, achievable only under concentrated sunlight at roughly 500 suns, because the unconcentrated limit is reduced by entropy generation from the mismatch between diffuse sunlight and narrow-angle cell emission.",
    "Approximately 41%, which accounts for all radiative and non-radiative losses in a perfect material, including unavoidable phonon-assisted transitions that reduce the usable voltage below the bandgap energy."
]
answer.answer = "Approximately 33.7%, set by the balance between sub-bandgap transmission losses and above-bandgap thermalization losses, assuming only radiative recombination and blackbody emission from the cell at 300 K."
context = "The Shockley-Queisser limit peaks at ~33.7% for a bandgap of 1.34 eV under 1-sun AM1.5G illumination. It accounts for thermalization, sub-bandgap transparency, radiative recombination, and blackbody emission."
id = "ea591027-cfd1-4019-8e2d-5884c84f2be4"

