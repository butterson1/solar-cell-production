## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 21) Why is formamidinium (FA) preferred over methylammonium (MA) as the A-site cation in modern perovskite solar cell compositions?"
prompt.distractors = [
    "FA has a smaller ionic radius than MA, which contracts the perovskite lattice and increases the density of the absorber layer, resulting in roughly 3× higher absorption coefficient per unit thickness compared to MA-based compositions.",
    "FA forms stronger covalent bonds with iodide anions than MA does, creating a more rigid crystal framework with phonon frequencies that couple more efficiently with photogenerated carriers, improving charge extraction by ~25%.",
    "FA is a symmetric molecule that eliminates the ferroelectric polarization domains found in MA-based perovskites, which otherwise create internal voltage losses of 50–80 mV through random dipole orientation at grain boundaries."
]
answer.answer = "MA begins to volatilize out of the perovskite lattice above ~85°C — a temperature that rooftop panels routinely reach in summer — while FA is significantly more thermally stable, making FA-rich compositions more durable under real operating conditions."
context = "Methylammonium is volatile above ~85°C. Since solar panels regularly reach these temperatures, the field has moved to thermally stable formamidinium-rich compositions for practical device longevity."
id = "3802bc29-5413-44e9-b0de-f1529f8e6f44"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 20) In IEC 61215 damp-heat testing, what are the standard conditions and duration that a solar module must survive to pass qualification?"
prompt.distractors = [
    "Exposure to 65°C and 95% relative humidity for 2,000 hours continuously, with power degradation measured at 500-hour intervals and requiring less than 3% loss at each checkpoint to pass the full sequence.",
    "Cyclic exposure alternating between 85°C/85% RH for 12 hours and -40°C/dry for 12 hours over a total of 500 cycles, testing both moisture ingress and thermal fatigue simultaneously under the same qualification protocol.",
    "Exposure to 75°C and 90% relative humidity for 1,500 hours, combined with simultaneous UV irradiation at 60 kWh/m² to simulate accelerated real-world aging of both encapsulant and cell under combined stressors."
]
answer.answer = "Continuous exposure to 85°C and 85% relative humidity for 1,000 hours, after which the module must retain at least 95% of its initial rated power output to pass the qualification test sequence."
context = "IEC 61215 damp-heat testing subjects modules to 85°C/85% RH for 1,000 hours continuously. Modules must retain ≥95% of initial power. This is a key reliability gate for commercial solar panels, including emerging tandem technology."
id = "91dd759f-6750-47f5-a0bd-9612f9eec1b9"

