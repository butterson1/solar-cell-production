[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 3) In the Siemens process for polysilicon purification, why is trichlorosilane (SiHCl₃) used as the intermediate compound rather than directly purifying solid silicon?"
prompt.distractors = [
    "Solid silicon has a melting point of 2,577°C which exceeds the thermal limits of industrial crucibles, so converting it to a gas-phase compound allows processing at temperatures below 1,200°C",
    "Trichlorosilane acts as a chemical filter that selectively binds to impurity atoms like iron and copper, physically separating them during the chlorination step before any distillation occurs",
    "Direct purification of solid silicon requires vacuum pressures below 10⁻⁸ torr which are too expensive to maintain at industrial scale, while gas-phase compounds can be purified at atmospheric pressure"
]
answer.answer = "Converting silicon to a volatile liquid (boiling point 31.8°C) enables fractional distillation, which exploits boiling point differences between SiHCl₃ and impurity chlorides to achieve 9N+ purity levels impossible with solid-state methods"
context = "The genius of the Siemens process is converting silicon into trichlorosilane, a liquid that boils at 31.8°C. Fractional distillation then separates it from impurity chlorides with different boiling points, achieving 99.9999999% (9N) purity."
id = "bf6bcde1-782c-43eb-9220-8ff49eb5e0c5"
