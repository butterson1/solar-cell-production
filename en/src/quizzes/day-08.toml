# Day 8 Quiz: Screen Printing & Metallization

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the role of glass frit in silver paste during the firing process?"
prompt.distractors = [
  "It acts as a sintering flux that lowers the melting point of silver particles from 960°C to 400°C, allowing them to fuse into a continuous conductive film using cheaper low-temperature belt furnaces",
  "It forms a permanent insulating barrier between the silver gridline and the silicon emitter, preventing silver atom migration into the junction while still allowing current flow through quantum tunneling",
  "It reacts with atmospheric oxygen at peak temperature to create a protective silver oxide shell around each particle, preventing long-term oxidation and ensuring 25-year contact stability in the field"
]
answer.answer = "It melts at 500-650°C and chemically etches through the SiNₓ anti-reflective coating using lead oxide (PbO), exposing the silicon emitter surface so silver can make direct electrical contact with the semiconductor"
context = "The glass frit — typically lead-borosilicate (PbO-B₂O₃-SiO₂) — becomes a corrosive liquid during firing. The PbO dissolves the silicon nitride ARC, creating channels through which dissolved silver precipitates onto the silicon surface as crystallites."
id = "a33d86e6-fe19-49f8-93f8-13b2eecb22b6"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does the solar industry use silver rather than copper for screen-printed contacts, despite copper costing roughly 1/100th as much per kilogram?"
prompt.distractors = [
  "Copper has a bulk resistivity roughly 10× higher than silver (1.59 × 10⁻⁷ vs 1.59 × 10⁻⁸ Ω·m), so contact fingers would need to be 10× wider to carry the same current, causing unacceptable shading losses",
  "Copper paste cannot survive the 750-850°C peak firing temperatures used in co-firing because copper melts at 660°C and would destroy the wafer surface, while silver's 960°C melting point provides margin",
  "Copper forms a thick, insulating native oxide layer during the firing step that cannot be removed without hydrofluoric acid treatment, making the contacts non-solderable for standard module interconnection"
]
answer.answer = "Copper diffuses rapidly into silicon even at moderate temperatures, creating deep-level recombination centers that destroy minority carrier lifetime — requiring expensive barrier layers (Ni, W) that add process complexity"
context = "Copper is only 6% more resistive than silver (1.68 vs 1.59 × 10⁻⁸ Ω·m), so conductivity isn't the issue. The problem is copper's fast interstitial diffusion in silicon, which poisons the junction. HJT cells are the best candidates for copper because their a-Si layers naturally block copper diffusion."
id = "537571a8-9b65-4280-a6eb-eb3f318ad85d"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "During co-firing, the wafer spends only 1-3 seconds at peak temperature (750-850°C). What happens on the rear side during this brief thermal spike?"
prompt.distractors = [
  "The screen-printed silver rear busbars melt completely and re-solidify into a specular mirror layer that bounces unabsorbed near-infrared photons back through the cell for a second absorption pass",
  "A thin titanium dioxide layer forms spontaneously on the aluminum surface through atmospheric oxidation, providing rear-side passivation performance equivalent to the front-side SiNₓ coating",
  "The rear-side silicon nitride capping layer undergoes rapid crystallization into a dense alpha-phase ceramic, permanently sealing the cell against moisture ingress without any additional encapsulation"
]
answer.answer = "The aluminum paste alloys with silicon at the 577°C eutectic, creating a 5-10 μm deep p⁺-doped back surface field (BSF) that repels minority carriers and reduces rear recombination losses"
context = "The Al-Si eutectic at 577°C enables aluminum to dissolve into silicon and re-solidify as a heavily p⁺-doped region. This BSF acts as an 'electron mirror' — minority carriers drifting toward the back are reflected into the bulk where they can contribute to photocurrent."
id = "1d93b5e2-8b17-4814-b876-309287591349"

