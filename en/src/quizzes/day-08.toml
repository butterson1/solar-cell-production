[[questions]]
type = "MultipleChoice"
prompt.prompt = "Silver paste is described as a shear-thinning (non-Newtonian) fluid. What does this mean in practice during screen printing?"
prompt.distractors = [
  "The paste becomes more viscous when the squeegee applies downward pressure, forcing it to hold its shape tightly against the screen mesh and preventing any flow through the openings until pressure releases",
  "The paste maintains constant viscosity (~200 Pa·s) regardless of squeegee speed or applied pressure, ensuring uniform finger line width whether the printer operates at 100 mm/s or 400 mm/s",
  "The paste becomes permanently less viscous after the first squeegee pass due to irreversible breakdown of the organic binder, requiring fresh paste for each wafer to maintain consistent finger geometry"
]
answer.answer = "The paste has high viscosity at rest (200-400 Pa·s) to maintain its printed shape, but drops to much lower viscosity (20-50 Pa·s) under the squeegee's shear force, allowing smooth flow through fine screen openings"
context = "Shear-thinning behavior is essential for screen printing. At rest, the paste is thick enough to hold a sharp line profile without slumping. Under shear, viscosity drops ~10×, enabling flow through openings as narrow as 20 μm."
id = "b087820b-ac61-4b8e-ad84-a8aa01d744bf"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the approximate width of a screen-printed front contact finger on a modern (2025) solar cell?"
answer.answer = "25-30 μm"
answer.alternatives = ["25 μm", "30 μm", "25-40 μm", "20-30 μm", "30 microns", "25 microns"]
context = "Modern screen printing achieves finger lines of 25-40 μm, down from ~50 μm in 2015. Narrower fingers reduce shading loss and silver consumption."
id = "b0199a02-d68d-49b0-952d-b8f8e387ce09"
