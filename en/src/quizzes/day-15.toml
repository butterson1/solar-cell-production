# Day 15 Quiz: Factory Layout — From Sand to Shipping Dock

## Current Day Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why has polysilicon production concentrated in regions like Xinjiang, Sichuan, and Inner Mongolia?"
prompt.distractors = [
  "These regions have the largest deposits of high-purity quartz sand, reducing transportation costs for raw material by 40-60% compared to coastal facilities",
  "Chinese environmental regulations exempt these inland provinces from emissions monitoring, allowing Siemens reactors to operate without scrubber systems on exhaust lines",
  "The dry climate in these regions naturally reduces moisture contamination during trichlorosilane distillation, improving nine-nines purity yields by 15-20%"
]
answer.answer = "Electricity represents 30-40% of polysilicon production cost, and these regions offer the cheapest power — hydroelectric in Sichuan/Yunnan, coal and wind in Xinjiang and Inner Mongolia"
context = "Producing 1 kg of polysilicon via the Siemens process requires 60-80 kWh. A 100,000-ton plant draws 700-900 MW continuously, making electricity cost the dominant factor in plant siting."
id = "81503664-87b7-4103-ac94-ba69e3667dab"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the actual throughput bottleneck in a crystal growth hall with 1,000+ CZ pullers?"
prompt.distractors = [
  "The melting phase takes 8-12 hours per cycle because polysilicon chunks must be heated gradually to prevent thermal shock cracking in the quartz crucible lining",
  "Crystal pull speed is limited to 0.5-1.2 mm/min by the solid-liquid interface dynamics, making the 50-70 hour growth cycle the rate-limiting step for ingot output",
  "Seed crystal availability constrains throughput because each dislocation-free seed requires 2-3 weeks of specialized float-zone preparation before it can be used"
]
answer.answer = "Hot zone consumables — graphite crucibles, heaters, and heat shields — degrade after 4-8 pulls and must be replaced, making maintenance turnaround the true bottleneck"
context = "The crystal growth itself is mostly automated waiting. The limiting factor is how fast maintenance teams can disassemble, replace, and reassemble the hot zone components between cycles."
id = "6a3b0148-9f0e-4771-b143-60efbd52c70b"

