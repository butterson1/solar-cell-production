[[questions]]
type = "MultipleChoice"
prompt.prompt = "A modern cell production line achieves 8,000 wafers/hour throughput, 98.5% yield, and 92% uptime. If yield improves to 99.0% while other factors stay constant, what is the approximate increase in good cells produced per hour?"
prompt.distractors = [
  "About 120 additional good cells per hour, because the 0.5% improvement applies only to cells that previously failed electrical testing, not mechanical breakage",
  "About 25 additional good cells per hour, because yield improvements at the >98% level face diminishing returns due to irreducible defect populations in the silicon",
  "About 400 additional good cells per hour, because higher yield also improves effective uptime by reducing line stoppages caused by defective cell jams in the conveyor system"
]
answer.answer = "About 37 additional good cells per hour — from 7,248 (8,000 × 0.985 × 0.92) to 7,285 (8,000 × 0.990 × 0.92), a modest per-hour gain that compounds over millions of daily units"
context = "8,000 × 0.985 × 0.92 = 7,249.6; 8,000 × 0.990 × 0.92 = 7,286.4. The difference is ~37 cells/hour. Small per hour, but at 24/7 operation across multiple lines, it adds up to significant revenue."
id = "6d1fbdf6-ba68-4aa5-899c-c2a61e144e06"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What are the cleanroom classification requirements along a TOPCon cell production line?"
prompt.distractors = [
  "The entire line operates at ISO Class 5 (100 particles/ft³) uniformly, because any contamination at any stage causes shunting defects that reduce cell efficiency by 0.5-1.0%",
  "Texturing and wet chemistry require ISO Class 3-4 (1-10 particles/ft³) since chemical baths are most sensitive to particulates, while furnaces run at relaxed ISO Class 8",
  "Screen printing requires the strictest classification at ISO Class 4 (10 particles/ft³) because paste contamination causes gridline discontinuities, while diffusion runs at ISO Class 7-8"
]
answer.answer = "Texturing and wet chemistry sections run at ISO Class 7-8 (10,000-100,000 particles/ft³), while PECVD and diffusion sections require stricter ISO Class 5-6 (100-1,000 particles/ft³)"
context = "Deposition processes (PECVD, diffusion) require cleaner environments because particles on the wafer surface during thin-film growth create defects. Wet chemistry is more tolerant since baths naturally wash away particles."
