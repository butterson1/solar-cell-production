## 🔁 Recent Review (Days 13-14)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 13) During flash I-V testing of finished cells, what does the series resistance (Rs) parameter primarily indicate?"
prompt.distractors = [
  "Series resistance measures the quality of the p-n junction formation — high Rs means the doping profile is too shallow, reducing the built-in electric field that separates carriers",
  "Series resistance reflects bulk silicon quality — high Rs indicates excessive oxygen or carbon contamination in the wafer, which creates recombination centers throughout the material",
  "Series resistance quantifies surface passivation effectiveness — high Rs means the anti-reflective coating has pinholes allowing surface recombination of photogenerated carriers"
]
answer.answer = "Series resistance captures resistive losses in the cell's current path — high Rs typically indicates poor metallization contact, inadequate finger conductivity, or high-resistance solder joints"
context = "Rs is dominated by the metal-semiconductor contact resistance, the resistance of the silver grid fingers, and the lateral resistance of the emitter. Poor screen printing or firing directly increases Rs."
id = "b3236352-23ce-400b-bf7b-2e310f64ddfa"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 14) During module lamination, what temperature range and duration are used to crosslink the EVA encapsulant, and why are these parameters critical?"
prompt.distractors = [
  "EVA is laminated at 100-115°C for 25-35 minutes; lower temperature prevents thermal stress on cell interconnects while still achieving 85% gel content for adequate moisture barrier performance",
  "EVA is laminated at 180-200°C for 5-8 minutes; the higher temperature enables rapid crosslinking that maximizes throughput, with the short duration preventing yellowing of the encapsulant polymer",
  "EVA is laminated at 160-175°C for 20-25 minutes; this temperature range activates the organic peroxide crosslinker while keeping below the glass transition of the fluoropolymer backsheet"
]
answer.answer = "EVA is laminated at 145-155°C for 12-18 minutes; this range fully activates the peroxide crosslinker to achieve >65% gel content while avoiding thermal degradation that causes long-term yellowing"
context = "The lamination temperature must be high enough to crosslink EVA (making it durable and moisture-resistant) but not so high that it degrades the polymer or damages cell interconnects."
id = "a7765fc1-4d83-45d4-9b2f-a9d7b4fa8310"

## 🔁 Older Review (Days 1-11)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 5) Diamond wire saws used in modern wafering have wire diameters of 38-42 micrometers. What is the primary consequence of reducing wire diameter further?"
prompt.distractors = [
  "Thinner wires vibrate at higher frequencies during cutting, creating periodic thickness variations (TTV) in the wafer that cause non-uniform doping depth during subsequent diffusion steps",
  "Thinner wires require significantly higher tension to maintain straight cuts, which increases the mechanical stress on ingot mounting adhesive and causes de-bonding failures mid-cut",
  "Thinner wires embed more diamond particles per unit length, which paradoxically slows the cut because excess abrasive creates a polished surface that resists further material removal"
]
answer.answer = "Thinner wires reduce the kerf (material lost as sawdust) from ~60μm toward 40μm per cut, yielding more wafers per ingot, but they break more frequently — increasing downtime and maintenance cost"
context = "Kerf loss is a major cost factor: at 130-150μm wafer thickness, the kerf can represent 30-40% of the ingot. Thinner wires extract more wafers but are mechanically fragile, so there's an engineering trade-off."
id = "a6c5f72b-a0fd-4baf-94b8-35a696e97c2b"

