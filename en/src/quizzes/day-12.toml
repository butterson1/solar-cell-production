## Review Questions — Older Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 6) In phosphorus doping of silicon, what happens at the atomic level that creates a free electron?"
prompt.distractors = [
  "Phosphorus atoms sit in interstitial positions between silicon atoms and their loosely bound outer electrons form a metallic conduction band that overlaps with silicon's conduction band at room temperature",
  "Phosphorus's higher electronegativity pulls electrons from neighboring silicon atoms through charge transfer, ionizing the silicon lattice and creating a sea of mobile electrons and fixed positive silicon ions",
  "Phosphorus atoms create deep energy states 0.55 eV below the conduction band, and thermal energy at room temperature (0.026 eV) promotes electrons through quantum tunneling across this gap with ~40% probability"
]
answer.answer = "Phosphorus has five valence electrons; four bond with neighboring silicon atoms, leaving one electron weakly bound in a shallow donor state just 0.045 eV below the conduction band, easily freed at room temperature"
context = "Phosphorus substitutes for silicon in the crystal lattice. It has one more valence electron than silicon, and this fifth electron is bound only by ~0.045 eV — far less than kT at room temperature (0.026 eV). At 300 K, virtually 100% of phosphorus donor atoms are ionized, contributing free electrons to the conduction band."
id = "d12-q09"

