# Day 12 Quiz: Efficiency Limits & How to Beat Them

## Current Day Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the optimal bandgap for maximum single-junction efficiency under the Shockley-Queisser model, and what efficiency does it achieve?"
prompt.distractors = [
  "1.12 eV, achieving a theoretical maximum of 29.4% — this is silicon's bandgap and was the reference point for Shockley and Queisser's original 1961 calculation",
  "1.42 eV, achieving a theoretical maximum of 35.1% — GaAs sits closest to the optimal point because its direct bandgap eliminates phonon-assisted absorption losses",
  "1.50 eV, achieving a theoretical maximum of 31.8% — wider bandgaps minimize thermalization at the cost of modest transmission losses in the near-infrared region"
]
answer.answer = "1.34 eV, achieving a theoretical maximum of 33.7% — this balances the tradeoff between sub-bandgap transmission losses (favoring narrow gaps) and thermalization losses (favoring wide gaps)"
context = "The SQ limit peaks at ~33.7% for a bandgap of ~1.34 eV under the AM1.5G spectrum. This is a compromise: narrower bandgaps absorb more photons but thermalize more energy per photon, while wider bandgaps waste fewer eV per photon but miss more infrared light entirely."
id = "d12-q01"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Which loss mechanism is the single largest thief of solar energy in a single-junction cell, and approximately what fraction of incident energy does it consume?"
prompt.distractors = [
  "Sub-bandgap transmission accounts for roughly 33% of incoming solar energy, since the infrared portion of the AM1.5G spectrum below 1.12 eV carries the majority of the sun's radiated power",
  "Radiative recombination accounts for roughly 25% of incoming solar energy, because at operating voltage the cell re-emits a substantial fraction of absorbed photons as infrared luminescence",
  "The Carnot entropy penalty accounts for roughly 30% of incoming solar energy, driven by the solid-angle mismatch between the sun's narrow disk and the cell's hemispherical re-emission pattern"
]
answer.answer = "Thermalization accounts for roughly 33% of incoming solar energy, because high-energy photons generate carriers that shed excess kinetic energy as lattice heat within femtoseconds of absorption"
context = "Thermalization is the dominant loss mechanism. Carriers generated by above-bandgap photons rapidly (within ~10⁻¹⁵ seconds) relax to the band edge, losing the difference between the photon energy and the bandgap as heat through collisions with the crystal lattice."
id = "d12-q02"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does concentrating sunlight from 1 sun to 1,000 suns increase the theoretical single-junction efficiency from 33.7% to about 40.7%?"
prompt.distractors = [
  "Concentration heats the cell to 400-500 K which narrows the bandgap by approximately 0.15 eV, shifting it closer to the theoretical optimum of 1.34 eV and reducing spectral mismatch losses",
  "Concentrated light increases the photon density enough to trigger two-photon absorption processes, allowing sub-bandgap infrared photons to contribute to carrier generation through virtual states",
  "The higher photon flux accelerates carrier transport across the junction, reducing the transit time below the recombination lifetime and thereby cutting bulk recombination losses by roughly 50%"
]
answer.answer = "Concentrating light increases the solid angle of incoming photons, reducing the entropy penalty from the asymmetry between absorption from a narrow solar disk and emission into the full hemisphere above the cell"
context = "Under concentration, current scales linearly but voltage scales logarithmically — a net gain. Physically, this happens because concentrating light increases the effective solid angle of the source, reducing the entropy difference between absorbed and emitted photon populations. The cell's emission becomes a smaller relative fraction of its absorption."
id = "d12-q03"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What makes hot-carrier solar cells theoretically capable of ~66% efficiency, and what is the primary engineering obstacle to realizing them?"
prompt.distractors = [
  "They harvest phonon energy from the lattice through thermoelectric coupling, but the obstacle is that the Seebeck coefficient in most semiconductors is too low to generate useful voltage from thermal gradients",
  "They use quantum tunneling to extract carriers from deep trap states that normally recombine non-radiatively, but fabricating defect-free tunnel junctions thinner than 2 nm remains beyond current lithography",
  "They stack multiple quantum wells that each absorb at different energies through intersubband transitions, but the wells must be spaced with sub-angstrom precision to maintain coherent transport"
]
answer.answer = "They extract photo-excited carriers before thermalization dissipates excess kinetic energy as heat, but carrier cooling happens in sub-picosecond timescales and energy-selective contacts for extraction don't yet exist"
context = "Hot carrier cells aim to capture the excess kinetic energy of carriers generated by above-bandgap photons before that energy thermalizes into lattice heat. The theoretical ceiling is ~66% at one sun. The challenge: cooling happens within ~100 femtoseconds in most materials, and you need 'energy-selective contacts' that act as quantum turnstiles — extracting carriers only at specific energies."
id = "d12-q04"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What percentage of its Shockley-Queisser limit does LONGi's record 26.81% silicon cell achieve? (Answer as a percentage to one decimal place)"
answer.answer = "91.2%"
answer.alternatives = ["91.2", "91%", "91.2 percent"]
context = "LONGi's 26.81% record divided by silicon's SQ limit of 29.4% gives 91.2%. This means the best silicon cells are already capturing over 9/10ths of their theoretical maximum, leaving very little room for further single-junction improvement."
id = "d12-q05"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In singlet fission, pentacene can achieve fission efficiencies approaching 200%. What does this mean in physical terms?"
prompt.distractors = [
  "Each pentacene molecule absorbs two photons simultaneously through a two-photon process and generates two excitons, effectively doubling the quantum yield compared to standard single-photon absorption",
  "The pentacene crystal amplifies the incoming light field through stimulated emission before reabsorption, producing a gain medium effect that doubles the effective photon flux reaching the junction",
  "Pentacene's triplet exciton lifetime exceeds 10 milliseconds, allowing each absorbed photon to recycle through the system twice before extraction, yielding two charge-separation events per photon"
]
answer.answer = "One high-energy singlet excited state on a pentacene molecule splits into two lower-energy triplet excited states on adjacent molecules, yielding two usable excitons from a single absorbed photon"
context = "Singlet fission is the organic-molecule analog of multiple exciton generation: one singlet exciton (created by photon absorption) splits into two triplet excitons on neighboring molecules. MIT demonstrated external quantum efficiency above 100% at specific wavelengths using this effect coupled to a silicon cell."
id = "d12-q06"

## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 11) Why have perovskite-on-silicon tandems emerged as the leading commercial tandem approach despite III-V cells having higher absolute records?"
prompt.distractors = [
  "Perovskite top cells can be grown epitaxially on silicon substrates at standard MOCVD temperatures of 600°C, creating a monolithic crystal structure without lattice mismatch defects at the interface",
  "Silicon bottom cells contribute 85% of the tandem's total power output, so the top cell material matters less than the bottom cell quality, and silicon bottom cells are far superior to germanium",
  "Perovskite bandgaps are fixed at exactly 1.68 eV which happens to be the mathematically optimal top-cell bandgap for pairing with silicon, a coincidence that III-V alloys cannot replicate economically"
]
answer.answer = "Perovskite layers can be deposited at low temperatures (~150°C) via solution processing or evaporation onto existing silicon cells, avoiding the $50-100/W cost of III-V MOCVD epitaxial growth"
context = "The perovskite-on-silicon tandem works commercially because perovskites can be deposited cheaply at low temperatures on top of conventional silicon cells. III-V tandems on silicon require expensive MOCVD or wafer bonding. The cost difference is 200-400×, making perovskite tandems viable for mass-market terrestrial solar."
id = "d12-q07"

[[questions]]
