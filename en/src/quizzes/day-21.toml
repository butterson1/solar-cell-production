prompt.prompt = "🔁 (Day 6) What are the two dopant elements most commonly used to create n-type and p-type silicon, respectively?"
answer.answer = "phosphorus and boron"
answer.alternatives = ["phosphorus, boron", "P and B", "phosphorus for n-type and boron for p-type"]
context = "Phosphorus (Group V, 5 valence electrons) is the standard n-type dopant, contributing a free electron. Boron (Group III, 3 valence electrons) is the standard p-type dopant, creating a hole. Together they form the p-n junction that drives current in a silicon solar cell."
