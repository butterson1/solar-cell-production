## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 20) What is the IEC 61215 damp heat test protocol, and what does it simulate?"
prompt.distractors = [
    "Modules are cycled between −40°C and +85°C with 95% RH for 200 cycles over 40 days, simulating the thermal shock and condensation damage that panels experience during rapid weather changes in temperate climates.",
    "Modules are submerged in 85°C deionized water for 500 hours under 1-sun illumination, simulating the combined effects of water ingress and thermal stress in tropical coastal installations with heavy rainfall.",
    "Modules are exposed to 60°C and 85% RH for 2,000 hours with simultaneous UV exposure at 60 kWh/m², simulating the combined photodegradation and humidity damage in hot, humid subtropical environments."
]
answer.answer = "Modules are held at 85°C and 85% relative humidity continuously for 1,000 hours (about 42 days), simulating decades of cumulative moisture and heat exposure to test encapsulant integrity and cell durability."
context = "The IEC 61215 damp heat test subjects modules to 85°C / 85% RH for 1,000 continuous hours. This accelerated stress test simulates long-term moisture and thermal exposure to verify that encapsulation, cell interconnects, and materials can withstand humid operating conditions."
id = "38c3a24c-5063-4e82-9243-5790bd41497e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 19) In electroluminescence (EL) imaging, what does a dark area on an otherwise bright cell indicate?"
prompt.distractors = [
    "A region with unusually high carrier mobility where electrons recombine so quickly that photon emission is quenched by Auger recombination, typically caused by excessive phosphorus doping concentration above 10²¹ atoms/cm³.",
    "A region where the anti-reflective coating is thicker than optimal, absorbing the emitted EL photons before they reach the camera sensor, creating an apparent dark spot that doesn't actually affect cell performance.",
    "A region where the silicon crystal orientation has rotated by more than 15° relative to the bulk wafer, creating a grain boundary that emits photons at a wavelength outside the camera's near-infrared detection range."
]
answer.answer = "A region with elevated defect density — such as a crack, inactive area, or poor contact — where injected current cannot produce radiative recombination, indicating that those areas won't contribute to power generation under sunlight."
context = "In EL imaging, current is injected into the cell and the resulting photon emission is captured by a near-infrared camera. Dark areas indicate regions where current cannot flow or where non-radiative recombination dominates — signaling cracks, broken fingers, dead zones, or poor metallization contact."
id = "863d9808-bf61-4771-b5bc-b05aa0594193"

## Review Questions — Older Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 12) What is the Shockley-Queisser efficiency limit for a single-junction solar cell with an optimal bandgap of ~1.34 eV, and what is the primary loss mechanism?"
prompt.distractors = [
    "The limit is approximately 29.4%, with the primary loss being Auger recombination where high-energy carriers transfer their excess kinetic energy to neighboring carriers instead of generating additional photocurrent in the device.",
    "The limit is approximately 40.7%, with the primary loss being reflection at the semiconductor surface where roughly one-third of incident photons bounce back before entering the absorber layer despite anti-reflective coatings.",
    "The limit is approximately 26.7%, with the primary loss being series resistance in the metal contacts and busbars, which dissipates roughly half of the generated power as Joule heating before it reaches the external circuit."
]
answer.answer = "The limit is approximately 33.7%, with the primary loss being thermalization — photons with energy above the bandgap generate electron-hole pairs, but the excess energy above the bandgap is lost as heat to the crystal lattice."
context = "The Shockley-Queisser limit for a single-junction cell at ~1.34 eV bandgap is about 33.7%. The dominant loss mechanism is thermalization: photons with energy exceeding the bandgap create carriers that quickly shed their excess energy as heat, wasting a significant fraction of the absorbed solar spectrum."
id = "b1eb12d4-4539-40f5-9582-dc292edcd12c"

