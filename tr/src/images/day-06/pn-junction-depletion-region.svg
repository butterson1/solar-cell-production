<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .panel { fill:white; stroke:#cbd5e1; stroke-width:2; rx:22; ry:22; }
      .title { font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .label { font: 600 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#1e293b; }
      .text { font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#334155; }
      .small { font: 500 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#475569; }
      .tiny { font: 600 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#64748b; }
      .si { fill:#cbd5e1; stroke:#64748b; stroke-width:2; }
      .p { fill:#93c5fd; stroke:#2563eb; stroke-width:2; }
      .b { fill:#fca5a5; stroke:#dc2626; stroke-width:2; }
      .accent { stroke:#0ea5e9; stroke-width:4; fill:none; }
      .green { stroke:#16a34a; fill:none; stroke-width:4; }
      .orange { stroke:#ea580c; fill:none; stroke-width:4; }
      .purple { stroke:#7c3aed; fill:none; stroke-width:4; }
      .dash { stroke-dasharray:8 8; }
      .field { stroke:#7c3aed; stroke-width:3; marker-end:url(#arrow); }
      .ray { stroke:#f59e0b; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .electron { fill:#2563eb; }
      .hole { fill:#ef4444; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text x="50" y="52" class="title">P-N eklemi ve tükenme bölgesi</text>
  
<rect class="panel" x="50" y="120" width="1100" height="460"/>
<rect x="100" y="220" width="430" height="180" fill="#fde68a" opacity="0.55"/>
<rect x="530" y="220" width="470" height="180" fill="#bfdbfe" opacity="0.6"/>
<rect x="470" y="200" width="120" height="220" fill="#e9d5ff" opacity="0.65"/>
<text x="280" y="190" class="label">p-tipi bölge</text>
<text x="700" y="190" class="label">n-tipi bölge</text>
<text x="455" y="455" class="label">tükenme bölgesi</text>
<g>
    <circle class="hole" cx="180" cy="280" r="14" fill="none" stroke="#ef4444" stroke-width="4"/><circle class="hole" cx="250" cy="330" r="14" fill="none" stroke="#ef4444" stroke-width="4"/><circle class="hole" cx="330" cy="280" r="14" fill="none" stroke="#ef4444" stroke-width="4"/><circle class="hole" cx="410" cy="335" r="14" fill="none" stroke="#ef4444" stroke-width="4"/>
    <circle class="electron" cx="690" cy="280" r="12"/><circle class="electron" cx="770" cy="340" r="12"/><circle class="electron" cx="850" cy="285" r="12"/><circle class="electron" cx="930" cy="335" r="12"/>
</g>
<g>
  <text x="500" y="250" class="small">−</text><text x="500" y="305" class="small">−</text><text x="500" y="360" class="small">−</text>
  <text x="560" y="250" class="small">+</text><text x="560" y="305" class="small">+</text><text x="560" y="360" class="small">+</text>
</g>
<line class="field" x1="570" y1="160" x2="470" y2="160"/>
<text x="470" y="140" class="text">yerleşik elektrik alanı (n → p)</text>
<path d="M 655 245 C 620 245, 595 245, 565 245" class="orange" marker-end="url(#arrow)"/>
<path d="M 435 375 C 465 375, 500 375, 520 375" class="green" marker-end="url(#arrow)"/>
<text x="650" y="228" class="small">elektron yayılımı</text>
<text x="315" y="398" class="small">delik yayılımı</text>

</svg>