<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .panel { fill:white; stroke:#cbd5e1; stroke-width:2; rx:22; ry:22; }
      .title { font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .label { font: 600 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#1e293b; }
      .text { font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#334155; }
      .small { font: 500 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#475569; }
      .tiny { font: 600 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#64748b; }
      .si { fill:#cbd5e1; stroke:#64748b; stroke-width:2; }
      .p { fill:#93c5fd; stroke:#2563eb; stroke-width:2; }
      .b { fill:#fca5a5; stroke:#dc2626; stroke-width:2; }
      .accent { stroke:#0ea5e9; stroke-width:4; fill:none; }
      .green { stroke:#16a34a; fill:none; stroke-width:4; }
      .orange { stroke:#ea580c; fill:none; stroke-width:4; }
      .purple { stroke:#7c3aed; fill:none; stroke-width:4; }
      .dash { stroke-dasharray:8 8; }
      .field { stroke:#7c3aed; stroke-width:3; marker-end:url(#arrow); }
      .ray { stroke:#f59e0b; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .electron { fill:#2563eb; }
      .hole { fill:#ef4444; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text x="50" y="52" class="title">Fosfor ve bor: fazla elektron ile delik oluşturma</text>
  
<rect class="panel" x="60" y="110" width="500" height="500"/>
<rect class="panel" x="640" y="110" width="500" height="500"/>
<text x="220" y="150" class="label">Fosfor (n-tipi)</text>
<text x="815" y="150" class="label">Bor (p-tipi)</text>
<circle class="p" cx="310" cy="330" r="40"/><text x="292" y="338" class="label">P</text>
<circle class="si" cx="210" cy="230" r="28"/><circle class="si" cx="410" cy="230" r="28"/><circle class="si" cx="210" cy="430" r="28"/><circle class="si" cx="410" cy="430" r="28"/>
<line class="accent" x1="282" y1="302" x2="230" y2="250"/><line class="accent" x1="338" y1="302" x2="390" y2="250"/><line class="accent" x1="282" y1="358" x2="230" y2="410"/><line class="accent" x1="338" y1="358" x2="390" y2="410"/>
<circle class="electron" cx="310" cy="205" r="14"/><text x="330" y="210" class="text">gevşek bağlı</text><text x="330" y="235" class="text">fazla elektron</text>
<text x="122" y="560" class="text">4 bağ + 1 serbest elektron → çoğunluk taşıyıcı: elektron</text>
<circle class="b" cx="890" cy="330" r="40"/><text x="874" y="338" class="label">B</text>
<circle class="si" cx="790" cy="230" r="28"/><circle class="si" cx="990" cy="230" r="28"/><circle class="si" cx="790" cy="430" r="28"/><circle class="si" cx="990" cy="430" r="28"/>
<line class="accent" x1="862" y1="302" x2="810" y2="250"/><line class="accent" x1="918" y1="302" x2="970" y2="250"/><line class="accent" x1="862" y1="358" x2="810" y2="410"/>
<line class="accent dash" x1="918" y1="358" x2="970" y2="410"/>
<circle cx="944" cy="384" r="16" fill="none" stroke="#ef4444" stroke-width="4"/>
<text x="968" y="390" class="text">eksik bağ = delik</text>
<text x="717" y="560" class="text">3 bağ + 1 eksik yer → çoğunluk taşıyıcı: delik</text>

</svg>