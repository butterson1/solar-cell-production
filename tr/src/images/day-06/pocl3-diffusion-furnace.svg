<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .panel { fill:white; stroke:#cbd5e1; stroke-width:2; rx:22; ry:22; }
      .title { font: 700 30px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#0f172a; }
      .label { font: 600 22px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#1e293b; }
      .text { font: 500 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#334155; }
      .small { font: 500 15px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#475569; }
      .tiny { font: 600 13px 'Inter', 'Segoe UI', Arial, sans-serif; fill:#64748b; }
      .si { fill:#cbd5e1; stroke:#64748b; stroke-width:2; }
      .p { fill:#93c5fd; stroke:#2563eb; stroke-width:2; }
      .b { fill:#fca5a5; stroke:#dc2626; stroke-width:2; }
      .accent { stroke:#0ea5e9; stroke-width:4; fill:none; }
      .green { stroke:#16a34a; fill:none; stroke-width:4; }
      .orange { stroke:#ea580c; fill:none; stroke-width:4; }
      .purple { stroke:#7c3aed; fill:none; stroke-width:4; }
      .dash { stroke-dasharray:8 8; }
      .field { stroke:#7c3aed; stroke-width:3; marker-end:url(#arrow); }
      .ray { stroke:#f59e0b; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .electron { fill:#2563eb; }
      .hole { fill:#ef4444; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text x="50" y="52" class="title">POCl₃ difüzyon fırını ve yayıcı oluşumu</text>
  
<rect class="panel" x="50" y="110" width="760" height="500"/>
<rect class="panel" x="840" y="110" width="310" height="500"/>
<text x="255" y="150" class="label">Kuvars tüplü difüzyon fırını</text>
<rect x="100" y="300" width="650" height="90" rx="45" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
<rect x="160" y="285" width="480" height="120" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<g>
  <rect x="240" y="300" width="10" height="92" fill="#94a3b8"/><rect x="285" y="300" width="10" height="92" fill="#94a3b8"/><rect x="330" y="300" width="10" height="92" fill="#94a3b8"/><rect x="375" y="300" width="10" height="92" fill="#94a3b8"/><rect x="420" y="300" width="10" height="92" fill="#94a3b8"/><rect x="465" y="300" width="10" height="92" fill="#94a3b8"/><rect x="510" y="300" width="10" height="92" fill="#94a3b8"/>
</g>
<path d="M 110 345 C 155 345, 170 345, 215 345" class="ray" marker-end="url(#arrowGold)"/>
<text x="100" y="270" class="text">N₂ + O₂ + POCl₃</text>
<text x="250" y="460" class="small">~850–900°C, parti halinde levhalar</text>
<path d="M 625 345 C 665 345, 690 345, 730 345" class="ray" marker-end="url(#arrowGold)"/>
<text x="845" y="150" class="label">Yüzey kesiti</text>
<rect x="905" y="240" width="180" height="170" fill="#e5e7eb" stroke="#64748b" stroke-width="2"/>
<rect x="905" y="240" width="180" height="22" fill="#c4b5fd"/>
<rect x="905" y="262" width="180" height="35" fill="#93c5fd"/>
<text x="927" y="257" class="small">PSG camı</text>
<text x="926" y="286" class="small">n-tipi yayıcı</text>
<text x="932" y="355" class="text">p-tipi Si taban</text>
<path d="M 1110 205 C 1085 215, 1065 225, 1040 236" class="orange" marker-end="url(#arrow)"/>
<text x="932" y="205" class="text">fosfor yüzeye gelir, sonra içeri yayılır</text>

</svg>