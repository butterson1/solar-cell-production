<text x="95" y="525" class="tiny">tam alan Al temas</text><text x="393" y="525" class="tiny">pasivasyon + yerel delik</text><text x="665" y="525" class="tiny">oksit + poli-Si temas</text><text x="955" y="525" class="tiny">simetrik düşük sıcaklık yığın</text>

