[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (5. Gün) Elmas tel testerenin benimsenmesi neden monokristalin silikon için en hızlı şekilde gerçekleşti ve multikristalin için neden geride kaldı?"
prompt.distractors = [
  "Çok kristalli silikonun daha düşük erime noktası, kesme arayüzünde lokalize termal yumuşamaya neden olarak elmas parçacıklarının aşınmak yerine çentik içine gömülmesine olanak tanır ve kesme hızını %40 azaltır.",
  "Çok kristalli külçeler için daha geniş 156 mm+ plaka formatı standardı, ekonomik sürdürülebilirlik için gereken %0,1 eşiğinin üzerine kırılma oranlarını artıran daha uzun desteklenmeyen kablo aralıkları gerektiriyordu",
  "Asahi Diamond Industrial, çok kristalli alt tabakalar için optimize edilmiş elmas tel bileşimleri konusunda özel patentlere sahipti ve bu patentler, 2018'de sona erene kadar çoklu Si pazar segmentindeki rakipleri engelledi",
]
answer.answer = "Çok kristalli silikondaki rastgele tane oryantasyonları, tane başına değişen sertlik yönleri nedeniyle elmas parçacıkları üzerinde eşit olmayan aşınma yaratarak tel bozulmasının hızlanmasına ve sürecin yeniden optimizasyonunu gerektiren daha kaba kesim yüzeylerine neden oldu"
context = "Monokristalin silikon tele eşit bir kristal yönelimi sunarak tutarlı kesme kuvvetleri sağlar. Çoklu kristaldeki her taneciğin farklı bir kristalografik yönü vardır ve bu da düzensiz mekanik yükleme oluşturur."
id = "487037e0-7ab1-45af-aa59-e7c4437cdb54"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (4. Gün) Bir Czochralski kristalinin başlangıcında oluşan son derece ince bölüm olan 'Çizgi boynu'nun amacı nedir?"
prompt.distractors = [
  "İnce boyun, soğuk tohum kristalinin 1.425°C'lik silikon eriyik yüzeyiyle ilk temas ettiğinde termal şok nedeniyle kırılmasını önleyen bir termal tampon bölgesi görevi görür.",
  "3-4 mm'lik dar çap, tüm külçe gövdesi boyunca direnç tekdüzeliğini ölçmek için hat içi kalibrasyon standardı olarak kullanılan yüksek katkı konsantrasyonu referans bölgesi oluşturur",
  "Dash boynu, kasıtlı bir mekanik zayıf nokta olarak işlev görür ve çekici mekanizmasının büyüme sırasında aşırı torkla karşılaşması durumunda kristalin tohum tutucudan temiz bir şekilde ayrılmasını sağlar.",
]
answer.answer = "İnce boyun (3-4 mm), tohum erimesi arayüzünde termal şokun neden olduğu dislokasyonları kristal yüzeye doğru yayılmaya ve sonlandırmaya zorlar, böylece tam çaplı gövde dislokasyon olmadan büyür"
context = "Tohum eriyikle temas ettiğinde termal şok milyonlarca dislokasyon yaratır. Dash'in buluşu, son derece ince bir boynun bu çıkıkları yüzeye kaymaya ve yok olmaya zorladığını fark etmesiydi."
id = "8c6b3e45-70e3-4454-a4bf-eafab2e89bea"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (3. Gün) Siemens prosesinin kilogram polisilikon başına 50-80 kWh tüketmesinin temel termodinamik nedeni nedir?"
prompt.distractors = [
  "Triklorosilanın fraksiyonel damıtılması, giderek daha düşük basınçlarda 30'dan fazla denge aşamasında tekrar tekrar kaynatmayı ve yoğunlaştırmayı gerektirir; her aşamada, 11N saflığa ulaşmak için artan enerji maliyeti eklenir.",
  "Geri dönüşüm için HCl'nin hidrojenin H₂ ve Cl₂'ye indirgenmesi 285 kJ/mol kadar endotermiktir ve stokiyometrik dengeyi korumak için 5-7 günlük biriktirme döngüsü boyunca sürekli elektrik enerjisi girişi gerektirir.",
  "İlk hidroklorinasyon reaktörü için metalürjik kalitede silikonun 100μm'nin altındaki toz haline getirilmesi, bilyalı öğütme yoluyla 25-35 kWh/kg tüketir ve CVD başlamadan önce genel proses enerji bütçesine hakim olur",
]
answer.answer = "İnce silikon çubuklar, CVD biriktirme sırasında 5-7 gün boyunca 1.000-1.100°C'ye elektrikle ısıtılmalıdır ve bu enerjinin büyük çoğunluğu, su soğutmalı reaktör çan kavanozu duvarlarına kızılötesi ısı olarak yayılır."
context = "Siemens reaktörü aslında günlerce çalışan bir radyant ısıtıcıdır. İnce çubuklar akkor halinde parlarken triklorosilan yüzeylerinde ayrışır, ancak elektrik enerjisinin çoğu soğutulmuş duvarlara termal radyasyon olarak kaybolur."
id = "8c468f34-1aa5-434d-a910-fa2c970857b5"

