[[questions]]
type = "MultipleChoice"
prompt.prompt = "ABD'da ~0,80-1,00$/Wp maliyete sahip şebeke ölçekli bir güneş enerjisi kurulumu için modülün kendisi yüzde kaçı temsil eder?"
prompt.distractors = [
  "%50-60, çünkü 0,09 ABD Doları/Wp'de bile, modül artı nakliye, tarifeler ve garanti hükümleri, etkin modül maliyetini Amerika pazarındaki toplam sistem maliyetinin neredeyse yarısına kadar itiyor",
  "%10-15, ABD anti-damping vergileri ve Bölüm 201 tarifeleri sistem dengesini ve yumuşak maliyetleri o kadar dramatik bir şekilde artırıyor ki donanım toplam kurulu fiyatın küçük bir kısmını oluşturuyor",
  "%70-80, çünkü ABD pazarına nakliye ve ithalat vergilerini içeren modülün maliyeti, Güneydoğu Asya aktarmasında hileli hileyi önleme tarifeleri uygulandıktan sonra genellikle 0,55-0,70$/Wp'dir.",
]
answer.answer = "%25-35, çünkü yumuşak maliyetler (izin, ara bağlantı, geliştirme, finansman) ve sistem dengesi donanımı (raf, invertörler, kablolama) artık toplu olarak toplam kurulu maliyete hakimdir"
context = "Modül o kadar ucuz hale geldi ki, modül dışı maliyetler (özellikle izin ve ara bağlantı kuyrukları gibi yumuşak maliyetler) artık sistem maliyetinin çoğunu temsil ediyor. Maliyetlerin daha fazla düşürülmesi düzenleme ve süreç reformunu gerektirir."
id = "b0d89405-de10-48de-9a00-336ff6686566"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (15. Gün) 1000'den fazla CZ çekicinin bulunduğu bir kristal yetiştirme salonundaki gerçek üretim darboğazı nedir?"
prompt.distractors = [
  "Eritme aşaması döngü başına 8-12 saat sürer çünkü kuvars pota astarında termal şok çatlamasını önlemek için polisilikon parçalarının kademeli olarak ısıtılması gerekir.",
  "Kristal çekme hızı, katı-sıvı arayüz dinamikleri tarafından 0,5-1,2 mm/dak ile sınırlıdır, bu da 50-70 saatlik büyüme döngüsünü külçe çıkışı için hız sınırlayıcı adım haline getirir",
  "Tohum kristalinin mevcudiyeti verimi kısıtlar çünkü dislokasyonsuz her tohum, kullanılmadan önce 2-3 haftalık özel yüzdürme bölgesi hazırlığı gerektirir",
]
answer.answer = "Sıcak bölge sarf malzemeleri (grafit potalar, ısıtıcılar ve ısı kalkanları) 4-8 çekmeden sonra bozulur ve değiştirilmeleri gerekir; bu da bakım onarımını gerçek darboğaz haline getirir"
context = "15. Günden itibaren: Kristal büyümesinin kendisi çoğunlukla otomatik beklemedir. Sınırlayıcı faktör, bakım ekiplerinin döngüler arasında sıcak bölge bileşenlerini ne kadar hızlı sökebileceği, değiştirebileceği ve yeniden birleştirebileceğidir."
id = "d5e668c6-e77c-4b25-b453-526844dc9cdb"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (14. Gün) EVA veya POE kapsülleyici filmlerin güneş modülündeki birincil rolü nedir?"
prompt.distractors = [
  "Hücre metalizasyonu ile alüminyum çerçeve arasında dielektrik yalıtım katmanı görevi görerek şebeke ölçekli dizilerde 1.500 V DC'a kadar sistem gerilimlerinde toprak arızalarını önlerler",
  "Camla eşleşen 1,49 kırılma indisine sahip bir optik bağlantı ortamı görevi görürler ve ön yüzey yansıma kayıplarını ARC kaplamanın ötesinde %2-3 oranında daha azaltırlar.",
  "Isıyı hücre sıcak noktalarından yanal olarak yayan bir termal iletim katmanı olarak işlev görürler ve hava boşluğu modülü tasarımlarına kıyasla tepe hücre sıcaklığını 8-12°C azaltırlar.",
]
answer.answer = "Uzun vadeli modül güvenilirliğini korumak için hücreleri ön cam ile arka kapak arasında lamine ederek mekanik yastıklama, nem bariyeri koruması ve optik şeffaflık sağlarlar"
context = "14. Günden itibaren: EVA/POE kapsülleyici filmler, 140-150°C'de laminasyon sırasında tüm modül katmanlarını birbirine bağlar. POE üstün nem direnci ve daha düşük PID riski sunar ve çift yüzeyli modüller için giderek daha fazla tercih edilir."
id = "98fd32fb-2357-4acd-b950-3e5eac1865f5"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (5. Gün) Neden elmas tel, silikon külçe levhalama için bulamaç bazlı testerelemenin yerini büyük ölçüde aldı?"
prompt.distractors = [
  "Elmas tel, kesme sırasında yüzey oksidasyonunu önleyen, bulamaçla kesilmiş levhaların gerektirdiği kesim sonrası HF aşındırma ihtiyacını ortadan kaldıran kapalı bir nitrojen atmosferinde çalışır.",
  "Elmas tel, <1μm pürüzlülüğe sahip daha pürüzsüz bir levha yüzeyi üretir; bu, hücre üreticilerinin dokulandırma adımını atlayıp doğrudan difüzyon işlemine geçmesine olanak tanır",
  "Elmas tel, daha az yüzey altı kristal hasarı oluşturarak %0,5 daha yüksek azınlık taşıyıcı ömrüne sahip levhalar elde edilmesini sağlar ve bu da doğrudan daha yüksek bitmiş hücre verimliliği anlamına gelir",
]
answer.answer = "Elmas tel bulamaca göre 3-5 kat daha hızlı keser, daha dar bir çentik oluşturur (daha az silikon israfı) ve 38-42μm çapa düşerek polisilikon malzeme maliyetlerinde endüstriye yıllık milyarlarca tasarruf sağlar"
context = "5. Günden itibaren: Daha ince elmas tel, kesme sırasında çentik olarak daha az silikon kaybı anlamına gelir. 120μm'den 38-42μm tele geçiş, polisilikonda tahmini olarak yılda 2-3 milyar dolar tasarruf sağladı."
id = "683b8c72-2bf2-43ce-b3be-baa0b42520a0"

