[[questions]]
type = "MultipleChoice"
prompt.prompt = "2025'in 4. çeyreğinde üretilen tipik bir 0,087$/Wp TOPCon modülünde en büyük maliyet kategorisi hangisidir?"
prompt.distractors = [
  "Yüksek kapasiteli fabrikalarda hücre işleme bütçesinin yarısını oluşturan PECVD ve LPCVD ekipman amortismanının maliyetinden kaynaklanan hücre işleme ~%21 seviyesinde",
  "Polisilikon ~%17, çünkü 6-7 $/kg spot fiyatlarda bile, %35-40 çentik kaybı hesaplandıktan sonra modül başına gereken 1,3-1,5 kg, silikonu baskın maliyet haline getiriyor",
  "Doğrudan üretim ücretleri ve fabrika elektrik tüketiminin birlikte maddi olmayan maliyetlerin büyük kısmını oluşturduğu işgücü, genel giderler ve lojistik ~%22 düzeyindedir",
]
answer.answer = "Modül montajı malzeme listesi ~%31, çünkü silikon olmayan bileşenler (cam, kapsülleyici, alüminyum çerçeve, bağlantı kutusu ve şerit) toplu olarak içindeki hücrelerden daha pahalıdır"
context = "Modül montajına yönelik BOM, modül başına kabaca 15,50-16,00 ABD Doları (~0,027 ABD Doları/Wp) tutarındadır ve bu da onu en büyük tek maliyet kategorisi haline getirir. Modülün içindeki teknolojinin maliyeti artık onu koruyan ambalajdan daha ucuz."
id = "93fadaa0-f114-431a-accd-203dd62d5226"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Neden daha yüksek hücre verimliliği güneş enerjisi üretimindeki en güçlü maliyet azaltma aracıdır?"
prompt.distractors = [
  "Daha yüksek verimli hücreler, çalışma sırasında daha az atık ısı üreterek kapsülleyici ve arka tabaka malzemeleri üzerindeki termal stresi azaltır, bu da üreticilerin daha ucuz polimer filmler kullanmasına olanak tanır",
  "TOPCon gibi gelişmiş mimariler, standart PERC hatlarında kullanılan altı serigrafi baskı geçişinden ikisini ortadan kaldırdığından, daha yüksek verimli hücreler fabrikada daha az işlem adımı gerektirir",
  "Daha yüksek verimli hücreler, fabrikaların aynı watt çıkışı için daha az sayıda paralel üretim hattını çalıştırmasına olanak tanıyarak personel gereksinimlerini yıllık gigawatt kapasite başına %15-20 oranında azaltır.",
]
answer.answer = "Çoğu modül maliyeti (cam, çerçeve, kapsülleyici, işçilik, fabrika alanı, lojistik) watt'a göre değil alana göre ölçeklenir, böylece daha yüksek verimli bir hücre aynı alanlı modülden neredeyse aynı maliyetle daha fazla watt üretir"
context = "%24 verimli bir modülün maliyeti, %22 verimli bir modülün maliyetiyle hemen hemen aynıdır (aynı cam, çerçeve ve işçilik) ancak ~%9 daha fazla güç üretir. Bu, 'ücretsiz' için watt başına maliyetin düşmesine neden olur."
id = "07b043d8-f693-4149-9c64-f3b7582cb50e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Gümüş macunu hücre işleme maliyetlerinde 'sessiz katil' yapan şey nedir?"
prompt.distractors = [
  "Gümüş macunu, birim başına 2,5 milyon dolara mal olan özel bir nitrojen atmosferli serigrafi baskı odası gerektirir ve gümüş nanoparçacık oluşumundan kaynaklanan ağ bozulması nedeniyle her 18 ayda bir değiştirilmesi gerekir.",
  "Gümüş macununun yalnızca Heraeus ve DuPont gibi Japon tedarikçilerden ithal edilmesi gerekiyor, bu da ham gümüş emtia fiyatlarına %15-20 oranında artış ekleyen bir tedarik zinciri darboğazı yaratıyor",
  "Gümüş macun baskısı, PECVD için 6.000+/saat'e karşılık 1.200 levha/saat ile hücre üretim hattındaki en yavaş adımdır ve 3 kat daha fazla yazıcı gerektiren bir üretim darboğazı yaratır.",
]
answer.answer = "TOPCon hücresi başına 10-13 mg ve ~950-1.000$/kg macun maliyetiyle, gümüş metalizasyonu modül başına 2,80-3,50$'a tekabül eder - tek bir sarf malzemesi için kabaca toplam modül maliyetinin %6-7'si."
context = "Gümüş tüketimi, endüstrinin bakır kaplama, SMBB tasarımları ve sıfır bara yaklaşımlarını takip etmesinin nedenidir. Hücre başına tasarruf edilen her miligram, 400+ GW ölçeğinde yılda yüz milyonlarca dolar değerinde, ~0,001$/Wp tasarruf anlamına gelir."
id = "dd7c0338-c5ed-4454-88a7-6d43d4f6fee8"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Neden birçok Çinli modül üreticisi 2025'teki tam yüklü üretim maliyetlerinin altında fiyatlarla ürün göndermeye devam ediyor?"
prompt.distractors = [
  "Üreticiler, yeni Tongwei ve GCL kapasitesinin devreye girmesi nedeniyle polisilikon fiyatlarının 2026'da %30-40 daha düşmesini bekliyor, bu da stok yeniden değerlemesinde mevcut üretimlerini geriye dönük olarak karlı hale getirecek",
  "Çin'in güneş modüllerindeki %13'lük ihracat vergisi indirimleri, her sevkiyatı etkili bir şekilde sübvanse ederek, hükümet indirimi de hesaba katıldığında üretim maliyetindeki belirgin kaybı net kara dönüştürüyor",
  "Modül üreticileri, 2022 fiyat zirvesi sırasında imzalanan uzun vadeli tedarik anlaşmalarına sözleşme gereği bağlı kalıyor ve bu sözleşmelerin ihlali, modül başına kayıpları aşan cezai hükümlerin tetiklenmesine neden olacak",
]
answer.answer = "Bir fabrikayı kapatmak, onu zararına çalıştırmaktan bile daha pahalıdır; borç servisi, bakım ve çekirdek personel maliyetleri ne olursa olsun devam eder; bu da klasik bir aşırı kapasite ölüm sarmalına yol açar"
context = "~1.200 GW kapasite inşa edilmesine karşılık ~500-600 GW fiili taleple birlikte, sektörde kabaca 2 kat fazla kapasite var. Üreticiler değişken maliyetleri karşılamak ve kapanmanın sabit maliyetlerinden kaçınmak için nakliyeye devam ediyor."
id = "83859773-864b-4187-966c-970b1071e757"

