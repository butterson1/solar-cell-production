[[questions]]
type = "MultipleChoice"
prompt.prompt = "BIPV ürünleri neden geleneksel güneş panellerine uygulanan aynı watt başına maliyet metriği kullanılarak adil bir şekilde değerlendirilemiyor?"
prompt.distractors = [
  "Çünkü BIPV hücreleri temelde farklı yarı iletken fiziğini kullanır ve bu da farklı bağlantı mimarileri ve bant aralığı konfigürasyonları arasında watt bazlı karşılaştırmaları anlamsız hale getirir.",
  "BIPV modülleri her zaman geleneksel panellerden daha az verimli olduğundan endüstri, hem şeffaflığı hem de üretimi hesaba katan ayrı bir lümen başına maliyet ölçüsü geliştirdi.",
  "BIPV kurulumları, optimum olmayan eğim açıları nedeniyle daha az ışınım aldığından, metriğin IEC 61853'te tanımlanan bina yönlendirme düzeltme faktörü kullanılarak ayarlanması gerekir.",
]
answer.answer = "BIPV geleneksel inşaat malzemelerinin (çatı kaplama, kaplama, cam) yerini aldığından, elektrik üretimi eklemenin gerçek artan maliyetini bulmak için yeri değiştirilen malzemenin maliyetinin çıkarılması gerekir."
context = "Bu 'maddi dengeleme' ilkesidir — BIPV, şebeke ölçekli güneş panelleriyle değil, granit, alüminyum kompozit ve üç camlı camla rekabet eder. Değiştirilen yapı malzemesi BIPV'nin 150-1.200 ABD Doları/m² maliyetini çıkardığınızda, etkin güneş enerjisi maliyeti sıfıra yaklaşabilir."
id = "e7058c8a-e3f5-4482-a1d2-6391948cad3f"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Daha az toplam enerji üretmesine rağmen, cephe BIPV sistemlerinin ticari binalar için çatıya monteli sistemlerden kWh başına daha değerli olabilmesinin ana nedeni nedir?"
prompt.distractors = [
  "Cephe panelleri, dikey yüzeylerde rüzgara maruz kalma nedeniyle daha düşük sıcaklıklarda çalışır, bu da çatı panellerine kıyasla hücre verimliliğini %8-12 artırır ve üretilen her kWh'nin değerini artırır.",
  "AB'daki bina kuralları, EPBD direktifi kapsamında cepheye monte PV sistemlerine 1,5 kat yenilenebilir enerji kredi çarpanı atayarak her kWh'nin sıfır emisyon uyumluluk hedeflerine doğru daha fazla sayılmasını sağlar.",
  "Dikey cephe panelleri, doğrudan ışın radyasyonu yerine öncelikle dağınık ışığı yakalar; bu, invertörlerin daha verimli bir şekilde dönüştürdüğü daha az voltaj dalgalanmasıyla daha yüksek kalitede DC güç üretir.",
]
answer.answer = "Cephe PV kışın ve sabah/akşam saatlerinde daha fazla güç üreterek ticari binaların elektrik tüketim profiline daha iyi uyan daha düz bir üretim eğrisi oluşturur 8 AM–6 PM."
context = "Dikey yüzeyler, güneş alçaktayken (kış, sabah, akşam) daha fazla doğrudan güneş ışığı alır, öğle vakti güneşin yüksek olduğu saatlerde ise daha az güneş ışığı alır. Bu daha düz nesil profili, ticari talep eğrileriyle çatıya monteli sistemlerin keskin öğlen zirvesinden daha iyi uyum sağlıyor."
id = "fd479421-c62c-4e7f-aaf9-fbb1db8d1208"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Neden spandrel paneller ekonomik açıdan en ilgi çekici BIPV uygulamalarından biri olarak değerlendiriliyor?"
prompt.distractors = [
  "Spandrel paneller, katlar arası yansımaların güneş ışığını opak yüzey üzerinde yoğunlaştırdığı her katın üst kısmında konumlandırıldıkları için giydirme cephede en yüksek güneş ışınımını alır.",
  "Spandrel paneller, hem dış hem de iç ofis aydınlatmasından ışık yakalayan iki yüzeyli hücreleri kullanabilir ve tek taraflı cephe BIPV modüllerine kıyasla enerji hasadını etkili bir şekilde iki katına çıkarabilir.",
  "Spandrel paneller, IEC 61215 uyarınca BIPV vizyon camı için gereken termal döngü testlerinden muaftır; bu, sertifikasyon maliyetlerini %40-60 oranında azaltır ve pazara çıkış süresini önemli ölçüde hızlandırır.",
]
answer.answer = "Köşeliklerin maliyeti zaten 150-300 ABD Doları/m² olan opak yapı elemanlarıdır, dolayısıyla tam verimli %18-20 silikon hücreler gün ışığından ödün vermeden kullanılabilir ve PV eklemenin artan maliyeti 50-100 ABD Doları/m² kadar düşük olabilir."
context = "Spandrel paneller zemin döşemelerini ve mekanik boşlukları gizlediğinden ve zaten opak olduğundan, şeffaflıktan ödün vermek söz konusu değildir. Binanın ihtiyaç duyduğu bir bileşeni değiştirirken tam monokristal verim elde edersiniz, bu da artan güneş enerjisi maliyetini çok düşük hale getirir."
id = "0cd8882f-8b90-4b12-bee9-0709b4afc911"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "ClearVue Technologies tarafından üretilenler gibi 'gerçekten şeffaf' fotovoltaik pencerelerin temel teknik sınırlaması nedir?"
prompt.distractors = [
  "UV ve IR soğurucu katmanlar termal döngü altında hızla bozulur ve pencerenin faydalı güç üretme ömrünü, verimlilik %1'in altına düşmeden önce 8-10 yıl ile sınırlandırır; bu da binanın ömründen çok daha kısadır.",
  "Şeffaf PV kaplamalar, renksel geriverim indeksini %80'in altına düşüren optik bozulmalar yaratarak iç mekanların sarımsı görünmesine ve ofisler, perakende satış veya sağlık hizmetleri ortamları için uygun olmamasına neden olur.",
  "Akım toplama için gerekli olan iletken şeffaf oksit katmanları, 50 Ω/sq'nin üzerinde tabaka direncine sahiptir ve panel boyutu 0,5 m² alanın ötesinde doğrusal olmayan şekilde artan dirençli kayıplara neden olur.",
]
answer.answer = "Verimlilik yalnızca %3,3 civarındadır çünkü camın görünür ışık fotonlarını absorbe etmek yerine iletmesi gerekir, bu da enerji hasadını görünür spektrumdan daha az toplam enerji taşıyan UV ve IR dalga boylarıyla sınırlandırır."
context = "Şeffaflık ve enerji üretimi birbirine doğrudan karşıttır; iç mekanı aydınlatmak için içinden geçen her görünür foton, emilmeyen fotondur. ClearVue, %99'luk mükemmel bir CRI ile %70 görünür ışık iletimi elde eder, ancak yalnızca %3,3 güç dönüştürme verimliliği sağlar ve kabaca 30–35 W/m² üretir."
id = "177cb2c3-64a9-4985-a008-87e51e8a13b5"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Geleneksel çatı üstü güneş panelleriyle karşılaştırıldığında modül düzeyinde güç elektroniği (MLPE'ler) neden BIPV kurulumları için özellikle kritiktir?"
prompt.distractors = [
  "BIPV modülleri, binanın elektrik sistemleriyle entegrasyonu nedeniyle daha yüksek voltajlarda çalışır ve MLPE'lerin voltajı standart şebeke bağlantılı invertörlerle uyumlu seviyelere düşürmesi gerekir.",
  "BIPV paneller topraklama çerçevesi olmadan monte edilir; dolayısıyla MLPE'ler, geleneksel topraklamalı raf sistemlerinin mekanik bağlantı kesme yoluyla elde ettiği NEC 690.12 tarafından zorunlu kılınan hızlı kapatma özelliğini sağlar.",
  "BIPV hücreleri, yüksek sıcaklıklar nedeniyle geleneksel modüllere göre daha hızlı ışık kaynaklı bozulma (LID) yaşar ve MLPE'ler, her 50 ms'de bir maksimum güç noktasını sürekli olarak yeniden kalibre ederek bunu telafi eder.",
]
answer.answer = "BIPV'da her panel, komşu binalardan, balkonlardan ve mimari özelliklerden farklı gölgelemeyle karşı karşıyadır ve dizi invertörleri, tüm panelleri en kötü performans gösterenin çıktısına uymaya zorlayarak, toplanabilir enerjinin %10-25'ini kaybeder."
context = "Dizi invertörlerindeki 'Noel ışıkları' efekti, gölgeli bir panelin tüm diziyi aşağıya çekmesi anlamına gelir. BIPV kurulumları doğası gereği karmaşık, değişken gölgeleme modellerine sahiptir, bu nedenle her panelin bağımsız çalışmasına olanak tanıyan mikro invertörler veya DC optimize ediciler, aksi durumda kaybedilen enerjinin %10-25'ini geri kazanabilir."
id = "c11923d8-976f-40ca-9a9d-f95008c08f21"

[[questions]]
type = "ShortAnswer"
