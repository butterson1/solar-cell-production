[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (23. Gün) Albedosu 0,5 olan beyaz çakıl üzerinde tek eksenli izleyicilerin kullanıldığı şebeke ölçekli bir kurulum için tipik iki yüzeyli enerji kazancı nedir?"
prompt.distractors = [
  "%5-8 kazanç, çünkü tek eksenli izleyiciler öncelikle doğrudan ışın yakalamayı iyileştirir ve neredeyse tamamen dağınık zemin yansıma modellerine bağlı olan arka taraf aydınlatmasına minimum düzeyde katkıda bulunur.",
  "%35-45 kazanç, çünkü yüksek albedolu zemin örtüsü ve sürekli izlemenin birleşimi, bitişik sıralar arasında arkadan gelen ışınımı basit albedo hesaplamalarının ötesinde artıran bir rezonans yansıma boşluğu oluşturur.",
  "%12-15 kazanç, çünkü yüksek albedolu yüzeyler arka hücrelere ulaşan yerden yansıyan ışığı artırırken, izleyicinin doğu-batı dönüşü sabah ve akşam saatlerinde zeminin etkili görüş faktörünü azaltır.",
]
answer.answer = "%20-30 kazanç, çünkü yüksek albedolu zemin yüzeyleri, iki yüzeyli modüllerin arka tarafına ulaşan dağınık ve yansıyan ışığı önemli ölçüde artırır ve izleme, gün boyunca ön taraftaki yakalamayı optimize eder."
context = "Beyaz çakıl (albedo ~0,5) gibi yüksek albedolu yüzeyler üzerindeki iki yüzeyli modüller, tek eksenli izlemeyle birleştiğinde genellikle sabit monofasiyal sistemlerden %20-30 daha fazla enerji sağlar. Çift yüzeyli panellerin altındaki zeminin albedosu kritik bir tasarım parametresidir."
id = "9c9a927f-5b7a-46f6-9c29-598be29dbbad"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (22. Gün) İki terminalli (2T) monolitik perovskit-silikon ikili hücrede, neden her iki alt hücrenin akım çıkışının dikkatli bir şekilde eşleştirilmesi gerekiyor?"
prompt.distractors = [
  "Çünkü uyumsuz akımlar, düşük akımlı hücrenin ters eğilime girmesine ve perovskit katmanını 150°C'nin üzerinde termal olarak bozan sıcak noktalar geliştirmesine neden olarak geri dönüşü olmayan halojenür ayrışmasını ve faz ayrışmasını tetikler.",
  "Çünkü paylaşılan şeffaf iletken oksit ara katmanının maksimum akım yoğunluğu eşiği 18 mA/cm²'dir ve bu eşiğin her iki alt hücrede aşılması, kırılgan ara katmanı çatlatan dirençli ısınmaya neden olur.",
  "Çünkü eşsiz akımlar, rekombinasyon bağlantısı boyunca perovskit hücresinin bant aralığını Stark etkisine doğru kaydıran ve emilim spektrumunu kalıcı olarak değiştiren bir voltaj farkı yaratır.",
]
answer.answer = "Çünkü seri bağlantılı bir 2T cihazda toplam akım, iki alt hücrenin fotoakımlarından düşük olanıyla sınırlıdır; daha yüksek üreten hücre tarafından üretilen aşırı akım, rekombinasyon katmanında ısı olarak boşa harcanır."
context = "İki terminalli tandemler alt hücreleri seri olarak bağlar, böylece cihaz akımı iki alt hücre akımının minimumuna eşit olur (en zayıf halkasıyla sınırlı bir zincir gibi). Mevcut eşleştirme, perovskit bant aralığının ve katman kalınlığının dikkatli bir şekilde ayarlanmasını gerektirir."
id = "03c6637f-c910-4b92-9316-354d24df0a04"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (9. Gün) PERC hücresi ile TOPCon'a verimlilik avantajı sağlayan TOPCon hücresi arasındaki temel yapısal fark nedir?"
prompt.distractors = [
  "TOPCon, PERC'nin 15–20 µm katmanına kıyasla 30–50 µm'lik daha kalın bir alüminyum arka yüzey alanı (Al-BSF) katmanı kullanır; bu, tükenme bölgesini yığının daha derinlerine doğru genişleterek arka taraftaki taşıyıcı toplama verimliliğini artırır.",
  "TOPCon, PERC'ın bor katkılı p-tipi silikon levhasını, ışığın neden olduğu bozulmayı (LID) ortadan kaldıran ve modülün kullanım ömrü boyunca %0,3-0,5 mutlak verimlilik avantajını koruyan galyum katkılı p-tipi levhayla değiştirir.",
  "TOPCon, PERC'nin homoeklemi yerine kristalin silikon üzerinde amorf silikonun ön tarafındaki heteroeklemi kullanır ve termalizasyon kayıplarını yaklaşık %8-12 oranında azaltan daha geniş bir bant aralığı pencere katmanı oluşturur.",
]
answer.answer = "TOPCon, arka yüzeye, sarkan bağları PERC'nin alüminyum oksit/silikon nitrür arka pasifleştirme istifinden çok daha etkili bir şekilde pasifleştiren, katkılı bir polisilikon katmanıyla desteklenen ultra ince (~1,5 nm) bir tünel oksit katmanı ekler."
context = "TOPCon (Tünel Oksit Pasifleştirilmiş Temas), ~1,5 nm SiO₂ tünel oksit artı n+ polisilikon katmanı yoluyla üstün arka yüzey pasivasyonu sağlar. Bu, kuantum tünelleme yoluyla taşıyıcı taşınmasına izin verirken arka temastaki rekombinasyonu neredeyse ortadan kaldırır."
id = "636d2ba8-29d7-485b-9cc8-ae86f42c4cc5"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "🔁 (7. Gün) Monokristalin silikon plakaların anizotropik KOH aşındırılmasıyla oluşturulan yüzey dokulu desenin adı nedir?"
answer.answer = "rastgele piramitler"
answer.alternatives = [
  "rastgele piramit dokusu",
  "piramit doku",
  "piramitler",
  "rastgele piramit",
  "ters piramitler",
]
context = "KOH çözeltisi içindeki (100) odaklı monokristalin silikonun anizotropik aşındırılması, tercihen kristal düzlemler boyunca aşındırılarak, ışığın piramit yüzleri arasında birden çok kez sıçramasına neden olarak yansımayı ~%35 ila ~%10 arasında azaltan rastgele piramitlerle (tipik olarak 1-10 µm yüksekliğinde) kaplı bir yüzey oluşturur."
id = "f5990310-d272-4e1e-9970-a04317afffa2"
