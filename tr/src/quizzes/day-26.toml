[[questions]]
type = "MultipleChoice"
prompt.prompt = "Uzay tabanlı güneş enerjisi savunucuları neden enerji üretim uyduları için alçak Dünya yörüngesi yerine sabit yörüngeye (GEO) odaklanıyor?"
prompt.distractors = [
  "GEO daha düşük radyasyon maruziyeti sağlayarak hücre bozulmasını yılda %0,5'in altına düşürür ve uydu ömrünü koruma olmadan 50+ yıla kadar uzatır",
  "GEO, III-V hücreleri yerine daha ucuz silikon hücrelerin kullanılmasına olanak tanır çünkü Van Allen kuşakları uyduyu çoğu kozmik radyasyondan korur",
  "GEO uyduları, Dünya'nın dönüşünden daha hızlı yörüngede dönerek, tek bir yer anteninin gün boyunca birden fazla uydudan güç almasına olanak tanır",
]
answer.answer = "GEO uyduları bir yer istasyonunun üzerinde sabit kalır ve yılın ~%99,5'i güneş ışığını alır, bu da tek bir antene neredeyse sürekli 7/24 güç dağıtımı sağlar"
context = "Jeostatik yörünge, uyduyu bir yer alıcısına göre sabit tutar ve uydu, ekinokslar civarında yalnızca kısa süreler (~ 72 dakika maksimum) için gölgede kalır ve neredeyse sabit güç üretimi ve iletimi sağlar."
id = "4b6ddced-0f37-4b2f-bc62-b0a9b958c6c2"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "~80.000-130.000$/m² maliyetine rağmen, uzay uygulamalarında silikon yerine III-V çoklu bağlantı hücrelerinin (InGaP/GaAs/InGaAs gibi) tercih edilmesinin birincil nedeni nedir?"
prompt.distractors = [
  "III-V hücreleri silikondan daha düşük bir sıcaklık katsayısına sahiptir ve yörüngede tam güneşe maruz kalma sırasında uydu yüzeyleri 200°C'ye ulaştığında bile en yüksek verimliliği korur",
  "III-V hücreler silikondan daha ince üretilebilir ve hücrelerin birim alan başına daha yoğun olmasına rağmen toplam uydu kütlesini %60 oranında azaltır",
  "III-V hücreleri, tutulma geçişleri sırasında ısıtıldıklarında radyasyon hasarını doğal olarak kendi kendine tavlayarak, her yörünge döngüsünde verimlilik kayıplarının çoğunu geri kazanır",
]
answer.answer = "III-V hücreleri, ultra hafif alt tabakalarda 350-450 W/kg sunarken, cam ön yüzeyli silikon için ~15-20 W/kg sunar ve her gramın piyasaya sürülmesi için paraya mal olduğu durumlarda kilogram başına watt avantajı belirleyicidir"
context = "Uzayda optimizasyon hedefi metrekare başına dolar değil, kilogram başına watt'tır. Başlatma maliyetleri bütçenin büyük kısmını oluşturduğundan, hafif III-V hücrelerin 20 kat daha iyi güç-ağırlık oranı, yüksek hücre maliyetlerini fazlasıyla telafi ediyor."
id = "35656887-07f6-4955-afd2-3932001893f5"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Yüksek konsantrasyonlu PV (HCPV) geleneksel silikon panellerin aksine bulutlu iklimlerde neden düşük performans gösteriyor?"
prompt.distractors = [
  "HCPV Fresnel lensler nemli havadaki nemi emerek optik bozulmaya neden olur ve kullanıma sunulduktan sonraki aylar içinde iletimi %40'a kadar azaltır",
  "HCPV çoklu bağlantı hücreleri, doğrudan ışın AM1.5D spektrumuna ayarlanmıştır ve dağınık ışığın maviye kayan spektrumu ile aydınlatıldığında neredeyse sıfır akım üretir",
  "HCPV çift eksenli izleyiciler, bulut örtüsü güneş diskini engellediğinde panelleri doğru bir şekilde konumlandıramaz ve bu durum, izleme dişlilerine zarar veren mekanik avlanmaya neden olur",
]
answer.answer = "Fresnel mercekler ve aynalar yalnızca tek bir yönden gelen doğrudan ışınlı güneş ışığını odaklayabilir; Bulutlar tarafından saçılan dağınık ışık her açıdan gelir ve optik olarak küçük hücrenin üzerinde yoğunlaştırılamaz."
context = "Konsantrasyon optiği, paralel ışınları bir odak noktasına yönlendirerek çalışır. Bulutlu bir gökyüzünde her yönden gelen dağınık ışık bu şekilde odaklanamaz. Geleneksel silikon paneller hala dağınık ışık kullanabiliyor çünkü her hücre fotonları geniş açıdan kabul ediyor."
id = "d5dd42e4-88e7-462b-8a3d-d31307b2a824"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Caltech'in 2023'teki SSPD-1 misyonu önemliydi çünkü MAPLE deneyi ilk kez hangi spesifik yeteneği gösterdi?"
prompt.distractors = [
  "Altı ay boyunca %30 verimliliği korurken, yörüngede 1 kW'ın üzerinde güç üreten çok bağlantılı bir güneş hücresi dizisini gösterdi.",
  "Tek bir Falcon 9 fırlatma fuarından 50 m²'lik bir diziyi dağıtarak, yörüngedeki güneş dizisi bölümlerinin otonom robotik montajını gösterdi.",
  "Alçak Dünya yörüngesinden alt derece doğrulukla hareket eden bir yer alıcısını izleyen kapalı döngü bir mikrodalga ışın yönlendirme sistemini gösterdi.",
]
answer.answer = "Özel CMOS devrelere sahip hafif, esnek mikrodalga vericileri kullanarak uzayda kablosuz güç aktarımını gösterdi ve Caltech kampüsündeki yer alıcısına tespit edilebilir bir sinyal gönderdi."
context = "MAPLE (Güç Aktarımı Düşük Yörünge Deneyi için Mikrodalga Dizisi), esnek, hafif mikrodalga verici dizilerini kullanarak uzayda gücü kablosuz olarak başarıyla iletti ve sinyali Dünya'da tespit etti; donanım yaklaşımı için bir kavram kanıtı, henüz kullanışlı güç seviyeleri değil."
id = "1d19e9e0-1c0b-4a7d-93a0-223a67ae51bf"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "500x konsantrasyonda çalışan bir yoğunlaştırıcı PV sistemi, yaklaşık ±0,5° dahilinde izleme doğruluğuna ihtiyaç duyar. İzleyici bu toleransın dışına çıkarsa ne olur?"
prompt.distractors = [
  "Çok bağlantılı hücre, odaklanmamış güneş ışığının ısı dağıtıcıya eğik açılarla çarpması ve termal yönetim sistemini tamamen atlaması nedeniyle hızla aşırı ısınır.",
  "Fresnel merceği, asimetrik aydınlatmanın yüzey alanı boyunca 80°C'yi aşan sıcaklık değişimleri yaratması nedeniyle termal stres kırıkları geliştirir.",
  "Hücrenin baypas diyotları, ters öngerilim hasarını önlemek, yanlış hizalanmış mercekten gelen gücü yönlendirmek ve dizi voltajını ayrı adımlarla azaltmak için etkinleşir",
]
answer.answer = "Odaklanan ışık noktası küçük hücreden (tipik olarak ~1 cm²) uzaklaşır, böylece yoğunlaştırılmış güneş ışığının çoğu aktif yarı iletkeni tamamen ıskalar ve çıktı hızla sıfıra doğru düşer."
context = "500x konsantrasyonda odak noktası çok küçüktür. Bir miktar yanlış hizalama derecesi bile odaklanmış ışının hücreden tamamen ayrılmasına neden olur. Hafif hizalamanın çıkışı yalnızca orantılı olarak azalttığı düz panellerin aksine, CPV, sapmaları izlerken performansta keskin bir uçuruma sahiptir."
id = "25120488-cc34-4843-a820-59feaf27463a"

