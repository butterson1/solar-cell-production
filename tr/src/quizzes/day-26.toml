[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (25. Gün) Kristalin silikon güneş panellerinin ömrünün sonunda geri dönüştürülmesinden elde edilen ekonomik açıdan en değerli malzeme nedir?"
prompt.distractors = [
  "P-n bağlantı katkı maddelerini çıkarmak için kimyasal aşındırma işleminden sonra yeniden rafine edilebilen ve yeni güneş pillerinde yeniden kullanılabilen silikon levhaların kendisi",
  "Standart 60 hücreli konut modülü başına yaklaşık 500 g yüksek saflıkta bakır içeren bakır şerit ara bağlantıları",
  "Yeni modül laminasyonu için depolimerize edilebilen ve işlenmemiş dereceli etilen vinil asetata dönüştürülebilen EVA kapsülleyici",
]
answer.answer = "Alüminyum çerçeve ve bağlantı kutusu ve ardından cam ön levha — gümüş ve silikon çok küçük miktarlarda mevcut olduğundan, bu toplu ticari malzemeler geri kazanılabilir değerin çoğunu temsil eder"
context = "Kütle ve piyasa değeri açısından, alüminyum çerçeve (modül ağırlığının ~%10'u) ve cam (ağırlığın ~%70'i) geri kazanılabilir değere hakimdir. Gümüş değerli olmasına rağmen her hücrede yalnızca miligram bulunur. Silikon levhanın teorik olarak yeniden kullanılabilir olmasına rağmen, güneş enerjisi sınıfına yeniden işlenmesi maliyetlidir."
id = "8d5f49f8-687d-42f3-b1f5-fbdaf681902e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (24. Gün) Geleneksel çatıya monte panellerle karşılaştırıldığında binaya entegre PV (BIPV) sisteminin verimliliğini hangi mimari zorluk sınırlıyor?"
prompt.distractors = [
  "BIPV modülleri, yapısal entegrasyon için daha ince cam kullanmalıdır; bu, standart modüllerdeki temperli camla karşılaştırıldığında ışık iletimini %15-20 azaltır",
  "BIPV kurulumları amorf silikon hücrelerle sınırlıdır çünkü kristalin silikon kavisli bina cephelerine ve çatı hatlarına uyum sağlayamayacak kadar serttir",
  "BIPV modülleri, bina yönetmeliği yangın güvenliği gereklilikleri nedeniyle baypas diyotları içeremez, bu da onları yıkıcı sıcak nokta arızalarına karşı savunmasız hale getirir",
]
answer.answer = "BIPV paneller binanın yönüne ve eğimine göre sabitlenir, genellikle optimum açılardan uzaktır ve sıklıkla bitişik yapılardan kısmi gölgelenmeye maruz kalır, bu da optimum şekilde yerleştirilmiş dizilere göre enerji verimini önemli ölçüde azaltır"
context = "Maksimum güneş ışığına maruz kalacak şekilde yönlendirilebilen ve eğilebilen zemine monte veya çatı üstü sistemlerden farklı olarak BIPV, binanın mevcut mimarisine uygun olmalıdır. Cepheler doğuya/batıya bakar, pencereler gölgeleme yaratır ve estetik entegrasyon çoğu zaman optimumun altında açılar anlamına gelir."
id = "ca2b45c5-cfdf-4ed7-8bee-ccecb3e63c94"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (11. Gün) Üç eklemli bir güneş hücresinde (örn. InGaP/GaAs/Ge), alt hücrelerin neden akım uyumlu olması gerekiyor ve genel cihaz akımını ne sınırlıyor?"
prompt.distractors = [
  "Akım eşleştirme termal kaçmayı önler; En yüksek akımı üreten alt hücre, diğerleri aşırı taşıyıcıları ememezse aşırı ısınır ve kafes hasarına neden olur",
  "Akım eşleştirme, her bağlantıdan eşit voltaj katkısı sağlar; toplam cihaz voltajı, uygun şekilde eşleştirildiğinde üç alt hücre voltajının ortalamasıdır",
  "Mevcut eşleştirme, foton soğurma oranlarını dengeler; bu olmadan, kullanılmayan fotonlar üst hücreden lüminesans olarak yeniden yayılır ve asla alt bağlantı noktalarına ulaşmaz.",
]
answer.answer = "Alt hücreler seri olarak bağlandığından, hepsinden aynı akımın geçmesi gerekir; böylece genel cihaz akımı, verilen spektrum altında hangi alt hücrenin en az fotoakımı ürettiğine göre sınırlanır."
context = "Seri bağlı çok bağlantılı hücreler, her bağlantı noktasından aynı akımı geçirir. En zayıf (en düşük akımlı) alt hücre darboğaz haline gelir. Spektral koşulların önemli olmasının nedeni budur; güneş spektrumundaki bir değişim, cihazı hangi bağlantı noktasının sınırladığını değiştirebilir."
id = "366658b0-ce6c-4f47-a54a-0384b9e4ebba"

