[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (6. Gün) P-n eklem katkılama işleminde, bağlantı noktasındaki yerleşik elektrik alanı neden n tarafından p tarafına doğru işaret ediyor?"
prompt.distractors = [
  "N tarafındaki elektronların daha yüksek konsantrasyonu, elektronları p tarafından iten negatif bir yük oluşturur ve geleneksel akımı p'den n'ye yönlendiren bir voltaj gradyanı oluşturur.",
  "P tarafındaki bor alıcı atomları, n tarafındaki fosfor vericilerden daha güçlü bir elektronegatifliğe sahip olup, metalurjik bağlantı arayüzü boyunca kalıcı bir dipol alanı oluşturur.",
  "Bağlantı oluşumu sırasında çoğunluk taşıyıcılarının difüzyonu, p tarafında pozitif yüklü donör iyonların ve n tarafında negatif yüklü alıcı iyonların fazlalığını oluşturur.",
]
answer.answer = "Elektronlar n'den p'ye ve delikler p'den n'ye yayıldıklarında, geride n tarafında sabit iyonize verici atomlar (+) ve p tarafında alıcı atomlar (-) bırakarak +'dan −'ye, yani n'den p'ye işaret eden bir alan oluştururlar."
context = "Tükenme bölgesi, mobil taşıyıcılar bağlantı noktası boyunca yayıldığında oluşur. Geride kalan hareketsiz iyonize katkı atomları bir uzay yükü bölgesi oluşturur: n tarafında pozitif (açıkta kalan donör iyonları) ve p tarafında negatif (açıkta kalan alıcı iyonlar). Ortaya çıkan elektrik alanı pozitif n-tarafından negatif p-tarafına doğru işaret eder."
id = "f146812f-0a4b-4d29-b994-88d9fca7ff46"

