  "CdTe panelleri, bakır rafine etme yan ürünlerinden elde edilen bol miktarda tellür kullanır ve bu da onları kristalin silikon üreticilerini etkileyen polisilikon tedarik zinciri kesintilerine karşı bağışık hale getirir.",
