[[questions]]
type = "MultipleChoice"
prompt.prompt = "Karasal güneş enerjisi için III-V çoklu bağlantı hücrelerine kıyasla perovskit-silikon tandemlerini potansiyel olarak devrim niteliğinde kılan şey nedir?"
prompt.distractors = [
  "Perovskite üst hücreleri, III-V hücrelerine göre daha yüksek mutlak verimlilik elde eder çünkü kusur toleransları, teorik maksimumun %98'ine ulaşarak ışınım sınırına daha yakın çalışmaya izin verir",
  "Perovskite tandemler, aktif soğutma olmadan 500 güneşe kadar yoğunlaştırılmış güneş ışığı altında verimli bir şekilde çalışabilir, böylece III-V yoğunlaştırıcı sistemlerin gerektirdiği takip donanımını ortadan kaldırır",
  "Perovskite malzemeleri, III-V yarı iletkenlerle karşılaştırıldığında doğası gereği üstün UV stabilitesine sahiptir, bu da onlara tipik 15 yıllık III-V bozunma döngüsüne kıyasla 40 yıllık bir çalışma ömrü sağlar.",
]
answer.answer = "Perovskite katmanları, ucuz öncüller kullanılarak mevcut silikon hücrelerin üzerine 100-150°C'de çözelti halinde biriktirilebilir; bu, potansiyel olarak silikon hücre maliyetine yalnızca %10-20 eklerken çıktıyı %20-30 artırır."
context = "Germanyum substratları üzerinde 600-700°C'de pahalı MOCVD gerektiren III-V hücrelerinin aksine, perovskitler ucuz ham maddelerle düşük sıcaklıkta çözelti işlemeyi kullanır. Bu, mevcut silikon üretim hatlarının yenilenebileceği ve tandemlerin devrim niteliğindeki bir üretim değişikliğinden ziyade kademeli olarak artırılabileceği anlamına gelir."
id = "95191e86-c400-40b8-a621-0a6e7636d379"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (9. Gün) TOPCon hücre mimarisinde arka yüzeydeki rekombinasyonu azaltan temel özellik nedir?"
prompt.distractors = [
  "Elektronları yüzeyden itmek için hem kimyasal pasifleştirme hem de sabit bir pozitif yük sağlayan, atomik katman birikimiyle biriktirilen kalın bir alüminyum oksit (Al₂O₃) katmanı",
  "Mükemmel taşıyıcı aktarımını korurken sarkan bağları doyuran, PECVD tarafından 200°C'de biriktirilen hidrojenlenmiş amorf silikon (a-Si:H) içsel tampon katmanı",
  "Emilmemiş kızılötesi fotonları hücreye geri yansıtırken yerel arka yüzey alanları oluşturan bir SiO₂ dielektrik ayna aracılığıyla lazerle ateşlenen alüminyum nokta temas modeli",
]
answer.answer = "Elektronların temas noktasına kadar kuantum tüneli oluşturmasına izin verirken yüzeyi pasifleştiren fosfor katkılı polisilikon ile kaplı ultra ince bir tünel oksit tabakası (~ 1,5 nm SiO₂)"
context = "TOPCon (Tünel Oksit Pasifleştirilmiş Kontak), kuantum tünelleme için yeterince ince, katkılı polisilikon ile kaplanmış ~1,5 nm SiO₂ katmanı kullanır. Bu, PERC'ın yerel alüminyum kontaklarına göre temel yenilik olan elektriksel teması korurken mükemmel yüzey pasifleştirmesi sağlar."
id = "e27721f2-4677-42ef-b46d-adcd0ddfab0e"

[[questions]]
