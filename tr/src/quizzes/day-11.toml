]
answer.answer = "First Solar'ın buhar aktarımlı biriktirme işlemi, 1200×600 mm'lik bir cam alt tabakanın tamamını ham camdan bitmiş modüle kadar 2,5 saatten kısa bir sürede kaplayarak sektördeki watt başına en düşük üretim maliyetine ulaşıyor"
context = "First Solar'ın cam girişinden bitmiş modüle kadar dikey entegre süreci son derece hızlı ve ucuzdur. Buhar taşıma biriktirme tekniği, çok adımlı kristalin silikon işleminden çok daha hızlıdır ve First Solar'a daha düşük hücre verimliliğine rağmen sürekli olarak düşük üretim maliyetleri sağlar."
