[[questions]]
type = "MultipleChoice"
prompt.prompt = "Tek eklemli bir silikon hücrede 3,0 eV ultraviyole fotona ne olur?"
prompt.distractors = [
  "Enerjisi bant aralığı eşiğini aştığı için silikondan emilmeden geçer ve güneş enerjisinin yaklaşık %19'unun iletim kayıplarına katkıda bulunur.",
  "Darbeli iyonizasyon yoluyla her biri yaklaşık 1,5 eV taşıyan iki elektron deliği çifti üretir, bu nedenle UV-zengin spektrumlar silikon hücre çıkışını artırır",
  "Bağlantı noktasına ulaşmadan önce yansıma önleyici kaplama tarafından emilir ve yaklaşık %65 termal kayıpla silikon nitrür tabakasında ısıya dönüşür.",
]
answer.answer = "1,12 eV değerinde bir elektron-delik çifti üretirken geri kalan 1,88 eV, neredeyse anında gerçekleşen bir süreç olan termalizasyon yoluyla atık ısı olarak kaybedilir."
context = "Bant aralığı enerjisinin üzerindeki fotonlar emilir ancak bant aralığı enerjisinde yalnızca bir elektron-delik çifti oluşturur. Fazla enerji (3,0 - 1,12 = 1,88 eV) kafes titreşimlerine (ısı) dönüşür. Bu, tek eklemli hücrelerdeki iki ana kayıp mekanizmasından biridir."
id = "9dc147f2-5297-4ff8-8701-0bb72ac90aad"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "III-V çok bağlantılı güneş pilleri neden silikon pillere göre watt başına 200-400 kat daha pahalıdır?"
prompt.distractors = [
  "Galyum ve indiyum gibi III-V yarı iletken malzemeler, sınırlı küresel rezervlere sahip son derece nadir toprak elementleridir ve bunların madenciliği, özel derin şaft çıkarma teknikleri gerektirir.",
  "Hücreler, ultra yüksek vakum koşulları altında biriktirilmesi gereken platin ve paladyum elektrot kontaklarına ihtiyaç duyar ve bu değerli metaller, watt başına maliyet dökümünde hakimdir.",
  "Altı bağlantılı mimari, her katmanın ayrı bir temiz oda tesisinde üretilmesini ve ardından arayüz başına 280°C'de altın-kalay ötektik lehimleme kullanılarak birbirine bağlanmasını gerektirir.",
]
answer.answer = "MOCVD, toksik organometalik öncülleri kullanarak 600-700°C'de tek seferde atomik bir katman halinde kristal üretir; germanyum substratlarda yalnızca 1-2 µm/saatlik büyüme oranlarıyla 100 mm levha başına ~100 ABD Doları tutarında bir maliyete sahiptir."
context = "Aşırı maliyet MOCVD üretim sürecinden kaynaklanmaktadır; inanılmaz derecede yavaştır ve pahalı öncüller ve alt tabakalar kullanır. Bu, silikon levha üretiminin seri üretim ölçeği değil, butik yarı iletken üretimidir."
id = "40056a71-3f00-434f-abbc-758fd7cece4a"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Değişen hava koşullarına karşı gerçek dünyada bir güvenlik açığı yaratan monolitik (iki terminalli) tandem hücrelerin temel kısıtlaması nedir?"
prompt.distractors = [
  "Perovskit üst katman, silikon alt hücreden farklı bir oranda termal olarak genişler ve sıcaklık değişiklikleri saatte 15°C'yi aştığında arayüzde mikro çatlaklara neden olur",
  "Her bir alt hücrenin voltaj çıkışı tam olarak eşleşmelidir ve voltaj sıcaklığa bağlı olduğundan, üst ve alt katmanlar arasındaki herhangi bir termal değişim dirençli kayıplara neden olur.",
  "Katmanlar arasındaki optik bağlantı, nemle birlikte değişen hassas bir kırılma indisi eşleşmesine bağlıdır ve iç arayüzde %8'e varan Fresnel yansıma kayıplarına neden olur.",
]
answer.answer = "Alt hücreler seri olarak kablolanmıştır, bu nedenle akımın her ikisinde de aynı olması gerekir; bu, daha zayıf olan hücrenin tüm cihazı sınırladığı anlamına gelir ve gün boyunca spektral kaymalar hangi hücrenin daha az akım ürettiğini değiştirir."
context = "Monolitik bir tandemde seri bağlantı, daha az akım üreten hücrenin tüm cihazda darboğaz oluşturması anlamına gelir. Güneş spektrumu değişir (öğle saatlerinde daha mavi, gün doğumunda/batımında daha kırmızı), mevcut eşleşmeyi hizadan çıkarır ve standart test koşullarına kıyasla verimliliği yüzde birkaç azaltır."
id = "f36c0835-c291-4f95-9514-c5f690abfac5"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Perovskit-silikon ikili hücresinin mevcut dünya rekoru verimliliği nedir ve bu rekor kimin elinde?"
prompt.distractors = [
  "Ocak 2026'da Oxford PV tarafından elde edilen %36,12, Brandenburg tesislerinde TOPCon silikon alt hücre üzerinde 1,72 eV formamidinyum-sezyum perovskit kullanılarak sertifikalandırılmıştır.",
  "%33,90, Hanwha Q Cells tarafından Mart 2025'te, heterojonksiyonlu silikon üzerine yarık kalıplı kaplama yoluyla biriktirilen tamamı çözeltiyle işlenmiş geniş bant aralıklı bir perovskit kullanılarak elde edildi",
  "Ağustos 2025'te First Solar ile işbirliği içinde metilamonyum içermeyen perovskitin arkadan temaslı silikon hücre mimarisiyle birleştirilmesiyle NREL tarafından %32,50 elde edildi",
]
answer.answer = "LONGi Nisan 2025'te %34,85'e ulaştı - NREL tarafından onaylanan bir rekor - onu %34,76 ile JinkoSolar takip etti ve her ikisi de %26,81 ile en iyi tek bağlantılı silikon hücreyi geride bıraktı."
context = "Dünyanın en büyük güneş enerjisi üreticisi LONGi, perovskit-silikon tandem rekorunu Nisan 2025'te %34,85 olarak belirledi. Bu oran halihazırda %29,4 olan teorik tek eklemli silikon sınırını çok aşıyor."
id = "a35bce2a-746b-406d-9b3c-a6d7c28f91e4"

