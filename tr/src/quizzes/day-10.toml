  "170 mikron",
  "160 mikron",
  "150 mikron",
  "180 mikron",
  "yaklaşık 170 mikron",
]
context = "Modern elmas tel testereler, levhaları on yıl önce 300+ μm'den 150-180 μm kalınlığa kadar kesiyordu. Daha fazla incelme, yüksek hızlı hücre işleme sırasında levhanın kırılmasıyla sınırlıdır."
id = "d10-q10"
