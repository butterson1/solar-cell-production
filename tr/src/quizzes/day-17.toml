[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (16. Gün) Güneş enerjisi üretim ekonomisi bağlamında 'Swanson Yasası' nedir?"
prompt.distractors = [
  "Hücre dönüşüm verimliliğindeki her %10'luk iyileşme için, modül üretim maliyetleri, çıkış kapasitesinin watt başına daha az hücreye ihtiyaç duyulması nedeniyle yaklaşık %18 azalır.",
  "Açılan her gigawatt ölçekli fabrika için, artan talebin tedarikçinin rafineri kapasitesinin arttırılmasına yönelik yatırımlarını tetiklemesi nedeniyle bölgesel polisilikon fiyatları yaklaşık %8 oranında düşüyor.",
  "Sürdürülebilir Ar-Ge yatırımlarının her beş yıllık dönemi için, ticari silikon hücrelerin teorik verimlilik tavanı yaklaşık 1,5 mutlak yüzde puanı artar.",
]
answer.answer = "Kümülatif sevk edilen güneş enerjisi kapasitesinin her iki katına çıkmasıyla, modül fiyatları yaklaşık %24 düşüyor; bu, 1970'lerden bu yana oldukça istikrarlı bir şekilde devam eden ampirik bir öğrenme eğrisi gözlemi."
context = "Swanson Yasası bir fizik yasası değil, ampirik bir gözlemdir. %24'lük öğrenme oranı, yüzlerce spesifik mühendislik iyileştirmesinin, ölçek etkisinin ve tedarik zinciri optimizasyonlarının on yıllar boyunca kümülatif etkisini yansıtıyor."
id = "e32aecc2-f09a-41a5-82fd-36e235c4660f"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (15. Gün) Dikey olarak entegre edilmiş modern bir güneş enerjisi fabrikasında, ham polisilikondan bitmiş, test edilmiş modüle, nakliyeye hazır hale gelene kadar yaklaşık toplam yolculuk süresi nedir?"
prompt.distractors = [
  "Hat içi kristal büyütme ve lazer işleme ile sürekli akışlı üretim, üretim zincirindeki tüm geleneksel toplu işleme darboğazlarını ortadan kaldırdığından yaklaşık 12-18 saat",
  "Yaklaşık 2-3 hafta, çünkü polisilikon Czochralski büyümeden önce 10 günlük bir saflaştırma döngüsüne ve ardından iç kristal stresini azaltmak için 5 günlük bir tavlama işlemine tabi tutulmalıdır.",
  "Dilimlemeden sonra gofretlerin zorunlu 30 günlük baharatlanması ve modüller gönderilmeden önce IEC sertifikasyonu için gereken 14 günlük yanma testi süresi nedeniyle yaklaşık 8-12 hafta",
]
answer.answer = "Toplamda kabaca 3-5 gün; kristal büyümesi külçe başına 2-3 gün ile en uzun sürerken, levhalama, hücre işleme ve modül montajı gibi aşağı yöndeki adımların her birinin tamamlanması saatler alır"
context = "Czochralski kristal büyüme süreci ilerleme hızı açısından bir darboğazdır; tek bir külçenin çekilmesi 2-3 gün sürer. Ancak modern fabrikalar birçok fırını paralel olarak çalıştırıyor. Aşağı yöndeki adımlar (wafering, hücre hatları, modül montajı) oldukça paraleldir ve her biri parti başına yalnızca saatler alır."
id = "c96843d0-6785-4cda-953a-4b747f0b071a"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (3. Gün) Siemens'in polisilikon saflaştırma sürecinde, yarı iletken dereceli silikon üreten temel kimyasal reaksiyon nedir?"
prompt.distractors = [
  "Silikon tetraflorür (SiF₄), kapalı bir reaktörde 800°C'de erimiş sodyum metal ile indirgenir, soğutulmuş grafit substratlar üzerinde saf silikon biriktirilirken bir yan ürün olarak sodyum florür üretilir.",
  "Silan gazı (SiH₄), akışkan yataklı bir reaktörde 600°C'de termal olarak ayrışır; burada silikon atomları, 8-12 saat içinde granüler polisilikon peletlere dönüşen tohum parçacıkları üzerinde çekirdeklenir.",
  "Metalurjik kalitede silikon, diklorosilanı (SiH₂Cl₂) oluşturmak için 350°C'de hidroklorik asit içinde eritilir ve daha sonra %99,9999 saf silikon biriktirmek üzere erimiş tuz banyosunda elektrolitik olarak indirgenir.",
]
answer.answer = "Triklorosilan gazı (SiHCl₃), bir fanus reaktörünün içinde kabaca 1.100°C sıcaklıkta ısıtılmış silikon tohum çubukları üzerinden geçirilir, burada termal olarak ayrışır ve ultra saf silikonu çubukların üzerine biriktirir."
context = "Siemens prosesi, metalürjik kalitede silikonu HCl ile reaksiyona sokarak triklorosilan (SiHCl₃) üretiyor ve bu daha sonra aşırı saflığa kadar damıtılıyor ve bir fanus (Siemens) reaktöründe ~1.100°C'de ince silikon tohum çubukları üzerinde ayrıştırılıyor. Bu kimyasal buhar biriktirme, 9N+ (%99,9999999) saflıkta silikon üretir."
id = "668ad3ca-0801-419d-ac79-c0c670cd317e"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "🔁 (6. Gün) Standart bir silikon güneş hücresinde p-tipi ve n-tipi katmanları oluşturmak için kullanılan iki tür katkı atomu nelerdir?"
answer.answer = "p-tipi için bor ve n-tipi için fosfor"
answer.alternatives = [
  "bor ve fosfor",
  "fosfor ve bor",
  "B ve P",
  "bor (p-tipi) ve fosfor (n-tipi)",
]
context = "Bor (Grup III, silikondan bir eksik değerlik elektronu), p tipi katkılama için elektron 'delikleri' oluşturur. Fosfor (Grup V, bir ekstra değerlik elektronu), n-tipi katkılama için serbest elektronlar sağlar. Bağlantıları, fotojenlenmiş yük taşıyıcılarını ayıran elektrik alanını yaratır."
id = "d5a2ebcc-9fb2-4a5b-9167-b2e2a37244e5"
