[[questions]]
type = "MultipleChoice"
prompt.prompt = "Pişirim sürecinde cam hamurunun gümüş hamurundaki rolü nedir?"
prompt.distractors = [
  "Gümüş parçacıklarının erime noktasını 960°C'den 400°C'ye düşüren bir sinterleme akışı görevi görür ve bunların daha ucuz düşük sıcaklıklı bant fırınları kullanılarak sürekli iletken bir film halinde kaynaşmasına olanak tanır.",
  "Gümüş şebeke çizgisi ile silikon yayıcı arasında kalıcı bir yalıtım bariyeri oluşturarak gümüş atomunun bağlantı noktasına geçişini önlerken kuantum tünelleme yoluyla akım akımına da izin verir.",
  "Her parçacığın etrafında koruyucu bir gümüş oksit kabuk oluşturmak için en yüksek sıcaklıkta atmosferik oksijenle reaksiyona girer, uzun vadeli oksidasyonu önler ve sahada 25 yıllık temas stabilitesi sağlar.",
]
answer.answer = "500-650°C'de erir ve kurşun oksit (PbO) kullanarak SiNₓ yansıma önleyici kaplamayı kimyasal olarak aşındırarak silikon yayıcı yüzeyini açığa çıkarır, böylece gümüş yarı iletkenle doğrudan elektrik teması kurabilir"
context = "Tipik olarak kurşun-borosilikat (PbO-B₂O₃-SiO₂) olan cam malzemesi, ateşleme sırasında aşındırıcı bir sıvı haline gelir. PbO, silikon nitrürü ARC çözer ve çözünmüş gümüşün silikon yüzeyine kristalitler halinde çökeldiği kanallar oluşturur."
id = "a33d86e6-fe19-49f8-93f8-13b2eecb22b6"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Bakırın kilogram başına maliyetinin yaklaşık 1/100'ü kadar olmasına rağmen güneş enerjisi endüstrisi serigrafi baskı kontakları için neden bakır yerine gümüş kullanıyor?"
prompt.distractors = [
  "Bakırın toplu direnci gümüşten kabaca 10 kat daha yüksektir (1,59 × 10⁻⁷ vs 1,59 × 10⁻⁸ Ω·m), bu nedenle temas parmaklarının aynı akımı taşımak için 10 kat daha geniş olması gerekir, bu da kabul edilemez gölgeleme kayıplarına neden olur",
  "Bakır macunu, ortak pişirmede kullanılan 750-850°C'lik en yüksek pişirme sıcaklıklarına dayanamaz çünkü bakır 660°C'de erir ve levha yüzeyini tahrip eder; gümüşün 960°C'lik erime noktası ise marj sağlar",
  "Bakır, pişirme adımı sırasında hidroflorik asit işlemi olmadan çıkarılamayan kalın, yalıtkan bir doğal oksit tabakası oluşturur, bu da kontakları standart modül ara bağlantısı için lehimlenemez hale getirir",
]
answer.answer = "Bakır, orta sıcaklıklarda bile hızlı bir şekilde silikonun içine difüze olur ve azınlık taşıyıcı ömrünü yok eden derin seviyede rekombinasyon merkezleri oluşturur; bu da proses karmaşıklığını artıran pahalı bariyer katmanları (Ni, W) gerektirir"
context = "Bakır gümüşten yalnızca %6 daha dirençlidir (1,68'e karşı 1,59 × 10⁻⁸ Ω·m), dolayısıyla iletkenlik sorun değildir. Sorun, bakırın silikondaki hızlı interstisyel difüzyonudur ve bu da bağlantı noktasını zehirler. HJT hücreleri bakır için en iyi adaylardır çünkü a-Si katmanları doğal olarak bakır difüzyonunu engeller."
id = "537571a8-9b65-4280-a6eb-eb3f318ad85d"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Birlikte pişirme sırasında, levha en yüksek sıcaklıkta (750-850°C) yalnızca 1-3 saniye geçirir. Bu kısa termal artış sırasında arka tarafta ne olur?"
prompt.distractors = [
  "Ekran baskılı gümüş arka baralar tamamen erir ve soğurulmamış yakın kızılötesi fotonları ikinci bir soğurma geçişi için hücreye geri gönderen aynasal bir ayna katmanı halinde yeniden katılaşır.",
  "Alüminyum yüzey üzerinde atmosferik oksidasyon yoluyla kendiliğinden ince bir titanyum dioksit tabakası oluşur ve ön taraftaki SiNₓ kaplamaya eşdeğer arka taraftaki pasivasyon performansını sağlar",
  "Arka taraftaki silikon nitrür kaplama katmanı, yoğun bir alfa fazı seramiği halinde hızlı kristalleşmeye uğrar ve herhangi bir ek kapsülleme olmadan hücreyi nem girişine karşı kalıcı olarak yalıtır.",
]
answer.answer = "577°C ötektikte silikonlu alüminyum macun alaşımları, azınlık taşıyıcıları iten ve arka rekombinasyon kayıplarını azaltan 5-10 μm derinliğinde p⁺ katkılı bir arka yüzey alanı (BSF) oluşturur"
context = "577°C'deki Al-Si ötektiği, alüminyumun silikon içinde çözünmesini ve yoğun p⁺ katkılı bir bölge olarak yeniden katılaşmasını sağlar. Bu BSF bir 'elektron aynası' görevi görür; arkaya doğru sürüklenen azınlık taşıyıcıları, fotoakıma katkıda bulunabilecekleri topluluğa yansıtılır."
id = "1d93b5e2-8b17-4814-b876-309287591349"

