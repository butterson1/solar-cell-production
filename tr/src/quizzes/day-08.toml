  "7.000 ton",
  "7000'in üzerinde",
  "7217",
]
context = "PV gümüş talebi 2024'te yaklaşık 7.000-7.200 tona ulaşarak toplam küresel gümüş madeni üretiminin yaklaşık %20'sine (~26.000 ton/yıl) ulaştı ve PV dünya çapında en büyük endüstriyel gümüş tüketicisi oldu."
id = "a31f646b-4b56-4279-a1ec-9967e006a9df"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Gümüş macunu kayma inceltici (Newtonian olmayan) bir sıvı olarak tanımlanır. Bu, serigrafi baskı sırasında pratikte ne anlama geliyor?"
prompt.distractors = [
  "Silecek aşağıya doğru basınç uyguladığında macun daha viskoz hale gelir, bu da onu şeklini elek ağına karşı sıkı bir şekilde tutmaya zorlar ve basınç boşalana kadar açıklıklardan herhangi bir akışı engeller.",
  "Macun, silecek hızından veya uygulanan basınçtan bağımsız olarak sabit viskoziteyi (~200 Pa·s) korur ve yazıcı ister 100 mm/s'de ister 400 mm/s'de çalışsın, eşit parmak çizgisi genişliği sağlar",
  "Organik bağlayıcının geri döndürülemez şekilde parçalanması nedeniyle ilk silecek geçişinden sonra macun kalıcı olarak daha az viskoz hale gelir ve tutarlı parmak geometrisini korumak için her bir levha için taze macun gerekir.",
]
answer.answer = "Macun, basılı şeklini korumak için dinlenme halindeyken yüksek viskoziteye (200-400 Pa·s) sahiptir, ancak sileceğin kesme kuvveti altında çok daha düşük viskoziteye (20-50 Pa·s) düşerek ince elek açıklıklarından düzgün akışa olanak tanır"
context = "Kesme inceltme davranışı serigrafi baskı için gereklidir. Dinlenme halindeyken macun, keskin bir çizgi profilini çökmeden tutacak kadar kalındır. Kesme altında viskozite ~10 kat düşerek 20 μm kadar dar açıklıklardan akışı mümkün kılar."
id = "b087820b-ac61-4b8e-ad84-a8aa01d744bf"

