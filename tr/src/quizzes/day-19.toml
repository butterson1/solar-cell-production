[[questions]]
type = "MultipleChoice"
prompt.prompt = "Silikon güneş hücresinin elektrolüminesans (EL) görüntüsünde, şönt kusuru tipik olarak şu şekilde görünür:"
prompt.distractors = [
  "Tüm taşıyıcıları bağlantı noktasından eşit şekilde uzaklaştıran ve herhangi bir ışınımsal rekombinasyonu önleyen şantın neden olduğu, tüm hücre boyunca eşit derecede karanlık bir bölge",
  "Fosfor difüzyonunun yerel doping konsantrasyonunu arttırdığı ve çevredeki ışınımsal rekombinasyon oranını arttırdığı hücre kenarı boyunca parlak bir çizgi",
  "Şönt akımı tercihen metalizasyon şebeke çizgileri boyunca baraya doğru çektiği için parmak aralığına uygun bir dizi koyu paralel şerit",
]
answer.answer = "Karanlık bir hale ile çevrelenmiş parlak bir nokta, çünkü çevredeki bölge taşıyıcılardan yoksun kalırken ve daha az parlaklık üretirken akım şönt bölgesinden geçirilir"
context = "Şöntler, kavşak boyunca lokalize düşük dirençli yollar oluşturur. Akım şant boyunca (parlak nokta) yoğunlaşırken çevredeki alanlar taşıyıcı yoğunluğunu (koyu hale) kaybeder. Bu durum mantığa aykırıdır çünkü kusurlu bölge karanlık değil parlak görünür."
id = "1a48b1f2-512e-431d-8883-2cef0309da5b"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Bir güneş hücresinin IV eğrisi normal bir kısa devre akımını gösterir, ancak eğimli üst kenarı ile keskin bir şekilde azaltılmış doldurma faktörünü gösterir. Hangi parazit direncinin yüksek olması muhtemeldir?"
prompt.distractors = [
  "Şönt direnci (Rsh) çok düşük, bağlantı noktası boyunca IV eğrisinde sol kenarın eğimli olması ve kısa devre koşullarında akımın azalması şeklinde ortaya çıkan akım sızıntısına neden oluyor",
  "Arka alüminyum BSF katmanındaki temas direnci çok yüksektir; bu, IV eğri şeklini etkilemek yerine öncelikle arka yüzeydeki rekombinasyonu artırarak Voc'yi azaltır.",
  "Aşırı fosfor katkısı nedeniyle yayıcı tabaka direnci çok düşük, bu da Auger rekombinasyonunu artırıyor ve IV eğrisinin hem akım hem de voltaj eksenlerini simetrik olarak sıkıştırıyor",
]
answer.answer = "Seri direnç (Rs) çok yüksektir, parmaklar, baralar veya kontaklar arasındaki akım yolunda aşırı dirençli kayıplar yaratır, bu da voltaj arttıkça akımın düşmesine neden olur"
context = "Yüksek seri direnç özellikle IV eğrisinin üst (yüksek akım) kısmının aşağı doğru eğim yapmasına neden olur. Her ilave 0,1 Ω·cm² Rs, doldurma faktörünü kabaca yüzde 1-2 puan düşürür. Düşük şönt direnci ise sol kenarın eğilmesine neden olur."
id = "c1f45185-9ac0-47ed-a490-1096145f340e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Bir güneş hücresi üretim hattında fotolüminesans (PL) görüntülemenin elektrolüminesans (EL) görüntülemeye göre birincil avantajı nedir?"
prompt.distractors = [
  "PL görüntüleme, maliyeti 1.000 doların altında olan görünür dalga boylu kameralar kullanır, bu da onu 950-1300 nm aralığında çalışan pahalı InGaAs sensörleri gerektiren EL sistemlerinden en az 10 kat daha ucuz hale getirir",
  "PL görüntüleme, lazer uyarma kaynağının EL ölçümlerinde kullanılan yaygın akım enjeksiyonundan daha hassas bir şekilde odaklanabilmesi nedeniyle daha yüksek uzaysal çözünürlük (10 μm'nin altında) elde eder",
  "PL görüntüleme, kapsüllenmiş bitmiş modüllerdeki kusurları EL'den daha etkili bir şekilde tespit edebilir, çünkü optik uyarım minimum sinyal zayıflamasıyla camdan ve EVA katmanlardan geçer",
]
answer.answer = "PL görüntüleme hiçbir elektrik kontağı gerektirmeden ham işlenmemiş plakaların metalizasyondan önce incelenmesine olanak tanır ve bu da maliyetli sonraki işlem adımlarından önce malzeme kusurlarını yakalar"
context = "PL'ın en önemli avantajı temassız işlemdir. EL, akımın enjekte edilmesini gerektirir, bu da hücrenin tamamlanmış bağlantılara ihtiyacı olduğu anlamına gelir. PL optik uyarma (tipik olarak 808 nm lazer/LED) kullanır ve kesilmiş plakalardan bitmiş hücrelere kadar birçok aşamada kusur tespitine olanak tanır."
id = "442700e6-3c2f-458e-9efc-8cb5d8159d02"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "72 hücreli seri bağlı modüldeki tek bir hücre %30 gölgeli hale gelir. O hücreye ne olacak?"
prompt.distractors = [
  "Gölgeli hücre, nominal çıkışının %70'inde güç üretmeye devam eder ve modül akımı, o hücrenin azaltılmış katkısına uyacak şekilde otomatik olarak aşağı doğru ayarlanır.",
  "Gölgeli hücre, ileri yönlü arıza moduna girer ve burada azaltılmış akımı telafi etmek için aşırı voltaj üretir ve bağlantı noktasında lokalize taşıyıcı çoğalmasına neden olur.",
  "Gölgeli hücre, dahili bağlantı kapasitansı aracılığıyla diziden elektriksel olarak ayrılır ve geri kalan 71 hücrenin, hücre başına biraz daha yüksek bir voltajda normal şekilde çalışmasına olanak tanır.",
]
answer.answer = "Gölgeli hücre ters kutuplu hale gelir ve diğer hücrelerden gücü emer, bunu ısı olarak dağıtır çünkü gölgesiz hücreler tarafından seri olarak ayarlanan dizi akımını koruyamaz"
context = "Bir seri dizide tüm hücrelerin aynı akımı taşıması gerekir. Bir hücre gerekli akımı üretemediğinde, ters kutuplu hale gelir ve kaynak yerine yük görevi görür. Diğer hücrelerden gelen güç ısı olarak dağıtılır ve potansiyel olarak 150-200°C veya daha yüksek bir sıcaklığa ulaşır."
id = "e45ebcea-bc7d-4c04-90a2-8272dd3187d0"

[[questions]]
