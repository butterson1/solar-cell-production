]
answer.answer = "0,03-0,04 $/kWh seviyesindeki ucuz kömür yakıtlı elektrik, enerji yoğun süreci mevcut polisilikon fiyatlarıyla karlı hale getiriyor"
context = "Polisilikon kg başına 7-10 dolara satıldığında ve üretimi 60-80 kWh'ye ihtiyaç duyduğunda, elektrik maliyeti baskın değişken oluyor. 0,04 ABD Doları/kWh seviyesinde, elektriğin maliyeti ~2,80 ABD Doları/kg; 0,10 ABD Doları/kWh'de bu, 7,00 ABD Doları/kg'dır; kâr ve zarar arasındaki farktır."
id = "6048297b-f8f8-48f9-a268-bae802b032d1"

