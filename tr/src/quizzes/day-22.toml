[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (21. Gün) Modern perovskit güneş hücresi bileşimlerinde A bölgesi katyonu olarak neden formamidinyum (FA) metilamonyuma (MA) tercih edilir?"
prompt.distractors = [
  "FA, MA'den daha küçük bir iyon yarıçapına sahiptir; bu, perovskit kafesini daraltır ve soğurucu katmanın yoğunluğunu arttırır, bu da MA- bazlı bileşimlere kıyasla birim kalınlık başına kabaca 3 kat daha yüksek emme katsayısı sağlar.",
  "FA, MA'ye göre iyodür anyonlarıyla daha güçlü kovalent bağlar oluşturarak, fotojenlenmiş taşıyıcılarla daha verimli bir şekilde birleşen fonon frekanslarına sahip daha sert bir kristal çerçeve oluşturarak yük ekstraksiyonunu ~%25 oranında artırır.",
  "FA, MA-bazlı perovskitlerde bulunan ferroelektrik polarizasyon alanlarını ortadan kaldıran simetrik bir moleküldür; aksi halde tane sınırlarında rastgele dipol oryantasyonu yoluyla 50-80 mV'lik dahili voltaj kayıpları yaratır.",
]
answer.answer = "MA, ~85°C'nin (çatı panellerinin yaz aylarında rutin olarak ulaştığı bir sıcaklık) üzerinde perovskit kafesinden buharlaşmaya başlarken, FA termal olarak önemli ölçüde daha kararlı olup, FA-zengin bileşimleri gerçek çalışma koşulları altında daha dayanıklı hale getirir."
context = "Metilamonyum ~85°C'nin üzerinde uçucudur. Güneş panelleri düzenli olarak bu sıcaklıklara ulaştığından, pratik cihaz ömrü için bu alan, termal olarak stabil formamidinyum açısından zengin bileşimlere yönelmiştir."
id = "3802bc29-5413-44e9-b0de-f1529f8e6f44"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (20. Gün) IEC 61215 nem-ısı testinde, bir güneş modülünün kalifikasyonu geçebilmesi için hayatta kalması gereken standart koşullar ve süreler nelerdir?"
prompt.distractors = [
  "2.000 saat boyunca sürekli olarak 65°C'ye ve %95 bağıl neme maruz kalma, güç kaybının 500 saatlik aralıklarla ölçülmesi ve tüm sırayı geçmek için her kontrol noktasında %3'ten az kayıp gerektirmesi.",
  "Toplam 500 döngü boyunca 12 saat boyunca 85°C/%85 RH ve 12 saat boyunca -40°C/kuru döngüsel maruz kalma, aynı yeterlilik protokolü kapsamında hem nem girişini hem de termal yorgunluğu aynı anda test eder.",
  "1.500 saat boyunca 75°C ve %90 bağıl neme maruz bırakma, aynı anda 60 kWh/m²'de UV ışınlamayla bir araya gelerek hem kapsülleyicinin hem de hücrenin birleşik stres etkenleri altında gerçek hayatta hızlandırılmış yaşlanmasını simüle eder.",
]
answer.answer = "1.000 saat boyunca sürekli olarak 85°C ve %85 bağıl neme maruz kalma; bu sürenin ardından modülün yeterlilik testi dizisini geçebilmesi için başlangıçtaki nominal güç çıkışının en az %95'ini koruması gerekir."
context = "IEC 61215 nem-ısı testi, modülleri sürekli olarak 1.000 saat boyunca 85°C/%85 RH'ye tabi tutar. Modüller başlangıç ​​gücünün ≥%95'ini korumalıdır. Bu, yeni ortaya çıkan tandem teknolojisi de dahil olmak üzere ticari güneş panelleri için önemli bir güvenilirlik kapısıdır."
id = "91dd759f-6750-47f5-a0bd-9612f9eec1b9"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (12. Gün) Shockley-Queisser ayrıntılı denge limitine göre, konsantre olmayan AM1.5G güneş ışığı altında 1,34 eV bant aralığına sahip tek bağlantılı bir güneş hücresinin yaklaşık teorik maksimum verimliliği nedir?"
prompt.distractors = [
  "Yaklaşık %29, öncelikli olarak dolaylı bant aralıklı malzemelerdeki Auger rekombinasyonu ile sınırlıdır; bu, bant aralığı optimizasyonuna veya malzeme kalitesine bakılmaksızın tek bağlantı hücrelerinin tam ışınım sınırına ulaşmasını engeller.",
  "Yaklaşık %37, yalnızca yaklaşık 500 güneşte yoğunlaştırılmış güneş ışığı altında elde edilebilir, çünkü yoğunlaşmamışlık sınırı, dağınık güneş ışığı ile dar açılı hücre emisyonu arasındaki uyumsuzluktan kaynaklanan entropi üretimi tarafından azaltılır.",
  "Yaklaşık %41; bu, kullanılabilir voltajı bant aralığı enerjisinin altına düşüren kaçınılmaz fonon destekli geçişler de dahil olmak üzere, mükemmel bir malzemedeki tüm ışınımlı ve ışınımsız kayıpları açıklar.",
]
answer.answer = "Yaklaşık %33,7, alt bant aralığı iletim kayıpları ile bant aralığı üstü termalizasyon kayıpları arasındaki dengeyle belirlenir ve yalnızca 300 K'de hücreden ışınımsal rekombinasyon ve kara cisim emisyonu varsayılır."
context = "Shockley-Queisser sınırı, 1-güneş AM1.5G aydınlatma altında 1,34 eV bant aralığı için ~%33,7'ye ulaşır. Termalleştirmeyi, alt bant aralığı şeffaflığını, ışınımsal rekombinasyonu ve kara cisim emisyonunu hesaba katar."
id = "ea591027-cfd1-4019-8e2d-5884c84f2be4"

