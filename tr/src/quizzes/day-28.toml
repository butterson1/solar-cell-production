  "0,02 ila 0,05",
]
context = "Güneşli bölgelerdeki güneş enerjisi LCOE 0,02–0,05 $/kWh'ye düştü ve bu da onu tarihteki tüm fosil yakıtlardan daha ucuz hale getirdi."
id = "e76bfbea-b9a1-43a2-a2d8-8a4ed8be68b0"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (26. Gün) Ters kare yasası, Dünya yüzeyine enerji ışınlayacak uzay merkezli güneş enerjisi santralleri için neden temel bir zorluktur?"
prompt.distractors = [
  "Ters kare kanunu, güneş paneli verimliliğinin Güneş'e olan mesafenin karesi ile azalması anlamına gelir, dolayısıyla yüksek yörüngedeki paneller birim alan başına katlanarak daha az güç üretir.",
  "Ters kare yasası, mikrodalga veya lazer ışınının yörüngeden yere giderken yayılmasına neden olur ve kilometrelerce çapında çok büyük alıcı antenler (rektennalar) gerektirir.",
  "Ters kare kanunu, iletilen ışının atmosferik emiliminin yükseklikle karesel olarak arttığı ve daha yüksek yörüngelerin güç ışınlaması için giderek daha az uygun hale geldiği anlamına gelir.",
]
answer.answer = "Ters kare yasası, iletim sırasında ışın sapmasını yönetir: Sıkıca odaklanmış mikrodalga ışınları bile sabit yörüngeden 36.000 km'ye yayılır ve enerji yoğunluğunu kaybeder."
context = "Sabit yörüngeden Dünya yüzeyine kadar yaklaşık 36.000 km'lik ışın sapması, ters kare yasası ve kırınım limitleri tarafından yönetilir ve çok büyük iletim ve alma açıklıkları gerektirir."
id = "9d865970-1816-42d0-b159-9fa1c43449cc"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (27. Gün) Tek eklemli silikon güneş hücresi için mevcut laboratuvar verimlilik rekoru nedir ve bunu hangi şirket başardı?"
prompt.distractors = [
  "%29,4'ü SunPower tarafından, n-tipi CZ plaka alt katmanı üzerinde bakır elektrokaplama ve gelişmiş yüzey pasifleştirme ile arka temaslı IBC mimarisi kullanılarak",
  "%26,1, Trina Solar tarafından, poli-Si pasifleştirici kontaklara ve geniş alanlı bir ticari plaka üzerinde optimize edilmiş fosfor katkılı yayıcıya sahip bir TOPCon mimarisi kullanılarak",
  "%28,6 Kaneka tarafından, ara reflektör katmanları ve ön ve arka silikon emiciler arasında spektrum bölmeli tandem heteroeklem yapısı kullanılıyor",
]
answer.answer = "Üstün amorf silikon yüzey pasifleştirmesi yoluyla olağanüstü yüksek açık devre voltajı elde eden HJT (heteroeklem) hücre mimarisi kullanan LONGi tarafından %27,3"
context = "LONGi, olağanüstü yüzey pasivasyonu ve yüksek açık devre voltajı sağlayan HJT mimarisiyle elde edilen %27,3'lük tek bağlantı silikon verimlilik rekorunu elinde tutuyor."
id = "3cc9444e-8842-4bea-9982-0089554b1d73"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (3. Gün) Siemens prosesinde neden triklorosilan (SiHCl₃) silikon saflaştırması için doğrudan katı silikonu saflaştırmak yerine tercih edilen ara bileşiktir?"
prompt.distractors = [
  "Triklorosilan, demir ve alüminyum gibi metalik yabancı maddelerle seçici olarak bağlanarak filtrelenebilen stabil çökeltiler oluşturur ve çözeltide saf SiHCl₃ bırakır",
  "Triklorosilan, katotta saf silikon biriktiren ve yabancı maddeler elektrolit banyosunda çözünmüş halde kalan sulu bir çözelti içinde elektrolize edilebilir.",
  "Triklorosilan, düşük sıcaklıklarda oksijenle reaksiyona girerek buharlaşan uçucu safsızlık oksitleri oluşturur ve geride giderek daha saf silikon bileşiği bırakır.",
]
answer.answer = "Triklorosilan, fraksiyonel olarak damıtılabilen bir sıvıdır (kaynama noktası 31,8°C) ve damıtma, safsızlıkları ayırmada olağanüstü derecede etkilidir ve geçiş başına bir büyüklük sırasını ortadan kaldırır"
context = "Silikonun sıvı triklorosilana dönüştürülmesi, saflaştırmada olağanüstü derecede etkili olan fraksiyonel damıtma sağlar; her bir damıtma geçişi, kabaca bir miktar safsızlık konsantrasyonunu ortadan kaldırır."
id = "24df5a6d-d9f7-47ce-a6f2-1617e2a35dde"

