[[questions]]
type = "MultipleChoice"
prompt.prompt = "Neden kayan bölge (FZ) silikonu ana akım güneş enerjisi üretiminde kullanılamıyor?"
prompt.distractors = [
  "FZ kristalleri, RF ısıtma bobinlerinden gelen daha yüksek oksijen konsantrasyonları içerir, bu da hücre performansını düşürür",
  "FZ silikon, standart dokulandırma işlemleriyle uyumsuz olan farklı bir kristal yönelimine (111'e karşı 100) sahiptir",
  "FZ büyümesi, katkı maddesi konsantrasyonunda, bir modüldeki hücreler arasında akım uyumsuzluğuna neden olan çizgilere neden olur",
]
answer.answer = "FZ külçeler yüzey gerilimi fiziği gereği ~200 mm çapla sınırlıdır, 50-80 kg/iş verimiyle ve CZ'den 30-100 kat daha yüksek maliyetle"
context = "FZ'daki erimiş bölge yalnızca yüzey gerilimi tarafından tutulur. Kütle çapın küpüyle birlikte büyürken yüzey gerilimi doğrusal olarak ölçeklenir; ~200 mm'nin üzerinde eriyik çöker. CZ için 5-15 ABD Doları/wafer ve 0,15-0,25 ABD Doları olan FZ, güneş enerjisi için ekonomik olarak uygun değildir."
id = "38cc1fae-1e29-43ca-98b5-328d1e38e5f2"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Ayrışma katsayısı bize kristal büyümesi hakkında ne söylüyor ve borun k₀ = 0,8 değeri neden sorunlu?"
prompt.distractors = [
  "k₀ = 0,8, borun zamanla eriyik içinde biriktiği ve külçenin son %20'sinin kullanılamaz şekilde p tipi olmasına neden olduğu anlamına gelir",
  "k₀ = 0,8, borun ikame bölgelerden ziyade tercihen ara bölgeleri işgal ettiği ve elektriksel aktivitesini azalttığı anlamına gelir",
  "k₀ = 0,8, bor atomlarının eşit şekilde dağılmak yerine bir araya gelerek lokalize yüksek dirençli bölgeler oluşturduğu anlamına gelir",
]
answer.answer = "k₀ = 0,8, borun donma sırasında katı ve sıvıya neredeyse eşit oranda karıştığı anlamına gelir; dolayısıyla kristal büyümesi, çok küçük k₀ değerlerine sahip metaller gibi onu arındıramaz."
context = "Çoğu metalin çok küçük k₀ değerleri vardır (demir: 8×10⁻⁶), yani kristal büyümesi onları eriyiğe iter. Ancak bor, katı ve sıvı arasında neredeyse eşit olarak bölünür. Bu nedenle polisilikon saflaştırmasının kristal büyümesinden önce boronu uzaklaştırması gerekir."
id = "8d8357c5-d947-4f89-ab38-84b57138c5c4"

