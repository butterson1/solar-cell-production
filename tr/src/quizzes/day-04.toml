[[questions]]
type = "MultipleChoice"
prompt.prompt = "Güneş enerjisi endüstrisi neden çok kristalli levhalardan tek kristalli plakalara geçerek 2024 yılına kadar %95'in üzerinde pazar payına ulaştı?"
prompt.distractors = [
  "Monokristal külçeler daha büyük (300 mm+) büyütülebilir, bu da parti başına daha fazla levha ve daha düşük maliyet sağlar",
  "Çok kristalli silikon, daha yüksek saflıkta hammadde gerektirir ve bu da onu belirli ölçekte üretmeyi daha pahalı hale getirir",
  "Tel testereyle dilimlemedeki ilerlemeler, monokristalin levhaların kırılmadan incelmesini sağlayarak silikon kullanımını azalttı",
]
answer.answer = "Çok kristalli silikondaki tanecik sınırları %2-4 mutlak verimlilik kaybına neden olur; bu kabul edilemez çünkü PERC ve TOPCon performans sınırlarını zorladı"
context = "Tane sınırları, elektronların sıkışıp kaldığı rekombinasyon merkezleri görevi görür. Yüksek verimli mimariler yüzde birin her kesrini talep ettiğinden, çoklu kristalin daha düşük üretim maliyetine rağmen %2-4 verimlilik cezası anlaşmayı bozucu hale geldi."
id = "71d8dce2-ac55-45f5-a6ba-8b8120407c44"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "'Çizgi boyun' tekniği nedir ve CZ kristal büyümesi için neden kritiktir?"
prompt.distractors = [
  "Kristal çapı boyunca düzgün katkı maddesi dağılımı oluşturmak için tohumu 15-20 RPM'de yavaşça döndürün",
  "Katılaşma arayüzünün şeklini kontrol etmek için eriyik yüzeyinde 3-5°C'lik bir termal eğimin korunması",
  "Büyüme döngüsü boyunca eriyik tükenmesini telafi etmek için kristalin değişken hızlarda (0,5-2 mm/dak) çekilmesi",
]
answer.answer = "Tohum temasından sonra ince bir boyun (3-5 mm) büyür, böylece termal şok dislokasyonları yüzeye yayılır ve sonlanır ve hatasız bir kristal elde edilir"
context = "Tohum 1.420°C'deki eriyik ile temas ettiğinde termal şok dislokasyonlara neden olur. Çok ince bir boyun büyüyerek bu kusurlar yüzeye ulaşır ve kendiliğinden sona erer. 200+ kg'lık külçenin tamamı daha sonra bu kalem inceliğindeki boyundan sarkar."
id = "a7fcf389-1844-4313-90f5-8b170bd059bc"

