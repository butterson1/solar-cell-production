[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁(3.Gün) Siemens prosesinde ayrımsal damıtmanın temel amacı nedir?"
prompt.distractors = [
  "Triklorosilanın kontrollü sıcaklıklarda saf silikon ve hidrojen klorüre ayrıştırılması",
  "Birikmiş silikonda boşluklar oluşturabilecek nitrojen ve argon gibi çözünmüş gazları uzaklaştırmak için",
  "Silikon tetraklorürün yan ürününü yeniden dolaşım için kullanılabilir triklorosilana dönüştürmek",
]
answer.answer = "Farklı kaynama noktalarından yararlanarak triklorosilanı BCl₃ ve PCl₃ gibi safsızlık klorürlerden ayırmak"
context = "Damıtma, kaynama noktası farklılıklarından yararlanır: BCl₃ 12,6°C'de, TCS 31,8°C'de ve PCl₃ 76°C'de kaynar. Çoklu sütunlar bor ve fosforu milyarda 0,1 parçanın altına düşürür."
id = "3abdef5a-f449-41b2-98a4-d2bd2d4bbff5"

