# Day 11 Quiz: Multi-Junction & Tandem Cells

## Current Day Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In a single-junction silicon cell, what happens to a 3.0 eV ultraviolet photon?"
prompt.distractors = [
  "It passes through the silicon unabsorbed because its energy exceeds the bandgap threshold, contributing to transmission losses of about 19% of solar energy",
  "It generates two electron-hole pairs through impact ionization, each carrying approximately 1.5 eV, which is why UV-rich spectra boost silicon cell output",
  "It is absorbed by the anti-reflective coating before reaching the junction, converting to heat in the silicon nitride layer at roughly 65% thermal loss"
]
answer.answer = "It generates one electron-hole pair worth 1.12 eV while the remaining 1.88 eV is lost as waste heat through thermalization, a process that happens nearly instantaneously"
context = "Photons above the bandgap energy are absorbed but only generate one electron-hole pair at the bandgap energy. The excess energy (3.0 - 1.12 = 1.88 eV) thermalizes into lattice vibrations (heat). This is one of the two major loss mechanisms in single-junction cells."
id = "9dc147f2-5297-4ff8-8701-0bb72ac90aad"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why are III-V multi-junction solar cells 200-400x more expensive per watt than silicon cells?"
prompt.distractors = [
  "The III-V semiconductor materials like gallium and indium are extremely rare earth elements with limited global reserves, and mining them requires specialized deep-shaft extraction techniques",
  "The cells require platinum and palladium electrode contacts that must be deposited under ultra-high vacuum conditions, and these precious metals dominate the per-watt cost breakdown",
  "The six-junction architecture requires each layer to be manufactured in a separate cleanroom facility, then bonded together using gold-tin eutectic soldering at 280°C per interface"
]
answer.answer = "MOCVD grows crystal one atomic layer at a time at 600-700°C using toxic organometallic precursors, with growth rates of only 1-2 µm/hour on germanium substrates costing ~$100 per 100 mm wafer"
context = "The extreme cost comes from the MOCVD manufacturing process — it's incredibly slow and uses expensive precursors and substrates. This is boutique semiconductor fabrication, not the mass-production scale of silicon wafer manufacturing."
id = "40056a71-3f00-434f-abbc-758fd7cece4a"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the fundamental constraint of monolithic (two-terminal) tandem cells that creates a real-world vulnerability to changing weather?"
prompt.distractors = [
  "The perovskite top layer thermally expands at a different rate than the silicon bottom cell, causing micro-cracks at the interface when temperature changes exceed 15°C per hour",
  "The voltage output of each sub-cell must match exactly, and since voltage is temperature-dependent, any thermal gradient between the top and bottom layers creates resistive losses",
  "The optical coupling between layers depends on a precise refractive index match that shifts with humidity, causing Fresnel reflection losses at the internal interface of up to 8%"
]
answer.answer = "The sub-cells are wired in series so current must be identical through both, meaning the weaker cell limits the whole device — and spectral shifts throughout the day change which cell produces less current"
context = "In a monolithic tandem, series connection means the cell producing less current bottlenecks the entire device. The solar spectrum shifts (more blue at noon, more red at sunrise/sunset), pushing current matching out of alignment and reducing efficiency by a few percent compared to standard test conditions."
id = "f36c0835-c291-4f95-9514-c5f690abfac5"

[[questions]]
