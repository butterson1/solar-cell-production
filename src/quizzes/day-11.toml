[[questions]]
type = "MultipleChoice"
prompt.prompt = "What makes perovskite-silicon tandems potentially revolutionary compared to III-V multi-junction cells for terrestrial solar?"
prompt.distractors = [
  "Perovskite top cells achieve higher absolute efficiency than III-V cells because their defect tolerance allows operation closer to the radiative limit, reaching 98% of theoretical maximum",
  "Perovskite tandems can operate efficiently under concentrated sunlight up to 500 suns without active cooling, eliminating the tracking hardware that III-V concentrator systems require",
  "Perovskite materials have inherently superior UV stability compared to III-V semiconductors, giving them a 40-year operational lifetime versus the typical 15-year III-V degradation cycle"
