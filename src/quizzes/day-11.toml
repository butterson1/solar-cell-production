## Review Questions — Older Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 6) In the p-n junction doping process, why does the built-in electric field at the junction point from the n-side toward the p-side?"
prompt.distractors = [
  "The higher concentration of electrons on the n-side creates a negative charge that repels electrons from the p-side, establishing a voltage gradient that drives conventional current from p to n",
  "The boron acceptor atoms on the p-side have a stronger electronegativity than phosphorus donors on the n-side, creating a permanent dipole field across the metallurgical junction interface",
  "The diffusion of majority carriers during junction formation creates an excess of positively charged donor ions on the p-side and negatively charged acceptor ions on the n-side"
]
answer.answer = "When electrons diffuse from n to p and holes from p to n, they leave behind fixed ionized donor atoms (+) on the n-side and acceptor atoms (−) on the p-side, creating a field pointing from + to −, i.e. n to p"
context = "The depletion region forms when mobile carriers diffuse across the junction. The immobile ionized dopant atoms left behind create a space charge region: positive on the n-side (exposed donor ions) and negative on the p-side (exposed acceptor ions). The resulting electric field points from the positive n-side to the negative p-side."
id = "f146812f-0a4b-4d29-b994-88d9fca7ff46"

