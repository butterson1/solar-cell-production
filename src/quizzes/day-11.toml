## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 9) In TOPCon cell architecture, what is the key feature that reduces recombination at the rear surface?"
prompt.distractors = [
  "A thick aluminum oxide (Al₂O₃) layer deposited by atomic layer deposition that provides both chemical passivation and a fixed positive charge to repel electrons from the surface",
  "A hydrogenated amorphous silicon (a-Si:H) intrinsic buffer layer deposited at 200°C by PECVD that saturates dangling bonds while maintaining excellent carrier transport",
  "A laser-fired aluminum point contact pattern through a SiO₂ dielectric mirror that creates local back-surface fields while reflecting unabsorbed infrared photons back into the cell"
]
answer.answer = "An ultra-thin tunnel oxide layer (~1.5 nm SiO₂) topped with phosphorus-doped polysilicon that passivates the surface while allowing electrons to quantum-tunnel through to the contact"
context = "TOPCon (Tunnel Oxide Passivated Contact) uses a ~1.5 nm SiO₂ layer thin enough for quantum tunneling, topped with doped polysilicon. This provides excellent surface passivation while maintaining electrical contact — the key innovation over PERC's local aluminum contacts."
id = "e27721f2-4677-42ef-b46d-adcd0ddfab0e"

