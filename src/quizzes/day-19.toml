# Day 19 Quiz: Defect Analysis — EL Imaging, IV Curves, & Hotspots

# --- Current Day Questions (6) ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In an electroluminescence (EL) image of a silicon solar cell, a shunt defect typically appears as:"
prompt.distractors = [
  "A uniformly dark region across the entire cell, caused by the shunt draining all carriers away from the junction uniformly and preventing any radiative recombination",
  "A bright line along the cell edge where phosphorus diffusion has increased the local doping concentration, boosting the radiative recombination rate at the perimeter",
  "A series of dark parallel stripes matching the finger spacing, because the shunt draws current preferentially along the metallization grid lines toward the busbar"
]
answer.answer = "A bright spot surrounded by a dark halo, because current is funneled through the shunt site while the surrounding region is starved of carriers and produces less luminescence"
context = "Shunts create localized low-resistance paths across the junction. Current concentrates through the shunt (bright spot) while surrounding areas lose carrier density (dark halo). This is counterintuitive because the defect region appears bright, not dark."
id = "1a48b1f2-512e-431d-8883-2cef0309da5b"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "A solar cell's IV curve shows a normal short-circuit current but a sharply reduced fill factor with a sloping top edge. Which parasitic resistance is most likely elevated?"
prompt.distractors = [
  "Shunt resistance (Rsh) is too low, causing current leakage across the junction that manifests as a tilted left edge on the IV curve and reduced current near short-circuit conditions",
  "Contact resistance at the rear aluminum BSF layer is too high, which primarily reduces Voc by increasing recombination at the back surface rather than affecting the IV curve shape",
  "Emitter sheet resistance is too low due to excessive phosphorus doping, which increases Auger recombination and symmetrically compresses both the current and voltage axes of the IV curve"
]
answer.answer = "Series resistance (Rs) is too high, creating excessive resistive losses in the current path through fingers, busbars, or contacts, which causes the current to droop as voltage increases"
context = "High series resistance specifically causes the top (high-current) portion of the IV curve to slope downward. Each additional 0.1 Ω·cm² of Rs drops fill factor by roughly 1-2 percentage points. Low shunt resistance, by contrast, causes the left edge to tilt."
id = "c1f45185-9ac0-47ed-a490-1096145f340e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the primary advantage of photoluminescence (PL) imaging over electroluminescence (EL) imaging in a solar cell production line?"
prompt.distractors = [
  "PL imaging uses visible-wavelength cameras costing under $1,000, making it at least 10× cheaper than EL systems that require expensive InGaAs sensors operating in the 950-1300 nm range",
  "PL imaging achieves higher spatial resolution (below 10 μm) because the laser excitation source can be focused more precisely than the diffuse current injection used in EL measurements",
  "PL imaging can detect defects in encapsulated finished modules more effectively than EL, because the optical excitation penetrates through glass and EVA layers with minimal signal attenuation"
]
answer.answer = "PL imaging requires no electrical contacts, allowing inspection of raw unprocessed wafers before metallization, which catches material defects before costly downstream processing steps"
context = "PL's key advantage is contactless operation. EL requires injecting current, which means the cell needs finished contacts. PL uses optical excitation (typically 808 nm laser/LED), enabling defect detection at multiple stages — from as-cut wafers through finished cells."
id = "442700e6-3c2f-458e-9efc-8cb5d8159d02"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "A single cell in a 72-cell series-connected module becomes 30% shaded. What happens to that cell?"
prompt.distractors = [
  "The shaded cell continues to generate power at 70% of its rated output, and the module current automatically adjusts downward to match the reduced contribution from that cell",
  "The shaded cell enters forward-bias breakdown mode where it generates excess voltage to compensate for the reduced current, causing localized carrier multiplication in the junction",
  "The shaded cell electrically disconnects from the string via its internal junction capacitance, allowing the remaining 71 cells to operate normally at a slightly higher per-cell voltage"
]
answer.answer = "The shaded cell becomes reverse-biased and absorbs power from the other cells, dissipating it as heat because it cannot maintain the string current set by the unshaded cells in series"
context = "In a series string, all cells must carry the same current. When a cell can't generate the required current, it becomes reverse-biased — acting as a load rather than a source. The power from other cells is dissipated as heat, potentially reaching 150-200°C or higher."
id = "e45ebcea-bc7d-4c04-90a2-8272dd3187d0"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "At what approximate wavelength (in nm) does the electroluminescence emission from crystalline silicon solar cells peak?"
answer.answer = "1150"
answer.alternatives = ["1150 nm", "1,150", "1,150 nm", "~1150", "~1150 nm", "1100", "1100 nm"]
context = "Crystalline silicon EL emission peaks at approximately 1,150 nm, deep in the near-infrared. This is why standard visible-light cameras cannot capture EL images — you need either modified Si CCD/CMOS sensors or InGaAs cameras with sensitivity in the 950-1300 nm range."
id = "ce742a19-af5a-4a91-b43f-55671decb977"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "In modern solar factories, what typical yield loss percentage results from IV curve testing (cells rejected for falling below minimum efficiency thresholds)?"
prompt.distractors = [
  "Less than 0.1%, because flash testing is primarily used for binning cells into efficiency categories rather than rejecting them, and virtually all cells meet minimum thresholds",
  "5-8%, driven mainly by inherent Czochralski ingot quality variations that produce a wide gaussian distribution of cell efficiencies spanning several percentage points",
  "10-15%, reflecting the stringent requirements of tier-1 manufacturers who reject any cell with fill factor below 82% or Voc deviation greater than 5 mV from the target value"
]
answer.answer = "1-3% in a well-run factory, representing cells with efficiency too far below spec to be sold in any bin, which translates to $50,000-150,000 in daily losses at gigawatt production scale"
context = "A 1-3% rejection rate from IV testing is typical for well-managed production lines. This is a significant cost at scale but far less expensive than shipping defective cells that would trigger warranty claims costing 10-30× more in the field."
id = "abcb39d1-fb11-4f24-8407-05d47aaa7a93"

# --- Review Questions: Recent Days (2) ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 18) In automated solar cell production, what is the primary role of machine vision systems positioned after screen printing?"
prompt.distractors = [
  "They measure the wet weight of deposited silver paste on each cell to ensure paste consumption stays within the 80-120 mg per cell budget for cost control purposes",
  "They monitor the squeegee pressure in real time by analyzing the deformation pattern of the screen mesh through high-speed cameras mounted above the printing station",
  "They track individual wafer serial numbers by reading laser-scribed QR codes on the cell back surface, linking each cell to its complete upstream processing history"
]
answer.answer = "They inspect printed finger and busbar geometry for defects like broken lines, misalignment, or thickness variations that would increase series resistance and reduce cell efficiency"
context = "Post-printing machine vision is critical for catching metallization defects — broken fingers, smeared paste, misaligned busbars — before the cell moves to firing. These defects directly impact series resistance and fill factor, as discussed in today's IV curve section."
id = "9101d01c-b915-4774-a80f-3009c51d9602"

