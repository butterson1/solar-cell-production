# --- Review Questions: Older Days (2) ---

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 6) During phosphorus diffusion doping to create the n-type emitter, what is 'dead layer' formation and why is it problematic?"
prompt.distractors = [
  "A dead layer is an undoped region that forms at the wafer center because phosphorus atoms cannot diffuse deeper than 0.5 μm, leaving the bulk silicon with insufficient carrier concentration",
  "A dead layer is a crystallographic damage zone where the high-temperature diffusion process (850-900°C) causes thermal stress fractures in the top 100 nm of the silicon wafer surface",
  "A dead layer is an oxide barrier that forms when residual oxygen in the diffusion furnace reacts with the silicon surface, blocking further phosphorus penetration and creating a passivation layer"
]
answer.answer = "A dead layer is an over-doped surface region where the phosphorus concentration exceeds silicon's solid solubility limit, creating electrically inactive precipitates that increase Auger recombination and reduce blue response"
context = "When phosphorus concentration at the surface exceeds ~1-2 × 10²¹ atoms/cm³, excess phosphorus forms electrically inactive clusters. This 'dead layer' absorbs short-wavelength (blue) photons without generating useful current, reducing cell efficiency. Selective emitter designs address this problem."
id = "aedbf6c9-eb96-4318-afe1-762ce88735f4"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "🔁 (Day 9) What does the acronym PERC stand for in solar cell architecture?"
answer.answer = "Passivated Emitter and Rear Cell"
answer.alternatives = ["Passivated Emitter and Rear Contact", "passivated emitter and rear cell", "passivated emitter and rear contact", "Passivated emitter and rear cell"]
context = "PERC (Passivated Emitter and Rear Cell/Contact) adds a dielectric passivation layer (typically Al₂O₃ + SiNₓ) to the rear surface, reducing recombination and boosting efficiency by 1-1.5% absolute over standard Al-BSF cells. It became the dominant architecture around 2019."
id = "2c0b8ce8-97fa-488c-bfa4-fa42ee44a98e"
