# Day 14: From Cell to Module — Encapsulation & Assembly

## Current Day Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does cutting solar cells in half before stringing reduce resistive power losses in the tabbing ribbons by approximately 75%?"
prompt.distractors = [
    "Half-cut cells have twice the voltage, so the ribbon carries more voltage at lower impedance, reducing thermal dissipation in the copper by a factor of four according to P = V²/Z calculations.",
    "Half-cut cells use ribbons that are half the length, and since resistance scales linearly with length (R = ρL/A), the total I²R loss in each ribbon drops by 50%, compounded by a parallel wiring benefit.",
    "Half-cut cells operate at a higher fill factor due to reduced edge recombination, which means more power is extracted at the maximum power point and less energy is dissipated as heat in the interconnects."
]
answer.answer = "Half-cut cells produce half the current of full-size cells because current scales with area while voltage stays the same. Since resistive losses scale with I²R, halving the current reduces the I² term by a factor of four, cutting ribbon losses by 75%."
context = "This is a direct application of the I²R power loss relationship. Current is halved (from ~14A to ~7A), so I² drops by 4×, meaning resistive losses in the ribbons drop by approximately 75%. The voltage per cell remains unchanged."
id = "cbfbe8e2-ce84-4ea6-8e0c-d7aa23e28110"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the fundamental chemical problem with EVA (ethylene-vinyl acetate) encapsulant that has driven the industry toward POE alternatives?"
prompt.distractors = [
    "EVA undergoes UV-induced chain scission that breaks the polymer backbone into short oligomers, which migrate to the cell surface and form a reflective film that blocks 3-5% of incoming light over 10 years.",
    "EVA's peroxide crosslinking agents slowly decompose at operating temperatures above 60°C, releasing free radicals that oxidize the silver grid fingers and increase series resistance by 15-25% within the first decade.",
    "EVA absorbs moisture that causes volumetric swelling of 2-4%, generating mechanical stress that delaminates the encapsulant from the glass surface and creates voids where condensation accumulates and corrodes contacts."
]
answer.answer = "EVA slowly decomposes via hydrolysis of its vinyl acetate groups, releasing acetic acid that is corrosive to silver grid fingers, cell metallization, and especially the transparent conductive oxide (TCO) layers used in HJT cells, causing degradation after 10-15 years."
context = "The hydrolysis of vinyl acetate groups producing acetic acid is EVA's fundamental weakness. This is particularly problematic for HJT cells with acid-sensitive TCO layers, and in hot humid climates where the hydrolysis reaction is accelerated."
id = "3522340e-1e29-4bbf-b436-8ef497e6c149"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "During vacuum lamination, why must the evacuation step be completed before the encapsulant reaches its melting temperature?"
prompt.distractors = [
    "The encapsulant's crosslinking agents decompose at temperatures above 120°C, and if oxygen is still present during decomposition, the free radicals react with O₂ instead of polymer chains, resulting in incomplete cure and gel content below 50%.",
    "The glass and encapsulant have different coefficients of thermal expansion, and residual air pressure prevents uniform thermal contact between layers, creating temperature gradients exceeding ±8°C that cause differential curing across the module.",
    "The solder joints between tabbing ribbons and cell busbars can reflow if exposed to both heat and atmospheric pressure simultaneously, causing the ribbons to shift position by 1-2mm and creating resistive contact failures."
]
answer.answer = "If air remains between layers when the encapsulant melts and flows, it becomes permanently trapped as bubbles. These bubbles create local hot spots, moisture ingress points, and optical defects that compromise module performance and longevity."
context = "Once the encapsulant melts and flows, it seals around any remaining air pockets, trapping them permanently. The vacuum (0.5–1 mbar) must be established first so all air is removed before the polymer becomes fluid. Bubbles are considered module killers."
id = "9a0a422f-d672-4d5f-a5ac-a6e45e99e117"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How can modern solar modules achieve a cell-to-module (CTM) power ratio exceeding 100%, producing more power than the sum of their individual bare cells?"
prompt.distractors = [
    "The encapsulant material acts as a waveguide that concentrates diffuse light onto the cells through total internal reflection at the air-encapsulant interface, effectively increasing irradiance on each cell by 1.5-2% above the incident level.",
    "The series-parallel wiring configuration in half-cut modules reduces the current mismatch penalty between cells, allowing the module to operate closer to each cell's individual maximum power point and recovering 1-2% of typically lost power.",
    "The aluminum frame acts as a thermal heat sink that keeps cell temperature 2-3°C lower than bare cells would operate at, and since silicon cells gain approximately 0.4% efficiency per degree of cooling, this thermal benefit adds 1-2% output."
]
answer.answer = "Light hitting the white backsheet between cell gaps reflects upward to the glass surface, which totally internally reflects it back onto adjacent cells. Combined with anti-reflective coatings on the glass reducing front-surface reflection, these optical gains scavenge otherwise wasted photons."
context = "CTM ratios of 100.5-102% are achieved through light trapping effects: the cell gaps, backsheet reflectivity, and glass internal reflection create optical recycling paths that recover photons that would miss the cells. AR coatings further reduce front-surface losses."
id = "3972c051-04cd-4d41-ae00-9416203c3e62"

