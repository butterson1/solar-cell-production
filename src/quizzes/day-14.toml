[[questions]]
type = "MultipleChoice"
prompt.prompt = "What was the consequence of the solar backsheet quality crisis of 2018-2020, and what material property distinguished the failing products from reliable ones?"
prompt.distractors = [
    "Backsheets using recycled PET cores absorbed UV radiation and became electrically conductive over time, creating ground faults that tripped inverter safety systems and reduced system availability by 15-30% in affected installations.",
    "Backsheets manufactured with non-crosslinked EVA adhesive layers lost bond strength after thermal cycling, causing systematic delamination that exposed junction boxes to water ingress and triggered widespread arc-fault fires across European rooftop installations.",
    "Backsheets using Chinese-produced PVDF (polyvinylidene fluoride) instead of DuPont Tedlar contained residual catalysts that reacted with aluminum frames, causing galvanic corrosion that weakened mounting structures and led to module detachments in high-wind regions."
]
answer.answer = "Millions of modules with substandard non-fluoropolymer backsheets experienced cracking, yellowing, and delamination within 5-8 years, exposing cells to moisture and failing safety testing. The critical distinction was the presence or absence of fluoropolymer layers like DuPont's Tedlar (PVF)."
context = "The backsheet crisis was one of solar's costliest quality episodes. Non-fluoropolymer alternatives (like PPE — PET/PET/EVA) degraded far faster than fluoropolymer-based backsheets (TPT — Tedlar/PET/Tedlar), which are rated for 25+ years. Cost savings of $3-7/m² proved catastrophically false economy."
id = "de476309-9c6b-4bc5-84a9-33f54d200654"

## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 13) During IV curve testing, why do factories sort cells by multiple parameters (I_sc, V_oc, and FF independently) rather than simply sorting by efficiency alone?"
prompt.distractors = [
    "Efficiency alone doesn't capture the cell's thermal coefficient behavior, and cells with matched I_sc but different temperature coefficients will diverge in real-world performance as module temperature rises above the 25°C STC reference point.",
    "Different cell architectures (PERC vs TOPCon) produce efficiency through fundamentally different mechanisms, so mixing architectures in one module requires matching all electrical parameters to prevent reverse bias damage at the cell level.",
    "Regulatory standards (IEC 61215) mandate that manufacturers track and report each parameter independently for certification, and modules assembled from single-parameter-sorted cells cannot pass the required thermal cycling and damp heat qualification tests."
]
answer.answer = "Two cells can have identical efficiencies through different combinations of current, voltage, and fill factor. Mixing a high-current/low-voltage cell with a low-current/high-voltage cell in the same series string creates current mismatch — and the string is limited by the weakest cell's current."
context = "In a series string, all cells must pass the same current. If cells are matched only on efficiency but have different I_sc values, the lowest-current cell limits the entire string. Multi-parameter sorting prevents this mismatch, which is a module-level performance killer."
id = "3c950987-f070-4f73-aebc-38f944752d9d"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 12) The Shockley-Queisser limit sets the maximum theoretical efficiency of a single-junction silicon solar cell at about 33.7%. What is the primary loss mechanism that accounts for the largest share of lost energy?"
prompt.distractors = [
    "Auger recombination in the heavily doped emitter region causes approximately 20% of photogenerated carriers to recombine non-radiatively before reaching the contacts, converting their energy into lattice vibrations rather than electrical current.",
    "Reflection losses at the silicon-air interface reject approximately 30-35% of incident photons before they can enter the cell, and even with anti-reflective coatings, 3-5% of light is still reflected across the usable spectrum.",
    "Carrier thermalization at the contacts causes a voltage drop of 0.3-0.4V as hot electrons cool to the lattice temperature at the metal-semiconductor interface, dissipating roughly 15% of the absorbed energy as Joule heating in the busbars."
]
answer.answer = "Thermalization losses — photons with energy above silicon's 1.12 eV bandgap generate electron-hole pairs, but the excess energy above the bandgap is immediately lost as heat. Blue photons (3.1 eV) lose about 64% of their energy this way, accounting for roughly 47% of incident solar energy."
context = "Thermalization is the single largest loss mechanism in the Shockley-Queisser framework. High-energy photons excite carriers far above the band edge, but these 'hot carriers' cool to the band edge within picoseconds, converting the excess energy to phonons (heat)."
id = "a7dbda5f-2ba2-4264-b221-493b9a457143"

## Review Questions — Older Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 5) Why do modern diamond wire saws use a slurry of polyethylene glycol (PEG) and water during ingot slicing, and what kerf loss does a typical 120μm diamond wire produce?"
prompt.distractors = [
    "PEG-water slurry chemically etches the silicon surface during cutting to create a pre-textured saw-damage layer, reducing the subsequent texturing step time by 40%. Typical kerf loss with 120μm wire is approximately 90-100μm per cut.",
    "PEG-water slurry maintains the diamond wire at a constant temperature of 25°C to prevent thermal expansion of the wire, which would cause thickness variation in the wafers. Typical kerf loss with 120μm wire is approximately 180-200μm per cut.",
    "PEG-water slurry provides lubrication and carries away silicon debris (swarf) from the cutting zone while cooling the wire and workpiece. Typical kerf loss with 120μm wire is approximately 120-130μm per cut, meaning about 45% of the ingot becomes waste."
]
answer.answer = "PEG-water slurry serves as both coolant and lubricant, removing heat generated by friction and flushing silicon swarf from the narrow cutting channel to prevent wire jamming. A 120μm diamond wire produces kerf loss of approximately 120-130μm — nearly equal to the wire diameter itself."
context = "The slurry's dual role (cooling and debris removal) is critical for cut quality. Kerf loss approximately matches wire diameter, meaning a 120μm wire destroys about 120-130μm of silicon per cut. Modern thinner wires (≤100μm) reduce this waste, pushing toward 100μm kerf."
id = "8e2b3c06-f119-4eb6-9770-9f45828fcdd9"

