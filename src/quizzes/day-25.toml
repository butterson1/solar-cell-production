## Review Questions — Recent Days (Days 22-24)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 23) In bifacial solar modules, what is the typical bifaciality factor, and what does it represent?"
prompt.distractors = [
  "Typically 50–60%, representing the fraction of total energy output that comes from diffuse rather than direct sunlight, which bifacial modules capture more efficiently than monofacial designs",
  "Typically 95–100%, representing the ratio of front-side efficiency to the theoretical Shockley-Queisser limit, indicating how close the cell architecture comes to maximum possible single-junction performance",
  "Typically 65–75%, representing the proportion of rear-surface photons that are successfully absorbed rather than reflected, determined primarily by the anti-reflective coating thickness on the back surface"
]
answer.answer = "Typically 70–90%, representing the ratio of rear-side power output to front-side power output under standard test conditions, indicating how effectively the cell converts light entering from the back"
context = "Bifaciality factor is defined as rear-side power divided by front-side power under STC. Values of 70–90% are typical for modern bifacial cells, meaning the rear side can generate 70–90% as much power as the front when equally illuminated."
id = "e1cbbbe3-1d6f-494c-a991-7d1219295206"

