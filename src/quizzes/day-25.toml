## Review Questions — Older Days

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 3) In the Siemens process for polysilicon purification, trichlorosilane (HSiCl₃) is decomposed on heated silicon rods. What temperature are these rods maintained at, and why is this temperature critical?"
prompt.distractors = [
  "Rods are maintained at 600–700°C, just above the melting point of trichlorosilane, because the gas must be in liquid phase when it contacts the rod surface to achieve uniform deposition without dendritic crystal growth",
  "Rods are maintained at 1,414°C, the melting point of silicon, because the deposited silicon must briefly liquefy to form a continuous polycrystalline layer rather than a porous, mechanically weak coating",
  "Rods are maintained at 800–900°C, the optimal temperature for silicon carbide formation, because a thin SiC barrier layer must form first to provide nucleation sites for subsequent high-purity silicon deposition"
]
answer.answer = "Rods are maintained at 1,000–1,100°C, hot enough to thermally decompose trichlorosilane into elemental silicon and HCl gas, while remaining below silicon's melting point to ensure solid-phase deposition of polycrystalline silicon"
context = "The Siemens process operates at 1,000–1,100°C, which provides enough thermal energy to break HSiCl₃ bonds and deposit pure silicon while keeping the silicon in solid phase. This temperature window is critical for achieving the 9N–11N purity levels required for solar-grade polysilicon."
id = "749a3460-8488-4c00-a273-1a0325afedf1"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 14) During module encapsulation, why is the lamination process performed under vacuum before applying heat and pressure?"
prompt.distractors = [
  "Vacuum removes moisture from the EVA sheets that would otherwise hydrolyze during curing, producing acetic acid bubbles that etch the silver metallization and degrade cell-to-ribbon solder joints over time",
  "Vacuum lowers the boiling point of the EVA cross-linking agents, allowing the curing reaction to initiate at 120°C instead of 150°C, which reduces thermal stress on the cells and improves long-term reliability",
  "Vacuum creates a pressure differential that forces EVA to flow preferentially into the cell interconnect gaps, ensuring copper ribbons are fully encapsulated before the bulk lamination pressure is applied from above"
]
answer.answer = "Vacuum removes trapped air from between the module layers before the EVA melts and flows, preventing air bubbles that would scatter light, create delamination initiation points, and accelerate moisture-induced degradation over the module's lifetime"
context = "Air bubbles trapped in the laminate cause optical losses (light scattering), serve as stress concentrators that initiate delamination, and create pathways for moisture ingress. Evacuating air before EVA melting ensures a void-free, optically clear encapsulation."
id = "91bb4879-6c20-4782-97d7-fe16c92dd739"
