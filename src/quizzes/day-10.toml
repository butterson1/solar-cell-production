# Day 10 Quiz: Thin-Film Alternatives — CdTe, CIGS, Amorphous Si

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does cadmium telluride need only 2-4 μm of absorber material to capture 99%+ of above-bandgap photons, while crystalline silicon needs 150-180 μm?"
prompt.distractors = [
  "CdTe has a narrower bandgap of 1.1 eV compared to silicon's 1.5 eV, which allows it to absorb a wider range of the solar spectrum using far less material per absorbed photon",
  "CdTe crystals have a much higher refractive index (~4.2) than silicon (~3.5), causing internal total reflection that traps photons and forces multiple absorption passes through the film",
  "CdTe's polycrystalline grain boundaries act as photon scattering centers that increase the effective optical path length by 50-100×, compensating for inherently similar absorption coefficients"
]
answer.answer = "CdTe is a direct bandgap semiconductor with an absorption coefficient roughly 100× higher than indirect-bandgap silicon, so photons are absorbed in a much shorter distance without needing phonon assistance"
context = "In direct bandgap materials like CdTe, electrons can absorb photons and jump across the bandgap in a single step. Silicon's indirect bandgap requires simultaneous phonon interaction, making absorption inherently less probable."
id = "d10-q01"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the critical role of the cadmium chloride (CdCl₂) activation treatment in CdTe cell manufacturing?"
prompt.distractors = [
  "It etches away surface contaminants and native oxides from the CdTe film, reducing series resistance at the back contact interface by a factor of 10 and improving fill factor from ~65% to ~78%",
  "It dopes the CdTe absorber with chlorine to create a controlled p-type carrier concentration of 10¹⁵ cm⁻³, replacing the previous reliance on copper diffusion which caused long-term instability",
  "It converts the CdTe from an amorphous to a polycrystalline phase through nucleation seeding, since the as-deposited vapor transport film is initially amorphous and must be crystallized for charge transport"
]
answer.answer = "It promotes recrystallization that increases grain size from ~0.5 μm to 2-5 μm and passivates grain boundaries with chlorine atoms, boosting efficiency from barely 10% to over 18%"
context = "The CdCl₂ treatment at 380-420°C is the single most important post-deposition step. Without it, the small grains and unpassivated grain boundaries cause massive recombination losses."
id = "d10-q02"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why do CdTe modules often produce more annual energy (kWh/kWp) than higher-efficiency crystalline silicon modules in hot desert installations?"
prompt.distractors = [
  "CdTe's wider bandgap of 1.5 eV means it doesn't absorb near-infrared photons that crystalline silicon converts to heat, keeping the module 15-20°C cooler under the same irradiance conditions",
  "CdTe's glass-glass construction provides better thermal mass and heat dissipation than the polymer backsheets used in crystalline silicon modules, reducing peak operating temperatures by 8-12°C",
  "CdTe modules use a frameless design that allows air to circulate under both surfaces equally, while framed silicon modules trap convective heat at the bottom edge where airflow is restricted"
]
answer.answer = "CdTe has a lower temperature coefficient of about -0.28 to -0.32%/°C versus silicon's -0.35 to -0.45%/°C, retaining 2-3% more rated power when module temperatures reach 65-70°C"
context = "At module temperatures of 65-70°C (40-45°C above STC), CdTe loses about 12-14% of rated power while crystalline silicon loses 15-20%. Over a full year in hot climates, this adds up to measurably higher energy yield per rated watt."
id = "d10-q03"

