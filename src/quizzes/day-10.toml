id = "d10-q04"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the key manufacturing challenge that has prevented CIGS from achieving the commercial success of CdTe or crystalline silicon?"
prompt.distractors = [
  "CIGS requires ultra-high purity indium (99.9999%) that costs $800-1,200 per kilogram, making the raw material cost alone 3-4× higher than the total manufacturing cost of crystalline silicon modules",
  "CIGS absorber films must be annealed at temperatures above 900°C, which limits substrate choices to expensive high-temperature ceramics and rules out the cheap soda-lime glass used for CdTe and silicon",
  "CIGS cells degrade by 40-50% in the first year of outdoor exposure due to moisture ingress through the zinc oxide window layer, requiring expensive hermetic encapsulation that doubles module cost"
]
answer.answer = "CIGS requires vacuum deposition of a quaternary compound with precise four-element stoichiometry control, driving capital costs to $0.70-1.00/W of capacity — 2-3× higher than crystalline silicon's $0.30-0.40/W"
context = "The four-element (Cu, In, Ga, Se) composition must be precisely controlled, requiring expensive vacuum systems and multi-source evaporation or sputtering plus selenization. This complexity has sunk numerous CIGS startups."
id = "d10-q05"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does the Staebler-Wronski effect cause amorphous silicon solar cells to lose 10-30% of their initial efficiency in the first few hundred hours of light exposure?"
prompt.distractors = [
  "Ultraviolet photons break the Si-H bonds that passivate surface defects, exposing dangling bonds at the top surface that increase surface recombination velocity from 10 cm/s to over 1,000 cm/s",
  "Absorbed photons gradually crystallize the amorphous silicon into a microcrystalline phase with indirect bandgap properties, reducing the absorption coefficient by 20-40× and requiring thicker films",
  "Light-induced heating causes hydrogen atoms to diffuse out of the film through the transparent electrode, increasing the defect density by 2-3 orders of magnitude and making the material irreversibly insulating"
]
answer.answer = "Absorbed photon energy breaks weak Si-Si bonds in the disordered network, creating metastable dangling bond defects that act as recombination centers and reduce carrier lifetime throughout the bulk of the film"
context = "The Staebler-Wronski effect creates metastable (not permanent) defects. They can be partially reversed by annealing at ~150°C, but in outdoor use the cells stabilize at a degraded efficiency well below their initial value."
id = "d10-q06"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 9) What enables the tunnel oxide in TOPCon cells to simultaneously passivate the silicon surface and allow current flow?"
prompt.distractors = [
  "The tunnel oxide is doped with phosphorus atoms at concentrations of 10²⁰ cm⁻³, creating a conductive pathway through the oxide that carries current while the surrounding undoped regions passivate dangling bonds",
  "The oxide contains engineered pinholes at a density of 10⁶ per cm² that allow direct metal-semiconductor contact at discrete points, while the continuous oxide between pinholes provides chemical passivation",
  "The tunnel oxide uses a graded composition from pure SiO₂ at the silicon interface to silicon-rich SiOₓ at the poly-Si interface, with the oxygen gradient creating both passivation and a conduction path"
]
answer.answer = "At just 1.0-1.5 nm thick (5-7 atomic layers), the oxide is thin enough for electrons to quantum mechanically tunnel through while still being thick enough to chemically passivate surface dangling bonds"
context = "Quantum tunneling probability drops exponentially with barrier thickness. At 1-1.5 nm, the tunneling probability is high enough to carry the cell's photocurrent. Above ~2.5 nm, resistance becomes prohibitive."
id = "d10-q07"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 8) Why is silver specifically used for front-side metallization contacts on silicon solar cells instead of cheaper metals like copper or aluminum?"
prompt.distractors = [
  "Silver forms a Schottky barrier with n-type silicon that has a barrier height of exactly 0.75 eV, matching the optimal contact resistance for maximum power extraction at the cell's operating voltage of 0.6-0.7 V",
  "Silver has the highest melting point of any printable metal paste at 1,235°C, which is necessary to survive the 800-900°C firing step without melting through the silicon nitride anti-reflective coating",
  "Silver nanoparticles in the paste undergo plasmonic resonance at wavelengths of 400-500 nm, enhancing light absorption in the silicon directly beneath each contact finger by up to 15% through near-field effects"
]
answer.answer = "Silver has the highest electrical conductivity of any element (1.59 μΩ·cm resistivity) and its oxide is conductive, allowing screen-printed fingers to carry high current density with minimal resistive loss"
context = "Silver's unmatched conductivity means narrower fingers can carry the same current, reducing shading losses. Copper is similarly conductive but oxidizes to insulating CuO, creating contact resistance problems."
id = "d10-q08"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 6) In a p-n junction solar cell, what physically drives the separation of electron-hole pairs created by photon absorption?"
prompt.distractors = [
  "The temperature gradient between the sun-facing front surface and the cooler rear surface creates a thermoelectric Seebeck voltage of 0.2-0.4 mV/°C that pushes carriers toward their respective contacts",
  "The difference in work function between the front silver contacts and the rear aluminum contacts creates an external electric field that pulls electrons to the front and holes to the back of the cell",
  "The concentration gradient of photogenerated carriers — high near the front surface where light is absorbed and low at the rear — drives diffusion currents that separate electrons from holes across the wafer"
]
answer.answer = "The built-in electric field across the depletion region of the p-n junction, created by the space charge of ionized dopant atoms, sweeps electrons toward the n-side and holes toward the p-side"
context = "At the p-n junction, diffusion of majority carriers leaves behind fixed ionized dopant atoms (positive donors in n-type, negative acceptors in p-type), creating a built-in electric field of roughly 10⁴ V/cm across the ~0.5 μm depletion region."
id = "d10-q09"

