## Review Questions — Recent Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 16) What is 'Swanson's Law' in the context of solar manufacturing economics?"
prompt.distractors = [
  "For every 10% improvement in cell conversion efficiency, module manufacturing costs decline by approximately 18% due to fewer cells needed per watt of output capacity",
  "For every new gigawatt-scale factory that opens, regional polysilicon prices drop by approximately 8% as increased demand triggers supplier investments in expanded refining capacity",
  "For every five-year period of sustained R&D investment, the theoretical efficiency ceiling for commercial silicon cells increases by approximately 1.5 absolute percentage points"
]
answer.answer = "For every doubling of cumulative shipped solar capacity, module prices drop by approximately 24% — an empirical learning curve observation that has held remarkably steady since the 1970s"
context = "Swanson's Law is an empirical observation, not a physics law. The 24% learning rate reflects the cumulative effect of hundreds of specific engineering improvements, scale effects, and supply chain optimizations over decades."
id = "e32aecc2-f09a-41a5-82fd-36e235c4660f"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 15) In a modern vertically integrated solar factory, what is the approximate total journey time from raw polysilicon to a finished, tested module ready for shipping?"
prompt.distractors = [
  "Roughly 12-18 hours, since continuous-flow manufacturing with inline crystal growth and laser processing eliminates all traditional batch-processing bottlenecks in the production chain",
  "Roughly 2-3 weeks, because polysilicon must undergo a 10-day purification cycle before Czochralski growth, followed by a 5-day annealing process to relieve internal crystal stress",
  "Roughly 8-12 weeks, due to mandatory 30-day seasoning of wafers after slicing and a 14-day burn-in test period required for IEC certification before modules can ship"
]
answer.answer = "Roughly 3-5 days total, with crystal growth taking the longest at 2-3 days per ingot, while downstream steps like wafering, cell processing, and module assembly each take hours to complete"
context = "The Czochralski crystal growth process is the pacing bottleneck — a single ingot takes 2-3 days to pull. But modern factories run many furnaces in parallel. Downstream steps (wafering, cell lines, module assembly) are highly parallelized and each take only hours per batch."
id = "c96843d0-6785-4cda-953a-4b747f0b071a"

## Review Questions — Older Days (2)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 3) In the Siemens process for polysilicon purification, what is the core chemical reaction that produces semiconductor-grade silicon?"
prompt.distractors = [
  "Silicon tetrafluoride (SiF₄) is reduced with molten sodium metal at 800°C in a sealed reactor, depositing pure silicon on cooled graphite substrates while producing sodium fluoride as a byproduct",
  "Silane gas (SiH₄) is thermally decomposed at 600°C in a fluidized bed reactor, where silicon atoms nucleate onto seed particles that grow into granular polysilicon pellets over 8-12 hours",
  "Metallurgical-grade silicon is dissolved in hydrochloric acid at 350°C to form dichlorosilane (SiH₂Cl₂), which is then electrolytically reduced in a molten salt bath to deposit 99.9999% pure silicon"
]
answer.answer = "Trichlorosilane gas (SiHCl₃) is passed over heated silicon seed rods at roughly 1,100°C inside a bell-jar reactor, where it thermally decomposes and deposits ultra-pure silicon onto the rods"
context = "The Siemens process reacts metallurgical-grade silicon with HCl to produce trichlorosilane (SiHCl₃), which is then distilled to extreme purity and decomposed at ~1,100°C onto slim silicon seed rods in a bell-jar (Siemens) reactor. This chemical vapor deposition produces 9N+ (99.9999999%) purity silicon."
id = "668ad3ca-0801-419d-ac79-c0c670cd317e"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "🔁 (Day 6) What are the two types of dopant atoms used to create the p-type and n-type layers in a standard silicon solar cell?"
answer.answer = "Boron for p-type and phosphorus for n-type"
answer.alternatives = ["boron and phosphorus", "phosphorus and boron", "B and P", "boron (p-type) and phosphorus (n-type)"]
context = "Boron (Group III, one fewer valence electron than silicon) creates electron 'holes' for p-type doping. Phosphorus (Group V, one extra valence electron) provides free electrons for n-type doping. Their junction creates the electric field that separates photogenerated charge carriers."
id = "d5a2ebcc-9fb2-4a5b-9167-b2e2a37244e5"
