# Day 17 Quiz: China's Dominance — Supply Chain Geography

## Current Day Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why is polysilicon production concentrated in Xinjiang, Sichuan, and Inner Mongolia rather than in coastal provinces like Jiangsu?"
prompt.distractors = [
  "Coastal provinces lack the ultra-pure water sources required for the Siemens process, while inland regions have abundant glacial meltwater suitable for polysilicon cooling systems",
  "Environmental regulations in coastal provinces ban the chemical byproducts of polysilicon refining, forcing manufacturers to locate in provinces with more permissive industrial waste policies",
  "The dry inland climate reduces humidity-related contamination during polysilicon crystallization, improving yields by 15-20% compared to the humid coastal manufacturing zones"
]
answer.answer = "Polysilicon refining consumes 60-80 kWh per kilogram, and these inland provinces offer electricity at ¥0.15-0.30/kWh from coal and hydropower — roughly a third of coastal industrial rates"
context = "Energy cost is the dominant factor in polysilicon plant siting. Xinjiang offers coal power at $0.02-0.035/kWh, while Sichuan and Yunnan provide cheap hydroelectricity. This energy advantage outweighs the 2,000-3,000 km transport costs to coastal cell/module factories."
id = "4edcf3cb-0d6f-43ec-af8d-d123486e1a8e"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What triggered the initial explosive growth of Chinese solar manufacturing in the 2000s?"
prompt.distractors = [
  "China's central government launched a Five-Year Plan in 2001 designating solar PV as a strategic industry, directing $50 billion in state bank loans to a dozen selected national champion firms",
  "A breakthrough in low-cost metallurgical-grade silicon processing at Tsinghua University in 2003 gave Chinese manufacturers a feedstock cost advantage of 40% over Western competitors",
  "Japan's decision to phase out nuclear power after the 2004 Chuetsu earthquake created a sudden 30 GW demand surge that only Chinese factories had the capacity to fulfill quickly"
]
answer.answer = "Germany's feed-in tariff law (EEG) guaranteed above-market rates for solar electricity, creating massive European demand that Chinese entrepreneurs — many Western-trained — rushed to supply with local government backing"
context = "The irony is that European policy created the market that Chinese manufacturers filled. Shi Zhengrong (Suntech) is a prime example: Australian PhD, Wuxi government seed funding, European customers. Local governments competed to attract solar firms with cheap land, tax breaks, and loans."
id = "d9474ff1-ec1d-43a6-ae3e-9b0be8b7e217"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "How did Chinese manufacturers respond to US and EU anti-dumping tariffs imposed in 2012-2013?"
prompt.distractors = [
  "They invested heavily in automated production lines to cut manufacturing costs by 30%, absorbing the tariff costs while maintaining export margins to Western markets at pre-tariff levels",
  "They pivoted to selling primarily into the rapidly growing domestic Chinese market, which reached 34.5 GW annually by 2016, reducing their dependence on Western exports to under 20%",
  "They challenged the tariffs through WTO dispute resolution proceedings, winning partial relief in 2015 that reduced effective duty rates on modules to under 10% for most major exporters"
]
answer.answer = "They shifted final assembly operations to Vietnam, Thailand, Malaysia, and Cambodia, shipping Chinese-made cells to Southeast Asia for module assembly and re-exporting to Western markets tariff-free"
context = "This Southeast Asian routing legally sidestepped the tariffs for years. The US Commerce Department eventually ruled in 2023 that this constituted circumvention, imposing new duties of 24-49% on modules from these four countries, effective 2024-2025."
id = "0f8dd3f1-81c1-4160-98d0-6351ff6393fe"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "At which stage of the solar supply chain is China's market share MOST concentrated, and approximately what percentage does it hold?"
prompt.distractors = [
  "Polysilicon refining at approximately 85%, because the Siemens process requires massive capital investment that only Chinese state-backed firms could afford at scale during the 2015-2020 expansion period",
  "Cell manufacturing at approximately 92%, because advanced PERC and TOPCon cell architectures require proprietary Chinese equipment — especially PECVD and laser doping tools — that aren't exported",
  "Module assembly at approximately 88%, because Chinese logistics networks and component suppliers (glass, EVA, backsheet, junction box) create an integrated ecosystem that's impossible to replicate elsewhere"
]
answer.answer = "Wafer manufacturing at approximately 95%, because it requires the most specialized equipment (diamond wire saws, crystal growth furnaces) and benefits most from economies of scale in production"
context = "The 95% wafer concentration is the supply chain's tightest chokepoint. Wafer production requires both specialized capital equipment and the know-how of crystal growth, making it harder to replicate than module assembly (~80%) or even polysilicon (~85%)."
id = "b3b6e11e-010a-4c89-adab-f75f7b05b31f"

