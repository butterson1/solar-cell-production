answer.answer = "Siemens process"
answer.alternatives = ["siemens", "the Siemens process", "Siemens"]
context = "The Siemens process converts metallurgical-grade silicon to trichlorosilane (SiHCl₃) gas, purifies it by distillation, then deposits high-purity silicon onto heated rods by chemical vapor deposition at around 1,100°C. It produces the vast majority of the world's solar-grade polysilicon."
id = "d13-q10"
