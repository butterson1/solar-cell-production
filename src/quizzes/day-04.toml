# Day 4 Quiz: Crystal Growth — Czochralski vs Float-Zone

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why did the solar industry shift from multicrystalline to monocrystalline wafers, reaching 95%+ market share by 2024?"
prompt.distractors = [
  "Monocrystalline ingots can be grown larger (300mm+), yielding more wafers per batch and lower cost",
  "Multicrystalline silicon requires higher-purity feedstock, making it more expensive to produce at scale",
  "Advances in wire-saw slicing made monocrystalline wafers thinner without breakage, reducing silicon usage"
]
answer.answer = "Grain boundaries in multicrystalline silicon cause 2-4% absolute efficiency loss, unacceptable as PERC and TOPCon pushed performance limits"
context = "Grain boundaries act as recombination centers where electrons get trapped. As high-efficiency architectures demanded every fraction of a percent, the 2-4% efficiency penalty became a dealbreaker, despite multicrystalline's lower production cost."
id = "71d8dce2-ac55-45f5-a6ba-8b8120407c44"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the 'Dash neck' technique, and why is it critical to CZ crystal growth?"
prompt.distractors = [
  "Slowly rotating the seed at 15-20 RPM to create uniform dopant distribution across the crystal diameter",
  "Maintaining a 3-5°C thermal gradient at the melt surface to control the solidification interface shape",
  "Pulling the crystal at variable speeds (0.5-2 mm/min) to compensate for melt depletion over the growth cycle"
]
answer.answer = "Growing a thin neck (3-5 mm) after seed contact so thermal-shock dislocations propagate to the surface and terminate, yielding a defect-free crystal"
context = "When the seed touches the 1,420°C melt, thermal shock creates dislocations. By growing a very thin neck, these defects reach the surface and self-terminate. The entire 200+ kg ingot then hangs from this pencil-thin neck."
id = "a7fcf389-1844-4313-90f5-8b170bd059bc"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the melting point of silicon?"
answer.answer = "1,425°C"
answer.alternatives = ["1425°C", "1425", "1,425", "1425 degrees"]
context = "Silicon melts at 1,425°C. CZ growth operates just above this temperature, with the melt slightly superheated. Maintaining hundreds of kilograms of silicon above 1,420°C for days requires enormous energy input."
id = "f485bb90-d679-47b0-948e-4896dc70ca49"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why can't float-zone (FZ) silicon be used for mainstream solar manufacturing?"
prompt.distractors = [
  "FZ crystals contain higher oxygen concentrations from the RF heating coils, which degrade cell performance",
  "FZ silicon has a different crystal orientation (111 vs 100) that's incompatible with standard texturing processes",
  "FZ growth introduces striations in dopant concentration that cause current mismatch between cells in a module"
]
answer.answer = "FZ ingots are limited to ~200 mm diameter by surface tension physics, with throughput of 50-80 kg/run and costs 30-100× higher than CZ"
context = "The molten zone in FZ is held by surface tension alone. Mass grows with the cube of diameter while surface tension scales linearly — above ~200 mm the melt collapses. At $5-15/wafer vs $0.15-0.25 for CZ, FZ is economically unviable for solar."
id = "38cc1fae-1e29-43ca-98b5-328d1e38e5f2"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What does the segregation coefficient tell us about crystal growth, and why is boron's value of k₀ = 0.8 problematic?"
prompt.distractors = [
  "k₀ = 0.8 means boron accumulates in the melt over time, causing the last 20% of the ingot to be unusably p-type",
  "k₀ = 0.8 means boron preferentially occupies interstitial sites rather than substitutional ones, reducing its electrical activity",
  "k₀ = 0.8 means boron atoms cluster together rather than distributing uniformly, creating localized high-resistance regions"
]
answer.answer = "k₀ = 0.8 means boron incorporates almost equally into solid and liquid during freezing, so crystal growth can't purify it out like metals with tiny k₀ values"
context = "Most metals have tiny k₀ values (iron: 8×10⁻⁶), meaning crystal growth rejects them into the melt. But boron partitions almost equally between solid and liquid. This is why polysilicon purification must remove boron before crystal growth."
id = "8d8357c5-d947-4f89-ab38-84b57138c5c4"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "In recharge CZ (RCZ) technology, how many ingots can leading manufacturers like LONGi pull from a single crucible?"
answer.answer = "6-10"
answer.alternatives = ["6 to 10", "8", "6-12", "8-10", "10", "12"]
context = "By 2024, LONGi and TZS routinely pulled 6-10 ingots per crucible using RCZ, cutting energy use 20-30% by avoiding full thermal cycling between pulls."
