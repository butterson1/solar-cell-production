[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 2) What is the dominant crystalline form of silicon used in solar cells?"
prompt.distractors = [
  "Hexagonal close-packed — each atom bonds to six neighbors in alternating stacked layers",
  "Body-centered cubic — each atom sits at the center of a cube surrounded by eight nearest neighbors",
  "Wurtzite structure — alternating silicon layers with tetrahedral and octahedral coordination"
]
answer.answer = "Diamond cubic — each atom forms four covalent bonds at tetrahedral angles of 109.5°"
context = "Silicon crystallizes in the diamond cubic structure with sp³ hybridization. This structure creates the 1.12 eV electronic band gap that makes silicon useful as a semiconductor."
id = "924e1237-a426-43fb-9018-b3a54b11ad95"

