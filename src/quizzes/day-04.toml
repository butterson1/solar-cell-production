prompt.distractors = [
  "To decompose trichlorosilane into pure silicon and hydrogen chloride at controlled temperatures",
  "To remove dissolved gases like nitrogen and argon that would create voids in the deposited silicon",
  "To convert silicon tetrachloride byproduct back into usable trichlorosilane for recirculation"
]
answer.answer = "To separate trichlorosilane from impurity chlorides like BCl₃ and PCl₃ by exploiting their different boiling points"
context = "Distillation exploits boiling point differences: BCl₃ boils at 12.6°C, TCS at 31.8°C, and PCl₃ at 76°C. Multiple columns reduce boron and phosphorus to below 0.1 parts per billion."
