[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 1) What happens to photon energy that exceeds silicon's band gap?"
prompt.distractors = [
  "It generates multiple electron-hole pairs proportional to the photon's energy, boosting current output",
  "It's re-emitted as lower-energy infrared radiation through stimulated emission from the conduction band",
  "It accumulates as stored charge in the depletion region until released by the next photon absorption event"
]
answer.answer = "The excess energy is lost as heat through thermalization — the electron relaxes to the conduction band edge"
context = "A 3 eV blue photon creates one electron-hole pair and wastes 1.88 eV as heat. This thermalization loss is a fundamental reason the Shockley-Queisser limit is about 33%."
id = "aa429b18-3734-4fbd-9f2d-a18023cfef63"
