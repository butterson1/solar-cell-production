prompt.prompt = "🔁 (Day 9) What does TOPCon stand for?"
answer.answer = "Tunnel Oxide Passivated Contact"
answer.alternatives = ["tunnel oxide passivated contact", "Tunnel Oxide Passivating Contact", "tunnel oxide passivating contact"]
context = "From Day 9: TOPCon uses an ultra-thin tunnel oxide (~1.5nm) topped with doped polysilicon to create a passivated contact that reduces recombination losses at the cell's rear surface."
