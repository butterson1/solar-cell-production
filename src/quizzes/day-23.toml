[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is 'backtracking' in the context of single-axis solar trackers, and why is it used?"
prompt.distractors = [
    "Backtracking reverses the tracker rotation direction at solar noon so modules face due south during the afternoon instead of following the sun westward, reducing thermal stress from sustained high-irradiance exposure on a single cell string.",
    "Backtracking increases the tracker tilt angle beyond the sun angle during early morning and late afternoon to capture more diffuse atmospheric radiation, trading direct-beam losses for higher energy harvest from scattered photons.",
    "Backtracking temporarily stows modules to a flat horizontal position when wind speeds exceed 15 m/s, then rapidly returns to the optimal tracking angle once conditions normalize, protecting against mechanical fatigue damage."
]
answer.answer = "Backtracking reduces the tracker tilt angle during low-sun periods so that each row's shadow falls short of the neighboring row, eliminating inter-row shading at the cost of a small reduction in direct-beam capture on each individual row."
context = "When the sun is low, aggressive tracking would cause rows to shade each other. Backtracking deliberately reduces tilt to avoid shading overlap. The small cosine loss on each row is far less than the shading loss that would occur on neighboring rows."
id = "51c7256b-bc38-4288-a976-da9c824da796"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why do bifacial solar modules perform disproportionately well during winter at high-latitude installations?"
prompt.distractors = [
    "Silicon's bandgap narrows at cold winter temperatures, shifting its absorption edge to longer wavelengths and allowing it to capture a broader portion of the red-shifted winter spectrum, boosting both front and rear cell efficiency by 3–5%.",
    "Winter cloud cover produces predominantly short-wavelength diffuse light that penetrates glass more efficiently than direct-beam radiation, increasing optical coupling to the rear cells by reducing front-surface Fresnel reflection losses.",
    "The lower winter sun angle increases the air mass traversed by sunlight, which reddens the spectrum and preferentially excites rear-side n-type cell architectures that have stronger long-wavelength quantum efficiency than front p-type layers."
]
answer.answer = "Snow cover pushes ground albedo to 0.80–0.90, dramatically increasing rear-side irradiance, while the low winter sun angle directs a greater fraction of diffuse and reflected light toward the module's back surface."
context = "In winter at high latitudes, snow creates extremely high albedo (0.80+), and the low sun angle means more reflected and diffuse light reaches the rear. Bifacial gain in January at Nordic sites can exceed 30%, partially offsetting shorter days."
