[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why do glass-glass (dual glass) bifacial modules now dominate over glass-transparent backsheet designs for utility-scale bifacial installations?"
prompt.distractors = [
    "Glass-glass modules are 15–20% lighter per square meter than transparent backsheet designs, reducing structural loading on trackers and allowing longer torque tube spans with fewer pile foundations per megawatt.",
    "Transparent backsheets transmit UV wavelengths more efficiently than glass (50% vs 40%), which accelerates EVA yellowing and cell degradation, making glass-glass the only viable option for 30-year warranties.",
    "Glass-glass modules can use frameless edge-sealed construction that eliminates potential-induced degradation (PID) entirely, while transparent backsheet modules require grounded frames that create voltage differentials."
]
answer.answer = "Glass-glass modules offer higher rear-side light transmittance (~94% vs ~89% for transparent backsheets), superior long-term moisture resistance, and better established durability data, maximizing bifacial gain over 30-year project lifetimes."
context = "Dual glass provides ~94% rear transmittance vs ~89% for transparent backsheets, meaning more light reaches the rear cells. Glass also provides a more proven moisture barrier and longer reliability track record, which is critical for bankability."
