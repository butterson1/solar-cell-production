## Review Questions

# 🔁 Review — Day 20: Module Reliability

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 20) During IEC 61215 damp heat testing, modules are exposed to 85°C and 85% relative humidity for 1,000 hours. What is the primary degradation mechanism this test is designed to accelerate?"
prompt.distractors = [
    "Thermal expansion mismatch between silicon cells and glass causes progressive cell cracking that propagates along crystal grain boundaries, eventually severing bus bar connections and creating resistive hotspots.",
    "UV-driven photodegradation of the EVA encapsulant produces acetic acid vapor that etches the anti-reflective coating off the cell surface, permanently reducing short-circuit current by 5–8% over the test duration.",
    "Repeated thermal cycling between ambient and 85°C causes solder joint fatigue at the cell-ribbon interface, increasing series resistance and reducing fill factor as interconnection points develop micro-fractures."
]
answer.answer = "Moisture ingress through the encapsulant and backsheet attacks the cell metallization, causes delamination at material interfaces, and can trigger electrochemical corrosion of silver gridlines and solder bonds, degrading electrical performance."
context = "The 85/85 damp heat test accelerates moisture-related degradation — corrosion of metal contacts, delamination of encapsulant-cell interfaces, and potential-induced degradation. It simulates decades of humid climate exposure in 1,000 hours."
id = "b0cdad04-9f00-466f-b04a-4b0496b7f56b"

# 🔁 Review — Day 21: Perovskite Solar Cells

