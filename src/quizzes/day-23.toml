prompt.prompt = "🔁 (Day 21) What makes the perovskite crystal structure (ABX₃) particularly advantageous for solar cell engineering compared to silicon's fixed diamond cubic lattice?"
prompt.distractors = [
    "The perovskite lattice has a larger unit cell volume that accommodates higher dopant concentrations without creating recombination-active defect sites, allowing carrier lifetimes exceeding 100 microseconds even in heavily doped films.",
    "Perovskite's layered 2D crystal structure enables natural quantum confinement effects that boost the absorption coefficient by 10× over bulk materials, eliminating the need for light-trapping textures used in silicon cells.",
    "The perovskite structure spontaneously forms a built-in electric field due to its ferroelectric polarization, which drives charge separation without requiring a traditional p-n junction and simplifies device fabrication."
]
answer.answer = "By swapping different ions into the A, B, and X sites, engineers can continuously tune the bandgap from about 1.2 eV to 2.3 eV, enabling optimization for single-junction cells or precise spectral splitting in tandem architectures."
context = "The ABX₃ structure's compositional flexibility is its defining advantage. Changing the halide (X = I, Br, Cl) or organic cation (A = MA, FA, Cs) tunes the bandgap across a wide range, unlike silicon's fixed 1.12 eV bandgap."
