# Day 23 Quiz: Bifacial Modules & Tracking Systems

## Current Day Questions (6)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "A bifacial solar module is installed over dark agricultural soil (albedo ~0.15) and then the ground is covered with white gravel (albedo ~0.65). Based on the relationship between albedo and rear-side gain, approximately how much additional rear-side power generation would you expect?"
prompt.distractors = [
    "About 5–8% more rear-side generation, because each 0.1 albedo increase adds roughly 1% rear power, and the 0.50 albedo difference produces a modest linear gain limited by rear cell saturation effects.",
    "About 30–35% more rear-side generation, because the relationship between albedo and rear power is exponential at high albedo values, and white surfaces produce disproportionate specular reflection toward the module.",
    "About 2–3% more rear-side generation, because most of the rear-side contribution comes from diffuse sky radiation entering at oblique angles, and ground-reflected light accounts for only a minor fraction of total rear irradiance."
]
answer.answer = "About 15–25% more rear-side generation, because each 0.1 increase in albedo contributes roughly 3–5% additional rear-side power, and the 0.50 difference in albedo (0.15 to 0.65) compounds across that range."
context = "Research shows each 0.1 albedo increase yields 3–5% more rear-side power. Going from 0.15 to 0.65 (a 0.50 increase) would produce roughly 15–25% additional rear generation. White reflective surfaces can push bifacial gain up to 20%."
