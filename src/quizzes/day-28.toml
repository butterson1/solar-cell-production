[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the primary function of the bypass diodes (typically 3 per module) contained in the junction box on the back of a solar module?"
prompt.distractors = [
    "They regulate the output voltage to prevent overcharging of connected batteries by diverting excess current when the module's voltage exceeds a safe threshold for storage systems",
    "They convert a small portion of DC output to AC within the module itself, reducing the workload on the string inverter and improving overall system conversion efficiency",
    "They monitor individual cell temperatures and disconnect overheating strings from the circuit to prevent thermal runaway and EVA degradation during high-irradiance conditions"
]
answer.answer = "They protect against hotspot damage when cells are partially shaded, by providing an alternative current path around the shaded string so power isn't dissipated in blocked cells"
context = "Bypass diodes provide an alternative current path around shaded or underperforming cell strings, preventing reverse-biased cells from overheating and causing hotspot damage to the module."
id = "4962f3d4-6942-496e-a39b-b93adcaea631"

