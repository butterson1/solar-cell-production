[[questions]]
type = "MultipleChoice"
prompt.prompt = "During wafer slicing with diamond wire saws, approximately what percentage of the carefully purified and crystallized silicon ingot is lost as kerf (sawdust waste)?"
prompt.distractors = [
    "10–15%, because modern diamond wires at 100–120 μm diameter are thin enough that most of the ingot is converted into usable wafers with minimal material loss",
    "55–65%, because the wire diameter plus necessary spacing between cuts means more silicon is destroyed than preserved, making kerf the dominant output",
    "5–8%, because manufacturers like Longi and TCL Zhonghuan have optimized wire tension and cutting speed to achieve near-zero kerf losses at production scale"
]
answer.answer = "35–40%, because with wafers at 130–160 μm thick and each cut destroying 60–80 μm of silicon as kerf, roughly a third or more of the ingot becomes waste powder"
context = "Diamond wire sawing wastes approximately 35–40% of silicon as kerf. With wafers 130–160 μm thick and ~60–80 μm lost per cut, this is the most wasteful step in the production chain."
id = "0da21be2-e8ff-4c4d-8cd6-1dbdd6a250c7"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does KOH (potassium hydroxide) texturing produce a surface covered in tiny pyramids on monocrystalline silicon wafers?"
prompt.distractors = [
    "KOH deposits potassium silicate crystals in a regular pyramidal pattern on the surface, building up the texture from solution rather than removing material from the wafer",
    "KOH etches all crystal planes at equal rates, but surface tension effects at the microscale cause the etchant to pool in certain regions, creating random peaks and valleys",
    "KOH reacts with the phosphorus-doped emitter layer preferentially, and the gradient of dopant concentration across the surface determines where pyramids form versus dissolve"
]
answer.answer = "KOH etches silicon anisotropically — attacking the <100> crystal plane roughly 100× faster than the <111> plane — so the slower-etching <111> planes remain as pyramid faces"
context = "The pyramidal texture arises from anisotropic etching: KOH dissolves the <100> crystal plane ~100× faster than the <111> plane, leaving the <111> faces exposed as the sides of 5–10 μm pyramids."
id = "32ae7b60-dea2-4640-b298-0b704b7158c4"

[[questions]]
