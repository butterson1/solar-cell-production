prompt.distractors = [
    "The inverse-square law means solar panel efficiency decreases with the square of the distance from the Sun, so panels in high orbit produce exponentially less power per unit area",
    "The inverse-square law causes the microwave or laser beam to spread as it travels from orbit to ground, requiring enormous receiving antennas (rectennas) many kilometers across",
    "The inverse-square law means that atmospheric absorption of the transmitted beam increases quadratically with altitude, making higher orbits progressively less viable for power beaming"
]
answer.answer = "The inverse-square law governs beam divergence during transmission: even tightly focused microwave beams spread over the 36,000 km from geostationary orbit, losing energy density"
context = "Beam divergence over the ~36,000 km from geostationary orbit to Earth's surface is governed by the inverse-square law and diffraction limits, requiring very large transmitting and receiving apertures."
