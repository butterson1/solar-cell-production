[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 3) In the Siemens process, why is trichlorosilane (SiHCl₃) the preferred intermediate compound for silicon purification rather than directly purifying the solid silicon?"
prompt.distractors = [
    "Trichlorosilane selectively bonds with metallic impurities like iron and aluminum, forming stable precipitates that can be filtered out, leaving pure SiHCl₃ in solution",
    "Trichlorosilane can be electrolyzed in an aqueous solution, which deposits pure silicon at the cathode while impurities remain dissolved in the electrolyte bath",
    "Trichlorosilane reacts with oxygen at low temperatures to form volatile impurity oxides that evaporate away, leaving behind progressively purer silicon compound"
]
answer.answer = "Trichlorosilane is a liquid (boiling point 31.8°C) that can be fractionally distilled — and distillation is extraordinarily effective at separating impurities, removing an order of magnitude per pass"
context = "Converting silicon to liquid trichlorosilane enables fractional distillation, which is phenomenally effective at purification — each distillation pass removes roughly an order of magnitude of impurity concentration."
id = "24df5a6d-d9f7-47ce-a6f2-1617e2a35dde"

