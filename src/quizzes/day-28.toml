[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the approximate energy payback time for a modern silicon solar panel — the time it takes to generate more energy than was consumed in its entire manufacturing chain?"
prompt.distractors = [
    "4–6 months, because modern manufacturing is extremely energy-efficient and uses mostly renewable electricity for polysilicon production and crystal growth",
    "5–8 years, because the energy-intensive Siemens process, Czochralski growth, and module lamination collectively consume enormous amounts of electricity",
    "10–15 years, because the full lifecycle including mining, transportation, chemical processing, and factory construction requires substantial cumulative energy input"
]
answer.answer = "1–2 years, because while steps like the Siemens process (~60-80 kWh/kg) and CZ growth are energy-intensive, the panel then produces net-positive energy for 28+ more years"
context = "Modern solar panels have an energy payback time of 1–2 years, after which they generate pure net-positive energy for the remaining 28+ years of their lifespan."
