prompt.prompt = "🔁 (Day 2) Why does silicon's position in the periodic table (Group 14) make it ideal for solar cells?"
prompt.distractors = [
  "Group 14 elements have the highest melting points in their respective periods, enabling high-temperature cell processing",
  "Group 14 elements form metallic bonds that allow free electron movement without any doping required",
  "Group 14 elements are the most abundant semiconductor materials in Earth's crust, ensuring cheap raw material supply"
]
answer.answer = "With four valence electrons, silicon forms exactly four covalent bonds in a tetrahedral structure, creating a semiconductor with a near-ideal band gap of 1.12 eV for solar energy conversion"
context = "Silicon's four valence electrons create a stable diamond cubic crystal with sp³ bonding. The resulting 1.12 eV band gap is close to the theoretical optimum for single-junction solar cells (~1.34 eV), capturing a broad range of the solar spectrum."
id = "a38701a0-65f7-42bd-8a68-c24fc20f30d7"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "🔁 (Day 1) What percentage of incident solar energy can a single-junction silicon cell theoretically convert, according to the Shockley-Queisser limit?"
answer.answer = "33%"
answer.alternatives = ["33.7%", "~33%", "about 33%", "29%", "29.4%", "33.7", "34%"]
context = "The Shockley-Queisser limit for a single-junction cell with silicon's 1.12 eV band gap is about 33% (sometimes cited as 29.4% for silicon specifically due to Auger recombination). Thermalization of excess photon energy and sub-bandgap transparency are the main loss mechanisms."
id = "35cc591e-0425-422e-8504-5c0152fe9d64"
