# Day 6 Quiz: Doping — Creating the P-N Junction

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does adding just 1 boron atom per 5 million silicon atoms increase conductivity by a factor of ~15,000?"
prompt.distractors = [
  "Each boron atom catalyzes a chain reaction freeing electrons from hundreds of adjacent silicon atoms, amplifying conductivity exponentially beyond what the dopant count alone would suggest",
  "Boron's smaller atomic radius creates compressive lattice strain that weakens Si-Si bonds across the crystal, releasing bound electrons into the conduction band at room temperature",
  "Boron's high electronegativity (2.04 vs Si's 1.90) pulls valence electrons from neighboring silicon atoms into the conduction band through a quantum tunneling mechanism"
]
answer.answer = "Each boron atom creates one mobile hole with a shallow ionization energy of 0.045 eV — so low that virtually 100% of dopant atoms contribute a free carrier at room temperature, far exceeding intrinsic thermal generation"
context = "Intrinsic silicon has only ~1.5 × 10¹⁰ carriers/cm³ from thermal excitation across the full 1.12 eV band gap. Adding 10¹⁶ boron atoms/cm³ — each donating one hole from just 0.045 eV above the valence band — increases the carrier count by roughly a million."
id = "55394dd1-eb26-476d-a7eb-3751c84869bb"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "What is the 'dead layer' problem in solar cells with heavily phosphorus-doped emitters?"
prompt.distractors = [
  "Excess phosphorus forms metallic silicide precipitates at the surface that create a reflective layer, bouncing back 15-20% of incident blue/UV photons before they can reach the active junction region",
  "Heavy phosphorus doping above 10²⁰/cm³ triggers amphoteric behavior that locally reverses the junction polarity in the top 0.1-1 μm, creating a parasitic p-n-p structure that shunts current",
  "High-concentration phosphorus diffusion creates a compressive stress gradient that increases the surface band gap beyond 1.4 eV, making the emitter transparent to wavelengths below 500 nm"
]
answer.answer = "Phosphorus exceeding solid solubility (~5 × 10²⁰/cm³) sits at interstitial sites forming precipitates that act as recombination centers, killing blue-light response in the first 0.1-1 μm where short-wavelength photons are absorbed"
context = "Blue/UV photons (400-500 nm) generate carriers within the first fraction of a micrometer. If that surface region is over-doped, Auger recombination and SRH recombination via inactive phosphorus complexes destroy those carriers before collection."
id = "ce696c70-87fc-44d1-8cad-be11fa8707d2"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What is the approximate built-in potential (voltage) across the depletion zone of a silicon p-n junction?"
answer.answer = "0.6-0.7 V"
answer.alternatives = ["0.7 V", "0.6 V", "0.65 V", "~0.7V", "0.7", "0.6-0.7"]
context = "The built-in potential arises from the Fermi level difference between n-type and p-type sides. Despite this small voltage, the electric field within the narrow depletion zone (0.1-1 μm) reaches 10,000-100,000 V/cm."
id = "fa553137-f2d3-4df6-bc3b-ad9e44bd713c"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why has the solar industry's shift from p-type to n-type base wafers made boron diffusion suddenly critical to scale?"
prompt.distractors = [
  "N-type wafers require boron diffusion on both front and rear surfaces to create the junction plus a back surface field, doubling the number of high-temperature diffusion furnace steps per wafer",
  "Boron has 3× higher solid solubility in n-type silicon than p-type, enabling thinner emitter profiles that demand more precise BBr₃ flow control and temperature uniformity across the batch",
  "N-type wafers are chemically incompatible with POCl₃ phosphorus diffusion above 850°C, so boron must completely replace phosphorus as the primary dopant for both emitter and BSF formation"
]
answer.answer = "TOPCon uses n-type (phosphorus-doped) base wafers with a boron-doped front emitter — replacing the old PERC structure where boron was incorporated during crystal growth and never needed a separate diffusion step"
context = "In traditional PERC, boron is added during CZ crystal growth (no diffusion step needed). TOPCon flips the structure: n-type base with a boron emitter requiring BBr₃ diffusion at 900-1,050°C. With TOPCon overtaking PERC since ~2024, global BBr₃ diffusion furnace capacity has scaled to over 300 GW annually."
id = "f7e542d5-4b8b-43d8-a24e-3d9ef509fc69"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "Why does ion implantation remain a niche doping method in solar despite offering ±1% dose accuracy versus ±5-10% for diffusion?"
prompt.distractors = [
  "Ion implantation creates permanent crystal lattice damage from high-energy collisions that reduces minority carrier lifetime below 100 μs even after extended annealing at 1,000°C for 30+ minutes",
  "Implanted dopant atoms preferentially cluster at grain boundaries rather than occupying substitutional lattice sites, reducing electrical activation rates below 50% in production-grade wafers",
  "Current ion beam technology can only process one wafer at a time in a high-vacuum chamber, limiting real-world throughput to under 500 wafers/hour — far below the 5,000+/hour target for GW-scale fabs"
]
answer.answer = "Ion implanters cost $3-5 million per tool (5-10× a diffusion furnace) and carry higher ongoing maintenance costs from high-vacuum systems and consumable ion sources, making diffusion more economical for standard architectures"
context = "Throughput is actually competitive (2,000-3,000 wafers/hour), and lattice damage is fully repaired by post-implant annealing. The barrier is purely economic. Ion implantation is used where precision justifies cost, such as IBC cells by Maxeon (formerly SunPower)."
id = "ef4c9c23-7006-4c2d-aa03-b61d5ccd4cac"

[[questions]]
type = "ShortAnswer"
prompt.prompt = "What chemical compound is the standard source gas for phosphorus diffusion doping in solar cell manufacturing?"
answer.answer = "POCl₃"
answer.alternatives = ["POCl3", "phosphorus oxychloride", "POCL3", "pocl3"]
context = "Phosphorus oxychloride (POCl₃) is a liquid at room temperature that is bubbled with nitrogen carrier gas into a quartz tube furnace at 800-900°C."
