# 🔁 Review: Recent days (Days 4-5)

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 5) Why did diamond wire sawing's adoption happen fastest for monocrystalline silicon and lag behind for multicrystalline?"
prompt.distractors = [
  "Multicrystalline silicon's lower melting point causes localized thermal softening at the cut interface, allowing diamond particles to embed in the kerf rather than abrade — reducing cutting speed by 40%",
  "The wider 156mm+ wafer formats standard for multicrystalline ingots required longer unsupported wire spans that increased breakage rates beyond the 0.1% threshold needed for economic viability",
  "Asahi Diamond Industrial held exclusive patents on diamond wire compositions optimized for multicrystalline substrates, blocking competitors from the multi-Si market segment until expiration in 2018"
]
answer.answer = "Random grain orientations in multicrystalline silicon created uneven wear on diamond particles due to varying hardness directions per grain, causing accelerated wire degradation and rougher cut surfaces requiring process re-optimization"
context = "Monocrystalline silicon presents a uniform crystal orientation to the wire, giving consistent cutting forces. Each grain in multicrystalline has a different crystallographic direction, creating irregular mechanical loading."
id = "487037e0-7ab1-45af-aa59-e7c4437cdb54"

[[questions]]
type = "MultipleChoice"
prompt.prompt = "🔁 (Day 4) What is the purpose of the 'Dash neck' — the extremely thin section grown at the start of a Czochralski crystal?"
prompt.distractors = [
  "The thin neck acts as a thermal buffer zone that prevents the cold seed crystal from fracturing due to thermal shock when it first contacts the 1,425°C silicon melt surface",
  "The narrow 3-4 mm diameter creates a high dopant concentration reference zone used as an inline calibration standard for measuring resistivity uniformity throughout the full ingot body",
  "The Dash neck functions as a deliberate mechanical weak point, allowing the crystal to separate cleanly from the seed holder if the puller mechanism encounters a torque overload during growth"
]
answer.answer = "The thin neck (3-4 mm) forces dislocations generated by thermal shock at the seed-melt interface to propagate outward to the crystal surface and terminate, so the full-diameter body grows dislocation-free"
context = "When the seed contacts the melt, thermal shock creates millions of dislocations. Dash's breakthrough was realizing that an extremely thin neck forces these dislocations to glide to the surface and annihilate."
id = "8c6b3e45-70e3-4454-a4bf-eafab2e89bea"

